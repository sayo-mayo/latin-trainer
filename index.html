<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Latin Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cardo:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FAFAF8; --surface:#FFFFFF; --surface-2:#F5F5F3; --ink:#1A1A1A; --muted:#71717A;
  --line:#E7E6E2; --accent:#15725B; --accent-deep:#0F5544; --ok:#15803D; --err:#B91C1C; --brass:#92660E;
  --hi:#ECF3F0;
  --c-nom:#15725B; --c-voc:#4D7C0F; --c-gen:#A16207; --c-dat:#C2410C; --c-acc:#BE123C; --c-abl:#1D4ED8;
  --serif:"Cardo",Georgia,"Times New Roman",serif;
  --display:"Cinzel",var(--serif); --ui:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  --maxw:880px;
}
[data-theme="dark"]{
  --paper:#0C0C0D; --surface:#161617; --surface-2:#1F1F21; --ink:#F2F2F0; --muted:#9B9BA3;
  --line:#28282B; --accent:#2DD4BF; --accent-deep:#14B8A6; --ok:#4ADE80; --err:#F87171; --brass:#D4A24E;
  --hi:#172A24;
  --c-nom:#2DD4BF; --c-voc:#A3C644; --c-gen:#E0B450; --c-dat:#F08A5E; --c-acc:#F2718C; --c-abl:#7AA0F5;
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--paper); color:var(--ink); font-family:var(--ui); font-size:16px; line-height:1.5;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;}
.lat{font-family:var(--serif); font-feature-settings:"liga" 1; letter-spacing:.1px;}
button{font-family:inherit; cursor:pointer}
code{font-family:ui-monospace,Menlo,Consolas,monospace}

/* ---- top bar ---- */
.topbar{display:flex; align-items:center; gap:20px; padding:14px 22px; border-bottom:1px solid var(--line);
  background:var(--surface); position:sticky; top:0; z-index:5; flex-wrap:wrap;}
.brand{display:flex; flex-direction:column; line-height:1; margin-right:auto}
.wordmark{font-family:var(--display); font-weight:600; font-size:22px; letter-spacing:.07em;}
.tagline{font-size:11px; color:var(--muted); letter-spacing:.16em; text-transform:uppercase; margin-top:3px}
.nav{display:flex; gap:4px}
.navbtn{background:none; border:1px solid transparent; color:var(--muted); padding:7px 14px; border-radius:8px;
  font-size:13px; font-weight:500; letter-spacing:.02em;}
.navbtn:hover{color:var(--ink)}
.navbtn.active{color:var(--ink); background:var(--surface-2); border-color:var(--line)}
.acct{display:flex; align-items:center; gap:12px}
.who{font-size:12px; color:var(--muted)}
.linklike{background:none; border:none; color:var(--accent); font-size:12px; text-decoration:underline; padding:2px}
.iconbtn{background:var(--surface-2); border:1px solid var(--line); border-radius:8px; width:34px; height:30px; color:var(--ink); font-size:14px}

/* ---- layout ---- */
.main{max-width:var(--maxw); margin:0 auto; padding:30px 22px 80px}
.eyebrow{font-family:var(--display); font-size:11px; letter-spacing:.28em; text-transform:uppercase; color:var(--accent); margin:0 0 10px}
.display{font-family:var(--display); font-weight:500; line-height:1.15; margin:0}
h1.display{font-size:clamp(24px,3.4vw,34px)}
.hero{margin-bottom:30px}
.hero.compact{margin-bottom:20px}
.herostats{display:flex; gap:30px; flex-wrap:wrap; margin-top:22px; padding-top:20px; border-top:1px solid var(--line)}
.stat{display:flex; flex-direction:column}
.statn{font-family:var(--serif); font-size:30px; font-weight:600; line-height:1}
.statl{font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-top:6px}

.card{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:24px; margin-bottom:22px}
.cardh{font-family:var(--display); font-weight:500; font-size:18px; margin:0 0 18px; letter-spacing:.02em}

/* ---- setup ---- */
.fieldrow{display:grid; grid-template-columns:120px 1fr; gap:16px; align-items:start; padding:14px 0; border-top:1px solid var(--line)}
.fieldrow:first-of-type{border-top:none}
.fieldlabel{font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); padding-top:7px}
.chooser{display:flex; flex-wrap:wrap; gap:8px}
.choice{background:var(--surface-2); border:1px solid var(--line); color:var(--ink); padding:9px 14px; border-radius:9px; font-size:13px}
.choice.small{padding:6px 11px; font-size:12px}
.choice:hover{border-color:var(--accent)}
.choice.sel{background:var(--accent); border-color:var(--accent); color:#fff}
[data-theme="dark"] .choice.sel{color:#15130E}
.scope{display:flex; flex-direction:column; gap:10px}
.subhead{font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-top:6px}
.checkrow{display:flex; flex-wrap:wrap; gap:8px}
.chk{display:inline-flex; align-items:center; gap:7px; background:var(--surface-2); border:1px solid var(--line); padding:7px 11px; border-radius:8px; font-size:13px}
.chk.on{border-color:var(--accent)}
.chk input{accent-color:var(--accent)}
.toggle{display:inline-flex; align-items:center; gap:9px; font-size:14px}
.toggle input{width:16px;height:16px;accent-color:var(--accent)}

.text{background:var(--surface-2); border:1px solid var(--line); border-radius:9px; padding:10px 12px; font-size:14px; color:var(--ink); font-family:var(--ui)}
.text.num{width:90px}
.inputrow{display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-top:6px}
.inputrow .text{flex:1; min-width:200px}
.primary{background:var(--accent); color:#fff; border:1px solid var(--accent); padding:11px 22px; border-radius:10px; font-size:14px; font-weight:600; letter-spacing:.02em}
[data-theme="dark"] .primary{color:#15130E}
.primary:hover{background:var(--accent-deep); border-color:var(--accent-deep)}
.primary.big{margin-top:18px; padding:13px 30px; font-size:15px}
.primary.small{padding:7px 14px; font-size:13px}
.ghost{background:none; border:1px solid var(--line); color:var(--ink); padding:11px 20px; border-radius:10px; font-size:14px}
.ghost:hover{border-color:var(--accent)}

/* ---- drill ---- */
.drillhead{display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:14px}
.drillhead .eyebrow{margin:0}
.progressbar{display:flex; align-items:center; gap:14px; font-size:12px; color:var(--muted)}

/* the inscription tablet — signature element */
.tablet{position:relative; background:var(--surface); border:1px solid var(--line); border-radius:14px;
  padding:34px 32px;}
.tablet::before{content:none;}
.tablet-eyebrow{font-family:var(--display); text-align:center; font-size:10px; letter-spacing:.34em; text-transform:uppercase; color:var(--muted); margin-bottom:18px}
.prompt{font-size:20px; text-align:center; line-height:1.5; max-width:560px; margin:0 auto}
.prompt .lat{font-size:23px}
.prompt b{font-weight:600}
.muted{color:var(--muted)}
.small{font-size:12px}

.answerArea{margin-top:26px; display:flex; flex-direction:column; align-items:center; gap:12px}
.macrons{display:flex; gap:6px; align-items:center; flex-wrap:wrap; justify-content:center}
.mac{font-family:var(--serif); font-size:17px; width:38px; height:34px; background:var(--surface); border:1px solid var(--line); border-radius:7px; color:var(--ink)}
.mac:hover{border-color:var(--accent); color:var(--accent)}
.machint{margin-left:6px}
.answer-input{font-size:22px; text-align:center; padding:12px 16px; min-width:280px; background:var(--surface);
  border:none; border-bottom:2px solid var(--line); color:var(--ink); border-radius:4px 4px 0 0; outline:none}
.answer-input:focus{border-bottom-color:var(--accent)}
.answer-input.good{border-bottom-color:var(--ok); color:var(--ok)}
.answer-input.bad{border-bottom-color:var(--err); color:var(--err)}
.answer-area{width:100%; max-width:520px; font-size:17px; padding:12px 14px; background:var(--surface); border:1px solid var(--line); border-radius:9px; color:var(--ink); resize:vertical}
.bigform{font-size:38px; text-align:center; margin:4px 0 6px; letter-spacing:.3px}

.feedback{margin-top:20px; display:flex; flex-direction:column; align-items:center; gap:12px}
.vline{font-size:16px; text-align:center}
.vline.ok{color:var(--ok)} .vline.err{color:var(--err)} .vline.warn{color:var(--brass)}
.vline .lat{font-size:19px}
.note{max-width:520px; text-align:center; color:var(--muted)}
.analyses{text-align:center; max-width:560px}
.model{text-align:center}
.model div{font-family:var(--serif); font-size:19px; margin-top:4px}
.selfmark{display:flex; gap:12px}
.ok-btn{background:var(--ok); color:#fff; border:none; padding:9px 18px; border-radius:9px; font-weight:600; font-size:13px}
.err-btn{background:var(--err); color:#fff; border:none; padding:9px 18px; border-radius:9px; font-weight:600; font-size:13px}

/* parse selectors */
.parsegrid{display:flex; flex-wrap:wrap; gap:12px; justify-content:center}
.pcell{display:flex; flex-direction:column; gap:5px}
.pl{letter-spacing:.08em; text-transform:uppercase}
.parse-select{background:var(--surface); border:1px solid var(--line); border-radius:8px; padding:9px 11px; font-size:14px; color:var(--ink); font-family:var(--ui)}

/* mcq */
.mcq{display:flex; flex-direction:column; gap:9px; width:100%; max-width:520px}
.mcqbtn{display:flex; align-items:center; gap:12px; text-align:left; background:var(--surface); border:1px solid var(--line); color:var(--ink); padding:12px 15px; border-radius:10px; font-size:15px; font-family:var(--serif)}
.mcqbtn:hover{border-color:var(--accent)}
.mcqnum{font-family:var(--ui); font-size:11px; width:22px; height:22px; flex:none; display:grid; place-items:center; border-radius:50%; background:var(--surface-2); border:1px solid var(--line); color:var(--muted)}
.mcqbtn.right{border-color:var(--ok); background:color-mix(in srgb,var(--ok) 12%, var(--surface))}
.mcqbtn.wrongpick{border-color:var(--err); background:color-mix(in srgb,var(--err) 12%, var(--surface))}

/* paradigm reference */
.reference{margin-top:18px; background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:6px 18px}
.reference summary{cursor:pointer; padding:12px 0; font-size:13px; font-weight:500; letter-spacing:.04em; color:var(--accent)}
.para-title{font-family:var(--serif); font-style:italic; font-size:15px; color:var(--muted); margin:6px 0 12px}
table.paradigm{border-collapse:collapse; width:100%; max-width:460px; margin-bottom:14px}
table.paradigm th{font-family:var(--ui); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); font-weight:500; text-align:left; padding:6px 12px}
table.paradigm td{padding:6px 12px; border-top:1px solid var(--line); font-size:15px}
.case-label{font-family:var(--ui); font-size:11px; letter-spacing:.06em; text-transform:uppercase; font-weight:600}
.case-label[data-case=nom]{color:var(--c-nom)} .case-label[data-case=voc]{color:var(--c-voc)}
.case-label[data-case=gen]{color:var(--c-gen)} .case-label[data-case=dat]{color:var(--c-dat)}
.case-label[data-case=acc]{color:var(--c-acc)} .case-label[data-case=abl]{color:var(--c-abl)}
.paradigm .form{font-family:var(--serif)}
.paradigm .form.hi{background:var(--hi); font-weight:600; border-radius:4px}
.cmp{display:flex; gap:10px; flex-wrap:wrap}
.degchip{display:flex; flex-direction:column; gap:3px; background:var(--surface-2); border:1px solid var(--line); border-radius:9px; padding:9px 14px}
.deg{font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted)}
.degchip .lat{font-size:18px}

/* case key legend */
.casekey{display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-top:22px; padding-top:16px; border-top:1px solid var(--line)}
.casekey-label{margin-right:4px; letter-spacing:.1em; text-transform:uppercase}
.keychip{font-size:11px; letter-spacing:.04em; text-transform:uppercase; padding:3px 9px; border:1px solid; border-radius:20px; font-weight:600}
.keychip[data-case=nom]{color:var(--c-nom)} .keychip[data-case=voc]{color:var(--c-voc)}
.keychip[data-case=gen]{color:var(--c-gen)} .keychip[data-case=dat]{color:var(--c-dat)}
.keychip[data-case=acc]{color:var(--c-acc)} .keychip[data-case=abl]{color:var(--c-abl)}

/* progress */
.bar{display:grid; grid-template-columns:150px 1fr 90px; gap:14px; align-items:center; padding:8px 0}
.barlabel{font-size:13px}
.bartrack{height:8px; background:var(--surface-2); border:1px solid var(--line); border-radius:20px; overflow:hidden}
.barfill{height:100%; background:var(--accent)}
.barval{font-size:12px; color:var(--muted); text-align:right}
.mistakes{display:flex; flex-wrap:wrap; gap:7px; margin-top:6px}
.misitem{font-family:var(--serif); font-size:13px; background:var(--surface-2); border:1px solid var(--line); border-radius:7px; padding:5px 10px}
.misacc{color:var(--err); font-family:var(--ui); font-size:11px}

/* class / dashboard */
.banner{background:color-mix(in srgb,var(--brass) 14%, var(--surface)); border:1px solid color-mix(in srgb,var(--brass) 40%, var(--line));
  border-radius:11px; padding:13px 16px; font-size:13px; line-height:1.5; margin-bottom:20px}
.classrow{display:flex; justify-content:space-between; align-items:center; gap:14px; padding:11px 0; border-top:1px solid var(--line); font-size:14px; flex-wrap:wrap}
.code{background:var(--surface-2); border:1px solid var(--line); padding:2px 8px; border-radius:6px; font-size:13px; letter-spacing:.1em}
.formgrid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px}
.formgrid .text, .formgrid .parse-select{width:100%}
table.roster{width:100%; border-collapse:collapse; margin-top:6px}
table.roster th{font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); text-align:left; padding:8px 10px; font-weight:500}
table.roster td{padding:9px 10px; border-top:1px solid var(--line); font-size:14px}

/* summary */
.summary{text-align:center}
.summary .display{font-size:30px; margin:8px 0}
.bigpct{font-family:var(--serif); font-size:64px; font-weight:600; color:var(--accent); line-height:1; margin:6px 0 18px}
.summbtns{display:flex; gap:12px; justify-content:center; flex-wrap:wrap}

:focus-visible{outline:2px solid var(--accent); outline-offset:2px; border-radius:4px}

/* auth / loading */
.authwrap{max-width:380px; margin:60px auto; padding:0 22px}
.authcard{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:28px}
.authcard h1{font-family:var(--display); font-weight:500; font-size:22px; margin:0 0 4px}
.authcard .sub{color:var(--muted); font-size:13px; margin:0 0 20px}
.authcard .text{width:100%; margin-bottom:10px}
.authrow{display:flex; gap:8px; align-items:center; justify-content:center; margin-top:16px}
.authtoggle{background:none; border:none; color:var(--accent); text-decoration:underline; font-size:13px; padding:4px}
.gbtn{width:100%; margin-top:10px}
.loading{display:grid; place-items:center; height:70vh; color:var(--muted); font-family:var(--display); letter-spacing:.24em; text-transform:uppercase; font-size:12px}

@media (max-width:620px){
  .fieldrow{grid-template-columns:1fr; gap:8px}
  .fieldlabel{padding-top:0}
  .formgrid{grid-template-columns:1fr}
  .bar{grid-template-columns:110px 1fr 64px}
  .prompt{font-size:18px}
  .bigform{font-size:30px}
  .herostats{gap:20px}
}
@media (prefers-reduced-motion:reduce){ *{transition:none !important; animation:none !important} }
</style>

<script>
/* ===========================================================================
   LATIN MORPHOLOGY ENGINE  (rule-based generation)
   Covers the VCE grammar set. Forms carry macrons.
   Exposes: declineNoun, declineAdjective, makeAdverb, declinePronoun,
            conjugateVerb, and the seed LEXICON.
   =========================================================================== */

const CASES = ["nom", "voc", "gen", "dat", "acc", "abl"];
const NUMS = ["sg", "pl"];
const CASE_LABEL = { nom:"nominative", voc:"vocative", gen:"genitive", dat:"dative", acc:"accusative", abl:"ablative" };
const PERSONS = ["1", "2", "3"];

/* ---------- helpers ---------- */
function chop(word, suffix){ return word.slice(0, word.length - suffix.length); }
function zip6(stem, ends){ return ends.map(e => stem + e); }

/* =====================================================================
   NOUNS
   entry: { lemma, gen, gender:"m"|"f"|"n", decl:1..5, istem:bool, irregular:{} }
   gen = genitive singular (used to derive 3rd-decl stem; informative otherwise)
   ===================================================================== */
function nounStem(entry){
  const { lemma, gen, decl } = entry;
  switch(decl){
    case 1: return chop(lemma, "a");
    case 2:
      if(lemma.endsWith("um")) return chop(lemma, "um");
      if(lemma.endsWith("us")) return chop(lemma, "us");
      // -er / -ir nouns: stem from genitive (puerī -> puer, agrī -> agr)
      return chop(gen, "ī");
    case 3: return chop(gen, "is");
    case 4: return lemma.endsWith("ū") ? chop(lemma, "ū") : chop(lemma, "us");
    case 5: return chop(lemma, "ēs");
  }
}

function declineNoun(entry){
  if(entry.irregular) return entry.irregular;
  const g = entry.gender, n = (g === "n");
  const stem = nounStem(entry);
  let sg = {}, pl = {};

  if(entry.decl === 1){
    sg = { nom:stem+"a", voc:stem+"a", gen:stem+"ae", dat:stem+"ae", acc:stem+"am", abl:stem+"ā" };
    pl = { nom:stem+"ae", voc:stem+"ae", gen:stem+"ārum", dat:stem+"īs", acc:stem+"ās", abl:stem+"īs" };
  }
  else if(entry.decl === 2){
    if(n){
      sg = { nom:stem+"um", voc:stem+"um", gen:stem+"ī", dat:stem+"ō", acc:stem+"um", abl:stem+"ō" };
      pl = { nom:stem+"a", voc:stem+"a", gen:stem+"ōrum", dat:stem+"īs", acc:stem+"a", abl:stem+"īs" };
    } else {
      const isIus = entry.lemma.endsWith("ius");
      const isEr  = !entry.lemma.endsWith("us");
      const nomSg = entry.lemma;
      const vocSg = isIus ? chop(entry.lemma,"ius")+"ī" : (isEr ? entry.lemma : stem+"e");
      sg = { nom:nomSg, voc:vocSg, gen:stem+"ī", dat:stem+"ō", acc:stem+"um", abl:stem+"ō" };
      pl = { nom:stem+"ī", voc:stem+"ī", gen:stem+"ōrum", dat:stem+"īs", acc:stem+"ōs", abl:stem+"īs" };
    }
  }
  else if(entry.decl === 3){
    if(n){
      const ablSg = entry.istem ? stem+"ī" : stem+"e";
      const nomPl = entry.istem ? stem+"ia" : stem+"a";
      const genPl = entry.istem ? stem+"ium" : stem+"um";
      sg = { nom:entry.lemma, voc:entry.lemma, gen:stem+"is", dat:stem+"ī", acc:entry.lemma, abl:ablSg };
      pl = { nom:nomPl, voc:nomPl, gen:genPl, dat:stem+"ibus", acc:nomPl, abl:stem+"ibus" };
    } else {
      const genPl = entry.istem ? stem+"ium" : stem+"um";
      sg = { nom:entry.lemma, voc:entry.lemma, gen:stem+"is", dat:stem+"ī", acc:stem+"em", abl:stem+"e" };
      pl = { nom:stem+"ēs", voc:stem+"ēs", gen:genPl, dat:stem+"ibus", acc:stem+"ēs", abl:stem+"ibus" };
    }
  }
  else if(entry.decl === 4){
    if(n){
      sg = { nom:stem+"ū", voc:stem+"ū", gen:stem+"ūs", dat:stem+"ū", acc:stem+"ū", abl:stem+"ū" };
      pl = { nom:stem+"ua", voc:stem+"ua", gen:stem+"uum", dat:stem+"ibus", acc:stem+"ua", abl:stem+"ibus" };
    } else {
      sg = { nom:stem+"us", voc:stem+"us", gen:stem+"ūs", dat:stem+"uī", acc:stem+"um", abl:stem+"ū" };
      pl = { nom:stem+"ūs", voc:stem+"ūs", gen:stem+"uum", dat:stem+"ibus", acc:stem+"ūs", abl:stem+"ibus" };
    }
  }
  else if(entry.decl === 5){
    const lastStemChar = stem.slice(-1);
    const vowels = "aeiouāēīōū";
    const ei = vowels.includes(lastStemChar) ? "ēī" : "eī";
    sg = { nom:stem+"ēs", voc:stem+"ēs", gen:stem+ei, dat:stem+ei, acc:stem+"em", abl:stem+"ē" };
    pl = { nom:stem+"ēs", voc:stem+"ēs", gen:stem+"ērum", dat:stem+"ēbus", acc:stem+"ēs", abl:stem+"ēbus" };
  }
  return { sg, pl };
}

/* =====================================================================
   ADJECTIVES
   class1 entry: { type:"adj1", m, f, n }            e.g. bonus, bona, bonum
   class3 entry: { type:"adj3", nom:{m,f,n}, stem }  stem from genitive
   comparison handled separately
   ===================================================================== */
function declineAdj1(m, f, n){
  // m like 2nd masc (-us or -er), f like 1st, n like 2nd neuter
  const isEr = !m.endsWith("us");
  const stem = isEr ? chop(f, "a") : chop(m, "us");
  const masc = {
    sg:{ nom:m, voc:(isEr?m:stem+"e"), gen:stem+"ī", dat:stem+"ō", acc:stem+"um", abl:stem+"ō" },
    pl:{ nom:stem+"ī", voc:stem+"ī", gen:stem+"ōrum", dat:stem+"īs", acc:stem+"ōs", abl:stem+"īs" }
  };
  const fem = {
    sg:{ nom:stem+"a", voc:stem+"a", gen:stem+"ae", dat:stem+"ae", acc:stem+"am", abl:stem+"ā" },
    pl:{ nom:stem+"ae", voc:stem+"ae", gen:stem+"ārum", dat:stem+"īs", acc:stem+"ās", abl:stem+"īs" }
  };
  const neut = {
    sg:{ nom:stem+"um", voc:stem+"um", gen:stem+"ī", dat:stem+"ō", acc:stem+"um", abl:stem+"ō" },
    pl:{ nom:stem+"a", voc:stem+"a", gen:stem+"ōrum", dat:stem+"īs", acc:stem+"a", abl:stem+"īs" }
  };
  return { m:masc, f:fem, n:neut };
}

function declineAdj3(nomforms, stem){
  // i-stem: abl sg -ī, neut nom/acc pl -ia, gen pl -ium
  const mfNom = nomforms.m, fNom = nomforms.f || nomforms.m, nNom = nomforms.n;
  const masc = {
    sg:{ nom:mfNom, voc:mfNom, gen:stem+"is", dat:stem+"ī", acc:stem+"em", abl:stem+"ī" },
    pl:{ nom:stem+"ēs", voc:stem+"ēs", gen:stem+"ium", dat:stem+"ibus", acc:stem+"ēs", abl:stem+"ibus" }
  };
  const fem = {
    sg:{ nom:fNom, voc:fNom, gen:stem+"is", dat:stem+"ī", acc:stem+"em", abl:stem+"ī" },
    pl:{ nom:stem+"ēs", voc:stem+"ēs", gen:stem+"ium", dat:stem+"ibus", acc:stem+"ēs", abl:stem+"ibus" }
  };
  const neut = {
    sg:{ nom:nNom, voc:nNom, gen:stem+"is", dat:stem+"ī", acc:nNom, abl:stem+"ī" },
    pl:{ nom:stem+"ia", voc:stem+"ia", gen:stem+"ium", dat:stem+"ibus", acc:stem+"ia", abl:stem+"ibus" }
  };
  return { m:masc, f:fem, n:neut };
}

// comparative declines as 3rd-decl CONSONANT stem (abl -e, gen pl -um, neut pl -a)
function declineComparative(stemIor){ // stemIor e.g. "altior"
  const base = chop(stemIor, "ior"); // "alt"
  const m = base+"ior", nn = base+"ius", st = base+"iōr";
  const masc = {
    sg:{ nom:m, voc:m, gen:st+"is", dat:st+"ī", acc:st+"em", abl:st+"e" },
    pl:{ nom:st+"ēs", voc:st+"ēs", gen:st+"um", dat:st+"ibus", acc:st+"ēs", abl:st+"ibus" }
  };
  const fem = JSON.parse(JSON.stringify(masc));
  const neut = {
    sg:{ nom:nn, voc:nn, gen:st+"is", dat:st+"ī", acc:nn, abl:st+"e" },
    pl:{ nom:st+"a", voc:st+"a", gen:st+"um", dat:st+"ibus", acc:st+"a", abl:st+"ibus" }
  };
  return { m:masc, f:fem, n:neut };
}

const IRREG_COMPARISON = {
  bonus:   { comp:"melior",  sup:"optimus" },
  malus:   { comp:"peior",   sup:"pessimus" },
  magnus:  { comp:"maior",   sup:"maximus" },
  parvus:  { comp:"minor",   sup:"minimus" },
  multus:  { comp:"plūs",    sup:"plūrimus" },
  facilis: { comp:"facilior", sup:"facillimus" },
  difficilis:{ comp:"difficilior", sup:"difficillimus" },
  similis: { comp:"similior", sup:"simillimus" },
  gracilis:{ comp:"gracilior", sup:"gracillimus" },
  humilis: { comp:"humilior", sup:"humillimus" }
};

function comparisonOf(entry){
  const lookup = entry.key || entry.lemma || entry.m;
  const positive = (entry.type === "adj1") ? entry.m : (entry.nom ? entry.nom.m : entry.lemma);
  if(IRREG_COMPARISON[lookup]){
    return { positive, comparative:IRREG_COMPARISON[lookup].comp, superlative:IRREG_COMPARISON[lookup].sup, irregular:true };
  }
  let stem, comp, sup;
  if(entry.type === "adj1"){
    stem = entry.m.endsWith("us") ? chop(entry.m,"us") : chop(entry.f,"a");
    comp = stem + "ior";
    sup = entry.m.endsWith("us") ? stem + "issimus" : entry.m + "rimus"; // -er -> -errimus
  } else { // adj3
    stem = entry.stem;
    comp = stem + "ior";
    sup = entry.nom.m.endsWith("er") ? entry.nom.m + "rimus" : stem + "issimus"; // ācer -> ācerrimus
  }
  return { positive, comparative:comp, superlative:sup, irregular:false };
}

/* =====================================================================
   ADVERBS
   ===================================================================== */
const IRREG_ADVERB = {
  bonus:   { pos:"bene", comp:"melius", sup:"optimē" },
  malus:   { pos:"male", comp:"peius", sup:"pessimē" },
  magnus:  { pos:"magnopere", comp:"magis", sup:"maximē" },
  parvus:  { pos:"parum", comp:"minus", sup:"minimē" },
  multus:  { pos:"multum", comp:"plūs", sup:"plūrimum" },
  facilis: { pos:"facile", comp:"facilius", sup:"facillimē" }
};
function makeAdverb(entry){
  const lookup = entry.key || entry.lemma || entry.m;
  if(IRREG_ADVERB[lookup]) return { ...IRREG_ADVERB[lookup], irregular:true };
  const cmp = comparisonOf(entry);
  const supAdv = chop(cmp.superlative, "us") + "ē"; // pulcherrimus->pulcherrimē, facillimus->facillimē
  let pos, stem;
  if(entry.type === "adj1"){
    stem = entry.m.endsWith("us") ? chop(entry.m,"us") : chop(entry.f,"a");
    pos = stem + "ē";
  } else {
    stem = entry.stem;
    pos = stem.endsWith("nt") ? stem + "er" : stem + "iter"; // prūdēns->prūdenter, fortis->fortiter
  }
  return { pos, comp:stem+"ius", sup:supAdv, irregular:false };
}

const VERB_ENDINGS = {

    2:["eō","ēs","et","ēmus","ētis","ent"],
    3:["ō","is","it","imus","itis","unt"],

  },

    "3io":["ior","eris","itur","imur","iminī","iuntur"],
    4:["ior","īris","ītur","īmur","īminī","iuntur"]
  },
  impfIndAct: {

    2:["ēbam","ēbās","ēbat","ēbāmus","ēbātis","ēbant"],
    3:["ēbam","ēbās","ēbat","ēbāmus","ēbātis","ēbant"],
    "3io":["iēbam","iēbās","iēbat","iēbāmus","iēbātis","iēbant"],

  },
  impfIndPass: {

    2:["ēbar","ēbāris","ēbātur","ēbāmur","ēbāminī","ēbantur"],
    3:["ēbar","ēbāris","ēbātur","ēbāmur","ēbāminī","ēbantur"],
    "3io":["iēbar","iēbāris","iēbātur","iēbāmur","iēbāminī","iēbantur"],
    4:["iēbar","iēbāris","iēbātur","iēbāmur","iēbāminī","iēbantur"]
  },
  futIndAct: {
    1:["ābō","ābis","ābit","ābimus","ābitis","ābunt"],
    2:["ēbō","ēbis","ēbit","ēbimus","ēbitis","ēbunt"],
    3:["am","ēs","et","ēmus","ētis","ent"],
    "3io":["iam","iēs","iet","iēmus","iētis","ient"],
    4:["iam","iēs","iet","iēmus","iētis","ient"]
  },
  futIndPass: {
    1:["ābor","āberis","ābitur","ābimur","ābiminī","ābuntur"],
    2:["ēbor","ēberis","ēbitur","ēbimur","ēbiminī","ēbuntur"],
    3:["ar","ēris","ētur","ēmur","ēminī","entur"],

  },

  },

  }
};
const IMPF_SUBJ_ACT_END = ["em","ēs","et","ēmus","ētis","ent"];      // attach to (inf - final e)
const IMPF_SUBJ_PASS_END = ["er","ēris","ētur","ēmur","ēminī","entur"];
const PERF_IND_ACT_END = ["ī","istī","it","imus","istis","ērunt"];
const PLUP_IND_ACT_END = ["eram","erās","erat","erāmus","erātis","erant"];
const FUTP_IND_ACT_END = ["erō","eris","erit","erimus","eritis","erint"];
const PERF_SUBJ_ACT_END = ["erim","erīs","erit","erīmus","erītis","erint"];
const PLUP_SUBJ_ACT_END = ["issem","issēs","isset","issēmus","issētis","issent"];
const SUM_PRES = ["sum","es","est","sumus","estis","sunt"];
const SUM_IMPF = ["eram","erās","erat","erāmus","erātis","erant"];
const SUM_FUT  = ["erō","eris","erit","erimus","eritis","erunt"];
const SUM_PRES_SUBJ = ["sim","sīs","sit","sīmus","sītis","sint"];
const SUM_IMPF_SUBJ = ["essem","essēs","esset","essēmus","essētis","essent"];

function verbRoot(inf, conj, dep){
  if(dep){
    if(conj === 1) return chop(inf, "ārī");
    if(conj === 2) return chop(inf, "ērī");
    if(conj === 4) return chop(inf, "īrī");
    return chop(inf, "ī"); // 3 and 3io deponent infinitives end in -ī
  }
  if(conj === 1) return chop(inf, "āre");
  if(conj === 2) return chop(inf, "ēre");
  if(conj === 4) return chop(inf, "īre");
  return chop(inf, "ere"); // 3 and 3io
}
// analytic perfect-system forms: participle agrees in NUMBER (sg for 1-3, pl for 4-6)
function analytic(supStem, auxArr){
  const sg = supStem + "us", pl = supStem + "ī";
  return auxArr.map((a, i) => (i < 3 ? sg : pl) + " " + a);
}

function conjugateVerb(entry){
  if(entry.irregular) return entry.irregular; // full hardcoded object
  const [p1, inf, perf1, supine] = entry.pp;
  const conj = entry.conj;
  const root = verbRoot(inf, conj, entry.deponent);
  const perfStem = perf1 ? chop(perf1, "ī") : null;
  const supStem = supine ? chop(supine, "um") : null;      // amāt
  const ppp = supStem ? supStem + "us" : null;             // amātus
  const dep = !!entry.deponent;

  const out = { indicative:{}, subjunctive:{}, imperative:{}, infinitive:{}, participle:{}, gerund:{}, supine:{}, meta:{ conj, deponent:dep } };

  // ---- present-stem synthetic forms ----
  const synth = (tableKey) => zip6(root, VERB_ENDINGS[tableKey][conj]);
  const infMinusE = chop(inf, "e"); // amār, monēr, reger, caper, audīr

  // indicative active / passive
  if(dep){
    out.indicative.present  = synth("presIndPass");
    out.indicative.imperfect= synth("impfIndPass");
    out.indicative.future   = synth("futIndPass");
  } else {
    out.indicative.present  = synth("presIndAct");
    out.indicative.imperfect= synth("impfIndAct");
    out.indicative.future   = synth("futIndAct");
    out.indicative.presentPassive  = synth("presIndPass");
    out.indicative.imperfectPassive= synth("impfIndPass");
    out.indicative.futurePassive   = synth("futIndPass");
  }

  // subjunctive present / imperfect
  if(dep){
    out.subjunctive.present  = synth("presSubjPass");
    out.subjunctive.imperfect= IMPF_SUBJ_PASS_END.map(e => infMinusE + e);
  } else {
    out.subjunctive.present  = synth("presSubjAct");
    out.subjunctive.imperfect= IMPF_SUBJ_ACT_END.map(e => infMinusE + e);
    out.subjunctive.presentPassive  = synth("presSubjPass");
    out.subjunctive.imperfectPassive= IMPF_SUBJ_PASS_END.map(e => infMinusE + e);
  }

  // perfect system
  const aux = (auxArr) => SUBJ => auxArr; // placeholder not used
  if(dep){
    // analytic with PPP (active meaning), participle agrees in number
    out.indicative.perfect      = analytic(supStem, SUM_PRES);
    out.indicative.pluperfect   = analytic(supStem, SUM_IMPF);
    out.indicative.futurePerfect= analytic(supStem, SUM_FUT);
    out.subjunctive.perfect     = analytic(supStem, SUM_PRES_SUBJ);
    out.subjunctive.pluperfect  = analytic(supStem, SUM_IMPF_SUBJ);
  } else {
    out.indicative.perfect      = zip6(perfStem, PERF_IND_ACT_END);
    out.indicative.pluperfect   = zip6(perfStem, PLUP_IND_ACT_END);
    out.indicative.futurePerfect= zip6(perfStem, FUTP_IND_ACT_END);
    out.subjunctive.perfect     = zip6(perfStem, PERF_SUBJ_ACT_END);
    out.subjunctive.pluperfect  = zip6(perfStem, PLUP_SUBJ_ACT_END);
    if(ppp){
      out.indicative.perfectPassive      = analytic(supStem, SUM_PRES);
      out.indicative.pluperfectPassive   = analytic(supStem, SUM_IMPF);
      out.indicative.futurePerfectPassive= analytic(supStem, SUM_FUT);
      out.subjunctive.perfectPassive     = analytic(supStem, SUM_PRES_SUBJ);
      out.subjunctive.pluperfectPassive  = analytic(supStem, SUM_IMPF_SUBJ);
    }
  }

  // imperatives
  const sg2 = { 1:root+"ā", 2:root+"ē", 3:root+"e", "3io":root+"e", 4:root+"ī" }[conj];
  const pl2 = { 1:root+"āte", 2:root+"ēte", 3:root+"ite", "3io":root+"ite", 4:root+"īte" }[conj];
  if(dep){
    out.imperative.presentSg = inf.replace(/ī$|ī$/,"") ; // overwritten below
    out.imperative.presentSg = { 1:root+"āre", 2:root+"ēre", 3:root+"ere", "3io":root+"ere", 4:root+"īre" }[conj];
    out.imperative.presentPl = { 1:root+"āminī", 2:root+"ēminī", 3:root+"iminī", "3io":root+"iminī", 4:root+"īminī" }[conj];
  } else {
    out.imperative.presentSg = sg2;
    out.imperative.presentPl = pl2;
  }

  // infinitives
  if(dep){
    out.infinitive.present = { 1:root+"ārī", 2:root+"ērī", 3:root+"ī", "3io":root+"ī", 4:root+"īrī" }[conj];
    out.infinitive.perfect = ppp ? ppp + " esse" : null;
    out.infinitive.future  = supStem ? supStem + "ūrus esse" : null;
  } else {
    out.infinitive.present = inf;
    out.infinitive.presentPassive = { 1:root+"ārī", 2:root+"ērī", 3:root+"ī", "3io":root+"ī", 4:root+"īrī" }[conj];
    out.infinitive.perfect = perfStem + "isse";
    out.infinitive.perfectPassive = ppp ? ppp + " esse" : null;
    out.infinitive.future = supStem ? supStem + "ūrus esse" : null;
    out.infinitive.futurePassive = supine ? supine + " īrī" : null;
  }

  // participles
  const presPplNom = { 1:root+"āns", 2:root+"ēns", 3:root+"ēns", "3io":root+"iēns", 4:root+"iēns" }[conj];
  const presPplStem= { 1:root+"ant", 2:root+"ent", 3:root+"ent", "3io":root+"ient", 4:root+"ient" }[conj];
  out.participle.presentActive = { nom:presPplNom, gen:presPplStem+"is" };
  if(ppp) out.participle.perfectPassive = ppp;            // active sense if deponent
  if(supStem) out.participle.futureActive = supStem + "ūrus";
  const gerStem = { 1:root+"and", 2:root+"end", 3:root+"end", "3io":root+"iend", 4:root+"iend" }[conj];
  out.participle.gerundive = gerStem + "us";

  // gerund (gen/dat/acc/abl)
  out.gerund = { gen:gerStem+"ī", dat:gerStem+"ō", acc:gerStem+"um", abl:gerStem+"ō" };

  // supine
  if(supine){ out.supine = { acc:supine, abl:supStem+"ū" }; }

  return out;
}

/* =====================================================================
   IRREGULAR VERBS (indicative + subjunctive + nonfinite essentials)
   ===================================================================== */
const SUM = {
  meta:{ conj:"irr", deponent:false },
  indicative:{
    present:["sum","es","est","sumus","estis","sunt"],
    imperfect:["eram","erās","erat","erāmus","erātis","erant"],
    future:["erō","eris","erit","erimus","eritis","erunt"],
    perfect:["fuī","fuistī","fuit","fuimus","fuistis","fuērunt"],

<script>

const MAC = { "ā":"a","ē":"e","ī":"i","ō":"o","ū":"u","Ā":"A","Ē":"E","Ī":"I","Ō":"O","Ū":"U" };
const stripMacrons = s => (s||"").replace(/[āēīōūĀĒĪŌŪ]/g, c => MAC[c]);
const norm = s => (s||"").normalize("NFC").trim().toLowerCase().replace(/\s+/g," ");
function gradeForm(input, correct, requireMacrons){
  const alts = String(correct).split("/").map(x=>x.trim());
  const a = norm(input);
  for(const c of alts){ if(a === norm(c)) return "correct"; }
  for(const c of alts){ if(stripMacrons(a) === stripMacrons(norm(c))) return requireMacrons ? "macron" : "correct"; }
  return "wrong";
}

const el = (tag, attrs={}, ...kids) => {
  const n = document.createElement(tag);
  for(const k in attrs){
    if(k === "class") n.className = attrs[k];
    else if(k === "html") n.innerHTML = attrs[k];
    else if(k.startsWith("on") && typeof attrs[k] === "function") n.addEventListener(k.slice(2), attrs[k]);
    else if(attrs[k] !== null && attrs[k] !== undefined) n.setAttribute(k, attrs[k]);
  }

};

/* ---------------------------------------------------------------------------

  catch(e){ return false; }
}
function MemoryStore(){
  const m = new Map();

    kind:"memory",
    getJSON:(k,d)=> m.has(k)? JSON.parse(m.get(k)) : d,
    setJSON:(k,v)=> m.set(k, JSON.stringify(v)),
    del:(k)=> m.delete(k)
  };
}
function LocalStore(){
  return {
    kind:"local",
    getJSON:(k,d)=>{ try{ const v=localStorage.getItem(k); return v? JSON.parse(v):d; }catch(e){ return d; } },
    setJSON:(k,v)=>{ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} },

const Cloud = {

      let waited=0; const iv=setInterval(()=>{
        if(window.LVDVS_FB){ clearInterval(iv); resolve(window.LVDVS_FB); }
        else if(window.LVDVS_FB_ERROR){ clearInterval(iv); reject(window.LVDVS_FB_ERROR); }
        else if((waited+=60) > 9000){ clearInterval(iv); reject(new Error("Firebase SDK load timeout")); }

  async start(onUser){
    this.fb = await this.waitForSDK();

      if(!user){ state.user=null; onUser(null); return; }

      kv.setJSON("lvdvs:profile:"+profile.uid, profile);
      state.user = profile;
      await this.hydrate(profile);
      onUser(profile);
    });
  },
  async loadOrCreateProfile(user){
    const { db, api } = this.fb;
    const ref = api.doc(db, "users", user.uid);
    let snap=null; try{ snap = await api.getDoc(ref); }catch(e){}
    if(snap && snap.exists && snap.exists()){
      const d = snap.data();
      return { uid:user.uid, displayName:d.displayName||user.email, email:user.email, role:d.role||"student", classIds:d.classIds||[] };
    }
    const su = this.pendingSignup || {};
    const profile = { uid:user.uid, displayName:su.displayName||user.email, email:user.email, role:su.role||"student", classIds:[] };
    try{ await api.setDoc(ref, { displayName:profile.displayName, email:profile.email, role:profile.role, classIds:[] }); }catch(e){}
    this.pendingSignup = null;
    return profile;
  },
  async hydrate(profile){
    const { db, api } = this.fb;
    try{ const ps=await api.getDoc(api.doc(db,"progress",profile.uid)); if(ps&&ps.exists&&ps.exists()) kv.setJSON("lvdvs:progress:"+profile.uid, ps.data()); }catch(e){}
    let classes=[];
    try{
      if(profile.role==="teacher"){
        const qs=await api.getDocs(api.query(api.collection(db,"classes"), api.where("teacherId","==",profile.uid)));
        qs.forEach(d=>classes.push(d.data()));

          try{ const us=await api.getDocs(api.query(api.collection(db,"users"), api.where("classIds","array-contains",c.id)));

        }

        for(const cid of (profile.classIds||[])){ const cs=await api.getDoc(api.doc(db,"classes",cid)); if(cs&&cs.exists&&cs.exists()) classes.push(cs.data()); }
      }

    kv.setJSON("lvdvs:assignments", assignments);

    try{
      if(profile.role==="teacher"){ for(const a of assignments){ const qs=await api.getDocs(api.query(api.collection(db,"attempts"), api.where("assignmentId","==",a.id))); qs.forEach(d=>attempts.push(d.data())); } }
      else { const qs=await api.getDocs(api.query(api.collection(db,"attempts"), api.where("studentUid","==",profile.uid))); qs.forEach(d=>attempts.push(d.data())); }

    const { db, api } = this.fb;

    catch(e){ return null; }

const BOX_INTERVAL = [0, 1, 3, 7, 16, 35]; // days by box level
function recordResult(itemKey, category, correct){
  const prog = DB.progress(state.user.uid);
  const it = prog.items[itemKey] || { box:0, due:0, seen:0, correct:0 };
  it.seen++; if(correct) it.correct++;
  it.box = correct ? Math.min(it.box+1, 5) : 0;
  it.due = now() + BOX_INTERVAL[it.box]*DAY;
  prog.items[itemKey] = it;
  const c = prog.stats[category] || { seen:0, correct:0 };
  c.seen++; if(correct) c.correct++; prog.stats[category] = c;
  prog.totalSeen++; if(correct) prog.totalCorrect++;
  const today = new Date().toDateString();
  if(prog.lastDay !== today){ prog.streak = (prog.lastDay && (Date.parse(today)-Date.parse(prog.lastDay))<=DAY*1.5)? prog.streak+1 : 1; prog.lastDay = today; }
  DB.setProgress(state.user.uid, prog);
}
function dueCount(){
  const prog = DB.progress(state.user.uid); const t = now();
  return Object.values(prog.items).filter(i=> i.due && i.due <= t && i.box>0).length;
}
function categoryWeight(category){
  const prog = DB.progress(state.user.uid);
  const c = prog.stats[category];
  if(!c || c.seen < 4) return 1.0;
  return 1.0 + (1 - c.correct/c.seen) * 2.5; // weak categories sampled more
}

  },
  parse: { label:"Parsing (form → analysis)", usesModule:true },
  translate: { label:"Translation (self-marked)" }
};
const TENSE_LABEL = { present:"present", imperfect:"imperfect", future:"future", perfect:"perfect", pluperfect:"pluperfect", futurePerfect:"future perfect" };
const NUM_LABEL = { sg:"singular", pl:"plural" };
const GEN_LABEL = { m:"masculine", f:"feminine", n:"neuter" };
const ORD = { "1":"1st","2":"2nd","3":"3rd" };
const noCompare = new Set(["omnis"]); // semantically non-gradable in the seed

/* ---------------------------------------------------------------------------
   5. form helpers built on the engine
--------------------------------------------------------------------------- */
function nounEntry(key){ return LEX.nouns.find(n=>n.key===key); }
function verbEntry(key){ return LEX.verbs.find(v=>v.key===key); }
function adjEntry(key){ return LEX.adjectives.find(a=>a.key===key); }

function verbForm(v, sel){
  const idx = (sel.number==="sg"?0:3) + (parseInt(sel.person,10)-1);
  let key = sel.tense;
  let table = sel.mood === "indicative" ? v.indicative : v.subjunctive;
  if(sel.mood === "subjunctive" && (sel.tense==="future" || sel.tense==="futurePerfect")) return null;
  if(sel.voice === "passive") key = key + "Passive";
  const arr = table && table[key];
  if(!arr) return null;
  const f = arr[idx];
  if(!f || /undefined/.test(f)) return null;
  return f;
}
/* enumerate valid verb slots for scope, filtering missing forms */
function verbSlots(v, tenses, moods, voices, deponent, irregular){
  const out = [];
  const useVoices = (deponent) ? ["active"] : voices;
  for(const tense of tenses)
    for(const mood of moods)
      for(const voice of useVoices)
        for(const person of ["1","2","3"])
          for(const number of ["sg","pl"]){
            const sel = { tense, mood, voice, person, number };
            if(verbForm(v, sel)) out.push(sel);
          }
  return out;
}

/* ---------------------------------------------------------------------------
   6. question generators  → {prompt, eyebrow, answer|analysis, kind, itemKey,
                              category, render(panel), lemma, paradigm}
--------------------------------------------------------------------------- */
function pickScopeKeys(module, sel){
  const cfg = SCOPE[module];
  let keys = [];
  cfg.groups.forEach(g => { if(sel.groups.includes(g.id)) keys = keys.concat(g.keys); });
  return keys.length ? keys : cfg.groups.flatMap(g=>g.keys);
}

function genDecline(sel){
  const keys = pickScopeKeys("decline", sel);
  const key = rand(keys); const e = nounEntry(key); const d = N.declineNoun(e);
  const num = rand(N.NUMS);
  const cas = rand(N.CASES);
  const answer = d[num][cas];
  return {
    kind:"produce", category:"decline:"+e.decl, itemKey:`decline:${key}:${cas}:${num}`,
    eyebrow:`Decline · ${ordinalDecl(e.decl)} declension`,
    prompt:`Give the <b>${N.CASE_LABEL[cas]} ${NUM_LABEL[num]}</b> of <span class="lat">${e.cite}</span> <span class="muted">(${e.gloss})</span>`,
    answer, lemma:e, caseHi:{cas,num}, paradigm:()=>paradigmNoun(e,{cas,num})
  };
}
function genConjugate(sel){
  const keys = pickScopeKeys("conjugate", sel);
  let tenses=[]; (SCOPE.conjugate.tenseGroups).forEach(t=>{ if(sel.tenses.includes(t.id)) tenses=tenses.concat(t.tenses); });
  if(!tenses.length) tenses = ["present","imperfect","future","perfect","pluperfect"];
  let moods = sel.moods.length ? SCOPE.conjugate.moods.filter(m=>sel.moods.includes(m.id)).map(m=>m.mood) : ["indicative"];
  let voices = sel.voices.length ? SCOPE.conjugate.voices.filter(v=>sel.voices.includes(v.id)).map(v=>v.voice) : ["active"];
  // choose a verb that yields at least one slot in scope
  let e, slots=[]; let guard=0;
  do { e = verbEntry(rand(keys)); const v=N.conjugateVerb(e);
       slots = verbSlots(v, tenses, moods, voices, e.deponent, !!e.irregular); guard++; }
  while(slots.length===0 && guard<30);
  const v = N.conjugateVerb(e);
  if(!slots.length){ return genConjugate({groups:["c1"],tenses:["tpres"],moods:["mind"],voices:["vact"]}); }
  const sl = rand(slots);
  const answer = verbForm(v, sl);
  const voiceTxt = e.deponent ? "(deponent)" : sl.voice;
  return {
    kind:"produce", category:"conjugate:"+(e.irregular?"irr":e.conj), itemKey:`conj:${e.key}:${sl.tense}:${sl.mood}:${sl.voice}:${sl.person}:${sl.number}`,
    eyebrow:`Conjugate · ${verbConjLabel(e)}`,
    prompt:`Give the <b>${ORD[sl.person]} ${NUM_LABEL[sl.number]} ${TENSE_LABEL[sl.tense]} ${sl.mood} ${voiceTxt}</b> of <span class="lat">${e.cite}</span> <span class="muted">(${e.gloss})</span>`,
    answer, lemma:e, paradigm:()=>paradigmVerbCell(e, sl)
  };
}
function genAdjAdv(sel){
  const keys = pickScopeKeys("adjadv", sel);
  const tasks = sel.tasks && sel.tasks.length ? sel.tasks : ["tdec","tcomp","tadv"];
  let task = rand(tasks);
  let e = adjEntry(rand(keys));
  if((task==="tcomp"||task==="tadv") && noCompare.has(e.key)){ const ok = keys.filter(k=>!noCompare.has(k)); e = adjEntry(rand(ok.length?ok:keys)); if(noCompare.has(e.key)) task="tdec"; }
  if(task==="tdec"){
    const d = e.type==="adj1" ? N.declineAdj1(e.m,e.f,e.n) : N.declineAdj3(e.nom, e.stem);
    const g = rand(["m","f","n"]); const num = rand(N.NUMS); const cas = rand(N.CASES);
    const answer = d[g][num][cas];
    return { kind:"produce", category:"adj:"+(e.type), itemKey:`adj:${e.key}:${g}:${cas}:${num}`,
      eyebrow:`Adjective · agreement`,
      prompt:`Give the <b>${GEN_LABEL[g]} ${N.CASE_LABEL[cas]} ${NUM_LABEL[num]}</b> of <span class="lat">${adjCitation(e)}</span> <span class="muted">(${e.gloss})</span>`,
      answer, lemma:e, paradigm:()=>paradigmAdj(e,g,{cas,num}) };
  }
  if(task==="tcomp"){
    const c = N.comparisonOf(e); const deg = rand(["comparative","superlative"]);
    const answer = c[deg];
    return { kind:"produce", category:"comparison", itemKey:`comp:${e.key}:${deg}`,
      eyebrow:`Comparison · ${c.irregular?"irregular":"regular"}`,
      prompt:`Give the <b>${deg}</b> (masc. nom. sg.) of <span class="lat">${c.positive}</span> <span class="muted">(${e.gloss})</span>`,
      answer, lemma:e, paradigm:()=>paradigmComparison(e) };
  }
  // adverb
  const a = N.makeAdverb(e); const deg = rand(["pos","comp","sup"]);
  const degLabel = {pos:"positive",comp:"comparative",sup:"superlative"}[deg];
  return { kind:"produce", category:"adverb", itemKey:`adv:${e.key}:${deg}`,
    eyebrow:`Adverb · ${a.irregular?"irregular":"regular"}`,
    prompt:`Give the <b>${degLabel} adverb</b> from <span class="lat">${adjCitation(e)}</span> <span class="muted">(${e.gloss})</span>`,
    answer:a[deg], lemma:e, paradigm:()=>paradigmAdverb(e) };
}
function genPronoun(sel){
  const keys = pickScopeKeys("pronoun", sel);
  let p, key, g, num, cas, answer, guard=0;
  do {
    key = rand(keys); p = N.declinePronoun(key); guard++;
    g = p.g ? rand(["m","f","n"]) : null; num = rand(N.NUMS);
    const forms = p.g ? p.forms[g][num] : p.forms[num];
    const avail = N.CASES.filter(c=>forms[c]);
    cas = rand(avail); answer = forms[cas];
  } while(!answer && guard<30);
  return { kind:"produce", category:"pronoun", itemKey:`pron:${key}:${g||"-"}:${cas}:${num}`,
    eyebrow:`Pronoun · ${key}`,
    prompt:`Give the <b>${g?GEN_LABEL[g]+" ":""}${N.CASE_LABEL[cas]} ${NUM_LABEL[num]}</b> of <span class="lat">${pronCitation(key)}</span> <span class="muted">(${p.gloss})</span>`,
    answer, lemma:{key}, paradigm:()=>paradigmPronoun(key,g,{cas,num}) };
}

/* ---- parsing: reverse index per lemma (form → set of analyses) ---- */
function genParse(sel){
  const base = sel.parseModule || "decline";
  if(base === "conjugate"){
    const keys = pickScopeKeys("conjugate", sel);
    const e = verbEntry(rand(keys)); const v = N.conjugateVerb(e);
    const idx = {};
    const tenses = ["present","imperfect","future","perfect","pluperfect","futurePerfect"];
    const moods = ["indicative","subjunctive"]; const voices=["active","passive"];
    for(const mood of moods) for(const tense of tenses) for(const voice of (e.deponent?["active"]:voices))
      for(const person of ["1","2","3"]) for(const number of ["sg","pl"]){
        const f = verbForm(v,{tense,mood,voice,person,number}); if(!f) continue;
        (idx[f] = idx[f]||[]).push({person,number,tense,mood,voice});
      }
    const forms = Object.keys(idx); const form = rand(forms);
    return { kind:"parseVerb", category:"parse:verb", itemKey:`parsev:${e.key}:${form}`,
      eyebrow:`Parse · verb`, form, analyses:idx[form], lemma:e,
      prompt:`Parse this form of <span class="lat">${e.cite||(e.pp?e.pp[0]:e.key)}</span> <span class="muted">(${e.gloss})</span>:`,
      paradigm:()=>null };
  }
  // nominal parse: nouns / adjectives / pronouns
  let pool = base; const sub = pool;
  let lemma, gen, hasGender=false, idx={};
  if(sub==="decline"){
    const keys = pickScopeKeys("decline", sel); const e = nounEntry(rand(keys)); lemma=e;
    const d = N.declineNoun(e);
    for(const num of N.NUMS) for(const cas of N.CASES){ const f=d[num][cas]; (idx[f]=idx[f]||[]).push({cas,num}); }
  } else if(sub==="adjadv"){
    const keys = pickScopeKeys("adjadv", sel); const e=adjEntry(rand(keys)); lemma=e; hasGender=true;
    const d = e.type==="adj1"?N.declineAdj1(e.m,e.f,e.n):N.declineAdj3(e.nom,e.stem);
    for(const g of ["m","f","n"]) for(const num of N.NUMS) for(const cas of N.CASES){ const f=d[g][num][cas]; (idx[f]=idx[f]||[]).push({g,cas,num}); }
  } else { // pronoun
    const keys = pickScopeKeys("pronoun", sel); const key=rand(keys); const p=N.declinePronoun(key); lemma={key, gloss:p.gloss}; hasGender=!!p.g;
    if(p.g){ for(const g of ["m","f","n"]) for(const num of N.NUMS) for(const cas of N.CASES){ const f=p.forms[g][num][cas]; if(f)(idx[f]=idx[f]||[]).push({g,cas,num}); } }
    else { for(const num of N.NUMS) for(const cas of N.CASES){ const f=p.forms[num][cas]; if(f)(idx[f]=idx[f]||[]).push({cas,num}); } }
  }
  const forms = Object.keys(idx); const form = rand(forms);
  return { kind:"parseNominal", category:"parse:nominal", itemKey:`parsen:${lemma.key}:${form}`,
    eyebrow:`Parse · ${sub==="adjadv"?"adjective":sub==="pronoun"?"pronoun":"noun"}`,
    form, analyses:idx[form], hasGender, lemma,
    prompt:`Parse this form of <span class="lat">${lemma.cite||lemma.lemma||pronCitation(lemma.key)}</span> <span class="muted">(${lemma.gloss||""})</span>:`,
    paradigm:()=>null };
}

/* ---- translation (self-marked) ---- */
const TRANSLATE_BANK = [
  { lat:"Arma virumque canō.", model:"I sing of arms and the man." },
  { lat:"Mīlitēs, hortātus ducem, in hostēs ruērunt.", model:"The soldiers, having encouraged the general, rushed against the enemy." },
  { lat:"Sī hoc dīxisset, omnēs eum audīvissent.", model:"If he had said this, everyone would have listened to him." },
  { lat:"Tantus erat clāmor ut nēmō vōcem ducis audīret.", model:"So great was the shouting that no one could hear the general's voice." },
  { lat:"Urbe captā, cīvēs ad templa cōnfūgērunt.", model:"When the city had been captured, the citizens fled to the temples." },
  { lat:"Rēx, quī fortissimus omnium erat, prīmus pugnāvit.", model:"The king, who was the bravest of all, fought first." },
  { lat:"Haec nōbīs facienda sunt antequam nox veniat.", model:"These things must be done by us before night comes." },
  { lat:"Caesar tam celeriter vēnit ut hostēs nōn parātī essent.", model:"Caesar came so quickly that the enemy were not prepared." }
];
function genTranslate(){
  const q = rand(TRANSLATE_BANK);
  return { kind:"selfmark", category:"translate", itemKey:`tr:${q.lat}`,
    eyebrow:"Translate · self-marked",
    prompt:`<span class="lat">${stripMacrons(q.lat)}</span>`, model:stripMacrons(q.model) };
}

function generate(session){
  const m = session.module, sel = session.scope;
  switch(m){
    case "decline": return genDecline(sel);
    case "conjugate": return genConjugate(sel);
    case "adjadv": return genAdjAdv(sel);
    case "pronoun": return genPronoun(sel);
    case "parse": return genParse(sel);
    case "translate": return genTranslate();
  }
}

/* ---------------------------------------------------------------------------
   7. paradigm reference renderers (case-colour coded)
--------------------------------------------------------------------------- */
function caseTable(rowsByNum, hi){
  const t = el("table",{class:"paradigm"});
  const head = el("tr",{}, el("th",{},""), el("th",{},"singular"), el("th",{},"plural"));
  t.appendChild(head);
  for(const cas of N.CASES){
    const tr = el("tr",{});
    tr.appendChild(el("td",{class:"case-label", "data-case":cas}, N.CASE_LABEL[cas]));
    for(const num of ["sg","pl"]){
      const v = rowsByNum[num] ? rowsByNum[num][cas] : "";
      const isHi = hi && hi.cas===cas && hi.num===num;
      tr.appendChild(el("td",{class:"form"+(isHi?" hi":""), "data-case":cas}, v||"—"));
    }
    t.appendChild(tr);
  }
  return t;
}
function paradigmNoun(e, hi){
  const d = N.declineNoun(e);
  return wrapPara(`${e.cite} — ${ordinalDecl(e.decl)} declension`, caseTable(d, hi));
}
function paradigmAdj(e,g,hi){
  const d = e.type==="adj1"?N.declineAdj1(e.m,e.f,e.n):N.declineAdj3(e.nom,e.stem);
  const wrap = el("div",{});
  wrap.appendChild(genderTabs(e, g, hi));
  return wrapPara(`${adjCitation(e)} — ${GEN_LABEL[g]}`, caseTable(d[g], hi));
}
function genderTabs(){ return el("div",{}); }
function paradigmPronoun(key,g,hi){
  const p = N.declinePronoun(key);
  const rows = p.g ? p.forms[g] : p.forms;
  return wrapPara(`${pronCitation(key)}${g?" — "+GEN_LABEL[g]:""}`, caseTable(rows, hi));
}
function paradigmComparison(e){
  const c = N.comparisonOf(e);
  const box = el("div",{class:"cmp"},
    chip("positive", c.positive), chip("comparative", c.comparative), chip("superlative", c.superlative));
  return wrapPara(`Comparison of ${adjCitation(e)}${c.irregular?" (irregular)":""}`, box);
}
function paradigmAdverb(e){
  const a = N.makeAdverb(e);
  const box = el("div",{class:"cmp"}, chip("positive", a.pos), chip("comparative", a.comp), chip("superlative", a.sup));
  return wrapPara(`Adverb of ${adjCitation(e)}${a.irregular?" (irregular)":""}`, box);
}
function paradigmVerbCell(e, sl){
  const v = N.conjugateVerb(e);
  const map = sl.mood==="indicative" ? v.indicative : v.subjunctive;
  let key = sl.tense + (sl.voice==="passive"?"Passive":"");
  const arr = map[key]||[];
  const t = el("table",{class:"paradigm verb"});
  t.appendChild(el("tr",{}, el("th",{},""), el("th",{},"singular"), el("th",{},"plural")));
  for(let p=0;p<3;p++){
    const tr = el("tr",{});
    tr.appendChild(el("td",{class:"case-label"}, ORD[String(p+1)]));
    [0,3].forEach(off=>{
      const i=off+p; const isHi=(parseInt(sl.person,10)-1===p)&&((sl.number==="sg")?off===0:off===3);
      tr.appendChild(el("td",{class:"form"+(isHi?" hi":"")}, arr[i]||"—"));
    });
    t.appendChild(tr);
  }
  const head = `${e.cite||(e.pp?e.pp[0]:e.key)} — ${TENSE_LABEL[sl.tense]} ${sl.mood} ${e.deponent?"(deponent)":sl.voice}`;
  return wrapPara(head, t);
}
function chip(label, val){ return el("div",{class:"degchip"}, el("span",{class:"deg"},label), el("span",{class:"lat"},val)); }
function wrapPara(title, node){ const w=el("div",{}); w.appendChild(el("div",{class:"para-title"}, title)); w.appendChild(node); return w; }

function ordinalDecl(d){ return ["","1st","2nd","3rd","4th","5th"][d]; }
function verbConjLabel(e){ if(e.irregular) return "irregular"; if(e.conj==="3io") return "mixed conj."+(e.deponent?" deponent":""); return e.conj+(e.conj===1?"st":e.conj===2?"nd":e.conj===3?"rd":"th")+" conj."+(e.deponent?" deponent":""); }
function adjCitation(e){ return e.cite || (e.type==="adj1" ? `${e.m}, ${e.f}, ${e.n}` : `${e.nom.m}, ${e.nom.f}, ${e.nom.n}`); }
function pronCitation(key){ const map={ego:"ego",tu:"tu",se:"sui (reflexive)",is:"is, ea, id",hic:"hic, haec, hoc",ille:"ille, illa, illud",ipse:"ipse, ipsa, ipsum",qui:"qui, quae, quod",quis:"quis, quid"}; return map[key]||key; }

function stat(v,l){ return el("div",{class:"stat"}, el("span",{class:"statn"}, String(v)), el("span",{class:"statl"}, l)); }
function field(label, node){ return el("div",{class:"fieldrow"}, el("div",{class:"fieldlabel"}, label), node); }

function scopeControls(module, main){
  const cfg = SCOPE[module]; const sc = setupChoice.scope[module] || (setupChoice.scope[module]={});
  const box = el("div",{class:"scope"});
  if(module==="syntax" || module==="translate"){
    box.appendChild(el("p",{class:"muted small"}, module==="syntax"
      ? "Identify the dominant construction in each sentence."
      : "Read each sentence, translate it, then reveal the model and mark yourself."));
    return field("Scope", box);
  }
  if(module==="parse"){
    const pm = el("div",{class:"chooser"});
    [["decline","Nouns"],["adjadv","Adjectives"],["pronoun","Pronouns"],["conjugate","Verbs"]].forEach(([v,l])=>{
      pm.appendChild(el("button",{class:"choice small"+((sc.parseModule||"decline")===v?" sel":""), onclick:()=>{ sc.parseModule=v; sc.groups=DEFAULT_SCOPE[v==="decline"?"decline":v].groups.slice(); renderHome(main); }}, l));
    });
    box.appendChild(field("Parse from", pm));
    const srcMod = sc.parseModule||"decline";
    box.appendChild(checkGroup(SCOPE[srcMod].groups, sc, "groups", main));
    return field("Scope", box);
  }
  // groups
  box.appendChild(checkGroup(cfg.groups, sc, "groups", main));
  if(module==="conjugate"){
    box.appendChild(subhead("Tenses"));
    box.appendChild(checkGroup(cfg.tenseGroups, sc, "tenses", main));
    box.appendChild(subhead("Mood / voice"));
    const mv = el("div",{class:"checkrow"});
    cfg.moods.forEach(o=> mv.appendChild(checkbox(o.label, sc, "moods", o.id, main)));
    cfg.voices.forEach(o=> mv.appendChild(checkbox(o.label, sc, "voices", o.id, main)));
    box.appendChild(mv);
  }
  if(module==="adjadv"){
    box.appendChild(subhead("Tasks"));
    box.appendChild(checkGroup(cfg.tasks, sc, "tasks", main));
  }
  return field("Scope", box);
}
function subhead(t){ return el("div",{class:"subhead"}, t); }
function checkGroup(options, sc, field, main){
  const row = el("div",{class:"checkrow"});
  options.forEach(o=> row.appendChild(checkbox(o.label, sc, field, o.id, main)));
  return row;
}
function checkbox(label, sc, field, id, main){
  if(!Array.isArray(sc[field])) sc[field] = [];
  const checked = sc[field].includes(id);
  return el("label",{class:"chk"+(checked?" on":"")},
    el("input",{type:"checkbox", checked:checked?"checked":null, onchange:(e)=>{
      const set = new Set(sc[field]); if(e.target.checked) set.add(id); else set.delete(id);
      sc[field] = Array.from(set); renderHome(main);
    }}), el("span",{}, label));
}

function startSession(){
  const m = setupChoice.module;
  const scope = setupChoice.scope[m] || {};
  state.session = { module:m, scope, mode:setupChoice.mode, n:0, correct:0, target: setupChoice.mode==="quiz"?state.settings.quizCount:Infinity, done:false, results:[], current:null };
  nextQuestion();
  setView("drill");
}

/* ---------- drill ---------- */
function nextQuestion(){ const s=state.session; s.current = generate(s); s.answered=false; }

function renderDrill(main){
  const s = state.session;
  if(!s){ setView("home"); return; }
  if(s.done){ return renderSummary(main); }
  const q = s.current;

  const head = el("div",{class:"drillhead"},
    el("p",{class:"eyebrow"}, q.eyebrow),
    el("div",{class:"progressbar"},
      el("span",{}, s.mode==="quiz"? `Question ${s.n+1} / ${s.target}` : `Answered ${s.n}`),
      el("button",{class:"linklike", onclick:endSession}, "end")));

  const panel = el("section",{class:"tablet"});
  panel.appendChild(el("div",{class:"tablet-eyebrow"}, "rogatio"));
  panel.appendChild(el("div",{class:"prompt", html:q.prompt}));

  const answerArea = el("div",{class:"answerArea"});
  const feedback = el("div",{class:"feedback"});

  if(q.kind==="produce"){
    const input = el("input",{class:"answer-input lat", type:"text", autocomplete:"off", autocapitalize:"off", spellcheck:"false", placeholder:"type the form…"});
    const submit = el("button",{class:"primary", onclick:()=>submitProduce(q,input,feedback,submit)}, "Check");
    input.addEventListener("keydown",(e)=>{ if(e.key==="Enter"){ e.preventDefault(); if(!s.answered) submitProduce(q,input,feedback,submit); else advance(); } });
    answerArea.appendChild(el("div",{class:"inputrow"}, input, submit));
    setTimeout(()=>input.focus(),30);
  }
  else if(q.kind==="parseNominal" || q.kind==="parseVerb"){
    answerArea.appendChild(el("div",{class:"bigform lat"}, q.form));
    const sel = parseSelectors(q);
    answerArea.appendChild(sel.node);
    const submit = el("button",{class:"primary", onclick:()=>submitParse(q,sel,feedback,submit)}, "Check");
    answerArea.appendChild(submit);
  }
  else if(q.kind==="mcq"){
    const opts = el("div",{class:"mcq"});
    q.options.forEach((o,i)=>{
      opts.appendChild(el("button",{class:"mcqbtn", onclick:()=>submitMCQ(q,o,opts,feedback)}, el("span",{class:"mcqnum"}, String(i+1)), el("span",{}, o)));
    });
    answerArea.appendChild(opts);
    document.onkeydown = (e)=>{ const n=parseInt(e.key,10); if(n>=1&&n<=q.options.length&&!s.answered){ submitMCQ(q,q.options[n-1],opts,feedback); } };
  }
  else if(q.kind==="selfmark"){
    const revealBtn = el("button",{class:"primary", onclick:()=>{
      feedback.innerHTML="";
      feedback.appendChild(el("div",{class:"model"}, el("span",{class:"muted small"},"Model translation"), el("div",{}, q.model)));
      feedback.appendChild(el("div",{class:"selfmark"},
        el("button",{class:"ok-btn", onclick:()=>{ markSelf(q,true,feedback); }}, "I had it"),
        el("button",{class:"err-btn", onclick:()=>{ markSelf(q,false,feedback); }}, "Missed it")));
    }}, "Reveal model");
    answerArea.appendChild(el("textarea",{class:"answer-area lat", rows:"2", placeholder:"type your translation, then reveal…"}));
    answerArea.appendChild(revealBtn);
  }

  panel.appendChild(answerArea);
  panel.appendChild(feedback);

  main.appendChild(head);
  main.appendChild(panel);

  // paradigm reference — revealed only after the question is answered
  if(q.paradigm){
    const para = q.paradigm();
    if(para){
      const det = el("details",{class:"reference", id:"paradigmRef", style: s.answered ? "" : "display:none"});
      if(s.answered) det.open = true;
      det.appendChild(el("summary",{}, "Paradigm reference"));
      det.appendChild(para);
      main.appendChild(det);
    }
  }
  main.appendChild(caseKey());
}

function macronToolbar(){ return null; }


function submitProduce(q,input,feedback,submitBtn){
  const s=state.session; if(s.answered) return;
  const verdict = gradeForm(input.value, q.answer, false);
  const correct = verdict==="correct";
  s.answered=true;
  recordResult(q.itemKey, q.category, correct);
  s.n++; if(correct) s.correct++;
  input.classList.add(correct?"good":"bad"); input.disabled=true;
  submitBtn.textContent="Next"; submitBtn.onclick=advance;
  feedback.innerHTML="";
  feedback.appendChild(verdictLine(verdict, q.answer));
  revealParadigm();
  endOrContinue(s);
}
function verdictLine(verdict, answer){
  if(verdict==="correct") return el("div",{class:"vline ok"}, el("b",{},"Correct."), el("span",{class:"lat"}, " "+answer));
  if(verdict==="macron") return el("div",{class:"vline warn"}, el("b",{},"Macron length off."), el("span",{}," The answer is "), el("span",{class:"lat"}, answer));
  return el("div",{class:"vline err"}, el("b",{},"Not quite."), el("span",{}," The answer is "), el("span",{class:"lat"}, answer));
}
function advance(){ const s=state.session; if(s.done){ renderApp(); return; } nextQuestion(); renderApp(); }
function revealParadigm(){ const p=document.getElementById("paradigmRef"); if(p){ p.style.display=""; p.open=true; } }

function parseSelectors(q){
  const node = el("div",{class:"parsegrid"});
  const sels = {};
  function pick(name, label, options, labels){
    const s = el("select",{class:"parse-select"});
    s.appendChild(el("option",{value:""}, label));
    options.forEach(o=> s.appendChild(el("option",{value:o}, labels? labels[o] : o)));
    sels[name]=s; node.appendChild(el("label",{class:"pcell"}, el("span",{class:"pl small muted"},label), s));
  }
  if(q.kind==="parseNominal"){
    pick("cas","case", N.CASES, N.CASE_LABEL);
    pick("num","number", N.NUMS, NUM_LABEL);
    if(q.hasGender) pick("g","gender", ["m","f","n"], GEN_LABEL);
  } else {
    pick("person","person", ["1","2","3"], {"1":"1st","2":"2nd","3":"3rd"});
    pick("number","number", N.NUMS, NUM_LABEL);
    pick("tense","tense", ["present","imperfect","future","perfect","pluperfect","futurePerfect"], TENSE_LABEL);
    pick("mood","mood", ["indicative","subjunctive"], {indicative:"indicative",subjunctive:"subjunctive"});
    pick("voice","voice", ["active","passive"], {active:"active",passive:"passive"});
  }
  return { node, sels };
}
function submitParse(q,sel,feedback,submitBtn){
  const s=state.session; if(s.answered) return;
  const got = {}; let blank=false;
  for(const k in sel.sels){ const v=sel.sels[k].value; if(!v) blank=true; got[k]=v; }
  if(blank){ feedback.innerHTML=""; feedback.appendChild(el("div",{class:"vline warn"},"Select every box.")); return; }
  const match = q.analyses.some(a=>{
    return Object.keys(a).every(k=> String(a[k])===String(got[k==="cas"?"cas":k]||got[k]));
  });
  s.answered=true; recordResult(q.itemKey,q.category,match); s.n++; if(match) s.correct++;
  feedback.innerHTML="";
  feedback.appendChild(el("div",{class:"vline "+(match?"ok":"err")}, el("b",{}, match?"Correct.":"Not quite.")));
  feedback.appendChild(el("div",{class:"analyses"}, el("span",{class:"muted small"},"Valid analyses: "),
    el("span",{}, q.analyses.map(describeAnalysis).join("  ·  "))));
  submitBtn.textContent="Next"; submitBtn.onclick=advance;
  for(const k in sel.sels) sel.sels[k].disabled=true;
  revealParadigm();
  endOrContinue(s);
}
function describeAnalysis(a){
  if(a.tense) return `${ORD[a.person]} ${a.number} ${TENSE_LABEL[a.tense]} ${a.mood} ${a.voice}`;
  return `${a.g?GEN_LABEL[a.g]+" ":""}${N.CASE_LABEL[a.cas]} ${NUM_LABEL[a.num]}`;
}
function submitMCQ(q,choice,opts,feedback){
  const s=state.session; if(s.answered) return; s.answered=true;
  const correct = choice===q.answer;
  recordResult(q.itemKey,q.category,correct); s.n++; if(correct) s.correct++;
  Array.from(opts.children).forEach(b=>{ b.disabled=true; const t=b.textContent.replace(/^\d/,"").trim(); if(t===q.answer) b.classList.add("right"); else if(t===choice) b.classList.add("wrongpick"); });
  feedback.innerHTML="";
  feedback.appendChild(el("div",{class:"vline "+(correct?"ok":"err")}, el("b",{}, correct?"Correct.":"Not quite.")));
  feedback.appendChild(el("div",{class:"note small"}, q.note));
  feedback.appendChild(el("button",{class:"primary", onclick:advance}, "Next"));
  document.onkeydown=null;
  endOrContinue(s);
}
function markSelf(q,correct,feedback){
  const s=state.session; if(s.answered) return; s.answered=true;
  recordResult(q.itemKey,q.category,correct); s.n++; if(correct) s.correct++;
  feedback.appendChild(el("button",{class:"primary", onclick:advance}, "Next"));
  endOrContinue(s);
}
function endOrContinue(s){ if(s.mode==="quiz" && s.n>=s.target){ s.done=true; } }

function endSession(){ const s=state.session; if(!s) return setView("home"); s.done=true; renderApp(); }

/* ---------- progress ---------- */
function renderProgress(main){
  const prog = DB.progress(state.user.uid);
  const acc = prog.totalSeen? Math.round(100*prog.totalCorrect/prog.totalSeen):0;
  main.appendChild(el("section",{class:"hero compact"},
    el("p",{class:"eyebrow"},"Ratio"),
    el("h1",{class:"display"},"Your progress"),
    el("div",{class:"herostats"},
      stat(acc+"%","lifetime accuracy"), stat(prog.streak||0,"day streak"),
      stat(dueCount(),"due for review"), stat(Object.keys(prog.items).length,"forms tracked"))));

  const cats = Object.entries(prog.stats).sort((a,b)=> (a[1].correct/a[1].seen) - (b[1].correct/b[1].seen));
  const card = el("section",{class:"card"});
  card.appendChild(el("h2",{class:"cardh"},"Accuracy by category"));
  if(!cats.length) card.appendChild(el("p",{class:"muted"},"No data yet. Complete a drill to populate this."));
  cats.forEach(([cat,c])=>{
    const p = Math.round(100*c.correct/c.seen);
    card.appendChild(el("div",{class:"bar"},
      el("div",{class:"barlabel"}, prettyCat(cat)),
      el("div",{class:"bartrack"}, el("div",{class:"barfill", style:`width:${p}%`})),
      el("div",{class:"barval"}, `${p}% · ${c.seen}`)));
  });
  main.appendChild(card);

  // weakest forms / review queue
  const t=now();
  const due = Object.entries(prog.items).filter(([k,i])=>i.due&&i.due<=t&&i.box>0).slice(0,40);
  const weak = Object.entries(prog.items).filter(([k,i])=>i.seen>=2 && i.correct/i.seen<0.6).slice(0,40);
  const q = el("section",{class:"card"});
  q.appendChild(el("h2",{class:"cardh"},"Review queue"));
  q.appendChild(el("p",{class:"muted small"}, `${due.length} forms are due now; ${weak.length} forms are below 60% accuracy.`));
  const list = el("div",{class:"mistakes"});
  (weak.length?weak:due).slice(0,24).forEach(([k,i])=> list.appendChild(el("span",{class:"misitem"}, k.split(":").slice(1).join(" "), el("span",{class:"misacc"}, ` ${Math.round(100*i.correct/Math.max(i.seen,1))}%`))));
  q.appendChild(list);
  main.appendChild(q);
}
function prettyCat(cat){
  const [a,b]=cat.split(":");
  const map={decline:"Noun decl.",conjugate:"Verb conj.",adj:"Adjective",comparison:"Comparison",adverb:"Adverb",pronoun:"Pronoun",parse:"Parsing",syntax:"Syntax",translate:"Translation"};
  return (map[a]||a)+(b?` · ${b}`:"");
}

function startAssignment(a){
  state.session = { module:a.module, scope:a.scope, mode:"quiz", n:0, correct:0, target:a.count, done:false, assignmentId:a.id, onDone:(pct)=>{
    const arr=DB.attempts(); arr.push({ id:uid4(), assignmentId:a.id, studentUid:state.user.uid, studentName:state.user.displayName, pct, when:now() }); DB.setAttempts(arr);
  }, current:null };
  // wrap end to record attempt
  nextQuestion(); setView("drill");
}
// hook: when an assignment quiz finishes, record attempt
const _renderSummary = renderSummary;
renderSummary = function(main){
  const s=state.session;
  if(s.assignmentId && s.onDone && !s._recorded){ s._recorded=true; s.onDone(s.n? Math.round(100*s.correct/s.n):0); }
  _renderSummary(main);
};

/* ---------------------------------------------------------------------------
   9. boot
--------------------------------------------------------------------------- */
function boot(){
  const saved = kv.getJSON("lvdvs:settings", null);
  if(saved) state.settings = Object.assign(state.settings, saved);
  document.documentElement.setAttribute("data-theme", state.settings.theme);
  if(FIREBASE_ENABLED){
    renderApp(); // shows "Connecting…" until auth resolves
    Cloud.start((user)=>{ state._teacherSynced=false; renderApp(); })
         .catch(()=>{ Cloud.active=false; ensureLocalUserForced(); renderApp(); });
  } else {
    ensureLocalUser();
    renderApp();
  }
}
function ensureLocalUserForced(){
  let p = DB.profile("local");
  if(!p){ p = { uid:"local", displayName:"Student", role:"student", classIds:[] }; kv.setJSON("lvdvs:profile:local", p); }
  state.user = p;
}
if(document.readyState==="loading") document.addEventListener("DOMContentLoaded", boot); else boot();

})();
