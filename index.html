function renderTable(q){
  q._cells = [];
  const wrap = el("div",{class:"tablewrap"});
  q.tables.forEach(tb=>{
    if(tb.caption) wrap.appendChild(el("div",{class:"tablecap"}, tb.caption));
    const t = el("table",{class:"filltable"});
    const head = el("tr",{}, el("th",{class:"corner"},""));
    tb.colHeads.forEach(h=> head.appendChild(el("th",{}, h)));
    t.appendChild(head);
    tb.rows.forEach(row=>{
      const tr = el("tr",{});
      tr.appendChild(el("td",{class:"rowlab"+(row.caseTag?" case-label":""), "data-case":row.caseTag||null}, row.label));
      row.cells.forEach(cell=>{
        const td = el("td",{});
        if(cell.answer){
          const inp = el("input",{class:"cellinput lat", type:"text", autocomplete:"off", autocapitalize:"off", spellcheck:"false"});
          inp.addEventListener("keydown",(e)=>{ if(e.key==="Enter"){ e.preventDefault(); e.stopPropagation(); if(!state.session.answered && q._submitBtn) q._submitBtn.click(); } });
          td.appendChild(inp);
          q._cells.push({ el:inp, td, cell });
        } else td.appendChild(el("span",{class:"cellblank"},"—"));
        tr.appendChild(td);
      });
      t.appendChild(tr);
    });
    wrap.appendChild(t);
  });
  setTimeout(()=>{ const f=wrap.querySelector("input"); if(f) f.focus(); },30);

function submitTable(q, feedback, submitBtn){
  const s=state.session; if(s.answered) return; s.answered=true;
  let total=0, correct=0;
  q._cells.forEach(({el:inp, td, cell})=>{
    total++;
    const ok = gradeForm(inp.value, cell.answer, false)==="correct";
    if(ok) correct++;
    inp.classList.add(ok?"good":"bad"); inp.disabled=true;
    if(!ok) td.appendChild(el("div",{class:"cellans lat"}, cell.answer));
    recordResult(cell.itemKey, cell.category||q.category, ok);
  });
  s.n += total; s.correct += correct;
  submitBtn.textContent="Next"; submitBtn.onclick=advance;
  feedback.innerHTML="";
  const cls = correct===total ? "ok" : (correct>=Math.ceil(total*0.6) ? "warn" : "err");
  feedback.appendChild(el("div",{class:"vline "+cls}, el("b",{}, `${correct} / ${total} correct`)));
  revealParadigm();
  enableEnterAdvance();
  endOrContinue(s);
}

function parseSelectors(q){
  const node = el("div",{class:"parsegrid"});
  const sels = {};
  function pick(name, label, options, labels){
    const s = el("select",{class:"parse-select"});
    s.appendChild(el("option",{value:""}, label));
    options.forEach(o=> s.appendChild(el("option",{value:o}, labels? labels[o] : o)));
    sels[name]=s; node.appendChild(el("label",{class:"pcell"}, el("span",{class:"pl small muted"},label), s));
  }
  if(q.kind==="parseNominal"){
    pick("cas","case", N.CASES, N.CASE_LABEL);
    pick("num","number", N.NUMS, NUM_LABEL);
    if(q.hasGender) pick("g","gender", ["m","f","n"], GEN_LABEL);
  } else {
    pick("person","person", ["1","2","3"], {"1":"1st","2":"2nd","3":"3rd"});
    pick("number","number", N.NUMS, NUM_LABEL);
    pick("tense","tense", ["present","imperfect","future","perfect","pluperfect","futurePerfect"], TENSE_LABEL);
    pick("mood","mood", ["indicative","subjunctive"], {indicative:"indicative",subjunctive:"subjunctive"});
    pick("voice","voice", ["active","passive","deponent"], {active:"active",passive:"passive",deponent:"deponent"});
  }
  return { node, sels };
}
function submitParse(q,sel,feedback,submitBtn){
  const s=state.session; if(s.answered) return;
  const got = {}; let blank=false;
  for(const k in sel.sels){ const v=sel.sels[k].value; if(!v) blank=true; got[k]=v; }
  if(blank){ feedback.innerHTML=""; feedback.appendChild(el("div",{class:"vline warn"},"Select every box.")); return; }
  const match = q.analyses.some(a=>{
    return Object.keys(a).every(k=> String(a[k])===String(got[k==="cas"?"cas":k]||got[k]));
  });
  s.answered=true; recordResult(q.itemKey,q.category,match); s.n++; if(match) s.correct++;
  feedback.innerHTML="";
  feedback.appendChild(el("div",{class:"vline "+(match?"ok":"err")}, el("b",{}, match?"Correct.":"Not quite.")));
  feedback.appendChild(el("div",{class:"analyses"}, el("span",{class:"muted small"},"Valid analyses: "),
    el("span",{}, q.analyses.map(describeAnalysis).join("  ·  "))));
  submitBtn.textContent="Next"; submitBtn.onclick=advance;
  for(const k in sel.sels) sel.sels[k].disabled=true;
  revealParadigm();
  enableEnterAdvance();
  endOrContinue(s);
}
function describeAnalysis(a){
  if(a.tense) return `${ORD[a.person]} ${a.number} ${TENSE_LABEL[a.tense]} ${a.mood} ${a.voice}`;
  return `${a.g?GEN_LABEL[a.g]+" ":""}${N.CASE_LABEL[a.cas]} ${NUM_LABEL[a.num]}`;
}
function submitMCQ(q,choice,opts,feedback){
  const s=state.session; if(s.answered) return; s.answered=true;
  const correct = choice===q.answer;
  recordResult(q.itemKey,q.category,correct); s.n++; if(correct) s.correct++;
  Array.from(opts.children).forEach(b=>{ b.disabled=true; const t=b.textContent.replace(/^\d/,"").trim(); if(t===q.answer) b.classList.add("right"); else if(t===choice) b.classList.add("wrongpick"); });
  feedback.innerHTML="";
  feedback.appendChild(el("div",{class:"vline "+(correct?"ok":"err")}, el("b",{}, correct?"Correct.":"Not quite.")));
  feedback.appendChild(el("div",{class:"note small"}, q.note));
  feedback.appendChild(el("button",{class:"primary", onclick:advance}, "Next"));
  document.onkeydown=null;
  endOrContinue(s);
}
function markSelf(q,correct,feedback){
  const s=state.session; if(s.answered) return; s.answered=true;
  recordResult(q.itemKey,q.category,correct); s.n++; if(correct) s.correct++;
  feedback.appendChild(el("button",{class:"primary", onclick:advance}, "Next"));
  enableEnterAdvance();
  endOrContinue(s);
}

/* ---------- speed runs (fill a whole table against the clock) ---------- */
const SPEED_EVENTS = [
  { id:"noun1", label:"1st declension" }, { id:"noun2", label:"2nd declension" },
  { id:"noun3", label:"3rd declension" }, { id:"noun4", label:"4th declension" },
  { id:"noun5", label:"5th declension" },
  { id:"adj",   label:"Adjectives" },
  { id:"ppl",   label:"Participles" },
  { id:"inf",   label:"Infinitives" },
  { id:"ger",   label:"Gerund & gerundive" }
];
function speedGen(ev){
  if(/^noun[1-5]$/.test(ev)){
    const d = +ev.slice(4);
    const pool = LEX.nouns.filter(n=>n.decl===d && !n.noPlural);
    const e = rand(pool); const dd = N.declineNoun(e); const cat = "decline:"+e.decl;
    const rows = N.CASES.map(cas=>({ label:N.CASE_LABEL[cas], caseTag:cas,
      cells:["sg","pl"].map(nm=>({ answer:dd[nm][cas], itemKey:`decline:${e.key}:${cas}:${nm}`, category:cat })) }));
    return { prompt:`Decline <span class="lat">${e.cite}</span> <span class="muted">(${e.gloss})</span>`,
      tables:[{ colHeads:["singular","plural"], rows }] };
  }
  if(ev==="adj"){
    const e = rand(LEX.adjectives);
    const d = e.type==="adj1" ? N.declineAdj1(e.m,e.f,e.n) : N.declineAdj3(e.nom,e.stem);
    const cat = "adj:"+e.type;
    return { prompt:`Decline <span class="lat">${adjCitation(e)}</span> <span class="muted">(${e.gloss})</span> — all genders`,
      tables: genderedTables(d, (g,num,cas)=>`adj:${e.key}:${g}:${cas}:${num}`, cat) };
  }
  if(ev==="ppl"){
    let e, v, type=null, pf=null, guard=0;
    do{ e=rand(LEX.verbs); v=N.conjugateVerb(e);
        const avail=["present","perfect","future"].filter(t=>participleForms(v,t));
        type=avail.length?rand(avail):null; pf=type?participleForms(v,type):null; guard++; }while(!pf&&guard<60);
    if(!pf){ e=LEX.verbs.find(x=>!x.irregular); v=N.conjugateVerb(e); type="present"; pf=participleForms(v,"present"); }
    const cat="participle:"+type;
    return { prompt:`Decline the <b>${type} participle</b> of <span class="lat">${e.cite}</span> — all genders`,
      tables: genderedTables(pf.decl, (g,num,cas)=>`ppl:${e.key}:${type}:${g}:${cas}:${num}`, cat) };
  }
  if(ev==="inf"){
    let e, v, all=[], guard=0;
    do{ e=rand(LEX.verbs); v=N.conjugateVerb(e); all=infinitiveForms(v,e); guard++; }
    while((e.deponent || e.irregular || all.length<6) && guard<80);
    if(all.length<6){ e=LEX.verbs.find(x=>!x.irregular&&!x.deponent); v=N.conjugateVerb(e); all=infinitiveForms(v,e); }
    const rows = all.map(o=>({ label:o.label,
      cells:[{ answer:o.value, itemKey:`inf:${e.key}:${o.label}`, category:"infinitive:"+((o.tense||"present")+"-"+(o.voice||"act")) }] }));
    return { prompt:`Give every <b>infinitive</b> of <span class="lat">${e.cite}</span> <span class="muted">(${e.gloss})</span>`,
      tables:[{ colHeads:["form"], rows }] };
  }
  // ger: the gerund cases plus the full gerundive of one verb
  let e, v, guard=0;
  do{ e=rand(LEX.verbs); v=N.conjugateVerb(e); guard++; }
  while((!gerundForms(v) || !gerundiveDecl(v)) && guard<80);
  if(!gerundForms(v) || !gerundiveDecl(v)){ e=LEX.verbs.find(x=>!x.irregular&&!x.deponent); v=N.conjugateVerb(e); }
  const g=gerundForms(v), gd=gerundiveDecl(v);
  const gRows = ["acc","gen","dat","abl"].filter(c=>g[c]).map(c=>({ label:N.CASE_LABEL[c],
    cells:[{ answer:g[c], itemKey:`ger:${e.key}:${c}`, category:"gerund:gerund" }] }));
  const gvTables = genderedTables(gd.decl, (gg,num,cas)=>`gerv:${e.key}:${gg}:${cas}:${num}`, "gerund:gerundive");
  gvTables.forEach(t=> t.caption = "Gerundive · "+t.caption);
  return { prompt:`Give the <b>gerund and gerundive</b> of <span class="lat">${e.cite}</span> <span class="muted">(${e.gloss})</span>`,
    tables:[{ caption:"Gerund", colHeads:["form"], rows:gRows }, ...gvTables] };
}
function fmtMs(ms){
  const m=Math.floor(ms/60000), s=(ms%60000)/1000;
  return m ? `${m}:${s.toFixed(1).padStart(4,"0")}` : `${s.toFixed(1)}s`;
}
function startSpeedRun(){
  const ev = state.ui.speedEvent || "noun1";
  state._speedRun = { ev, q:speedGen(ev), started:now(), errors:0, firstTry:{}, done:false, ms:null };
  renderApp();
}
function finishSpeedRun(run){
  run.done = true; run.ms = now() - run.started;
  if(state._speedIv){ clearInterval(state._speedIv); state._speedIv=null; }
  const prog = DB.progress(state.user.uid);
  prog.speed = prog.speed || {};
  const cur = prog.speed[run.ev];
  run.isBest = !cur || run.ms < cur.ms;
  if(run.isBest) prog.speed[run.ev] = { ms:run.ms, when:now(), errors:run.errors };
  DB.setProgress(state.user.uid, prog);
  pushScores(prog);
  renderApp();

function renderSpeedTable(run){
  const q = run.q; const cells=[];
  const wrap = el("div",{class:"tablewrap"});
  q.tables.forEach(tb=>{
    if(tb.caption) wrap.appendChild(el("div",{class:"tablecap"}, tb.caption));
    const t = el("table",{class:"filltable"});
    const head = el("tr",{}, el("th",{class:"corner"},""));
    tb.colHeads.forEach(h=> head.appendChild(el("th",{}, h)));
    t.appendChild(head);
    tb.rows.forEach(row=>{
      const tr = el("tr",{});
      tr.appendChild(el("td",{class:"rowlab"+(row.caseTag?" case-label":""), "data-case":row.caseTag||null}, row.label));
      row.cells.forEach(cell=>{
        const td = el("td",{});
        if(cell.answer){
          const inp = el("input",{class:"cellinput lat", type:"text", autocomplete:"off", autocapitalize:"off", spellcheck:"false"});
          td.appendChild(inp);
          cells.push({ inp, cell });
        } else td.appendChild(el("span",{class:"cellblank"},"—"));
        tr.appendChild(td);
      });
      t.appendChild(tr);
    });
    wrap.appendChild(t);
  });
  const focusNext = from => {
    const i = cells.findIndex(c=>c.inp===from);
    const nxt = cells.slice(i+1).concat(cells.slice(0,i)).find(c=>!c.inp.disabled);
    if(nxt) nxt.inp.focus();
  };
  cells.forEach(({inp, cell})=>{
    const commit = ()=>{
      if(run.done || inp.disabled) return;
      const val = inp.value.trim(); if(!val) return;
      const ok = gradeForm(val, cell.answer, false)==="correct";
      if(!(cell.itemKey in run.firstTry)){ run.firstTry[cell.itemKey]=ok; recordResult(cell.itemKey, cell.category, ok); }
      if(ok){
        inp.classList.remove("bad"); inp.classList.add("good"); inp.disabled=true;
        if(cells.every(c=>c.inp.disabled)) finishSpeedRun(run); else focusNext(inp);
      } else { run.errors++; inp.classList.add("bad"); }
    };
    inp.addEventListener("keydown",(e)=>{ if(e.key==="Enter"){ e.preventDefault(); commit(); } });
    inp.addEventListener("blur",commit);
    inp.addEventListener("input",()=>inp.classList.remove("bad"));
  });
  setTimeout(()=>{ const f=wrap.querySelector("input:not([disabled])"); if(f) f.focus(); },30);
  return wrap;
}

function renderProgress(main){
  const prog = DB.progress(state.user.uid);
  const days = periodDays(state.ui.progPeriod);
  const agg = historyAggregate(prog.history, days);
  main.appendChild(el("section",{class:"hero compact"},

  pc.appendChild(el("div",{class:"herostats"},
    stat(agg.correct, "correct this period"),
    stat(agg.seen, "answered this period"),
    stat(prog.streak||0, "day streak")));
  pc.appendChild(dailyChart(prog.history, days));
  main.appendChild(pc);

  const buckets = {};
  Object.entries(prog.stats).forEach(([cat,c])=>{ const b=catBucket(cat); const o=buckets[b]||(buckets[b]={seen:0,correct:0}); o.seen+=c.seen||0; o.correct+=c.correct||0; });
  const cats = Object.entries(buckets).sort((a,b)=> b[1].correct - a[1].correct);
  const card = el("section",{class:"card"});
  card.appendChild(el("h2",{class:"cardh"},"Correct by category (all time)"));
  card.appendChild(el("p",{class:"muted small", style:"margin-top:-4px"},"Bar shows accuracy; the count is correct / answered."));
  if(!cats.length) card.appendChild(el("p",{class:"muted"},"No data yet. Complete a drill to populate this."));
  cats.forEach(([label,c])=>{
    const w = c.seen ? Math.round(100*c.correct/c.seen) : 0;
    card.appendChild(el("div",{class:"bar"},
      el("div",{class:"barlabel"}, label),
      el("div",{class:"bartrack"}, el("div",{class:"barfill", style:`width:${Math.max(2,w)}%`})),
      el("div",{class:"barval"}, `${c.correct} / ${c.seen}`)));
  });
  main.appendChild(card);
}
function catBucket(cat){
  const a = (cat||"").split(":")[0];
  const map = { decline:"Nouns", conjugate:"Verbs", adj:"Adjectives & adverbs", comparison:"Adjectives & adverbs",
    adverb:"Adjectives & adverbs", pronoun:"Pronouns", participle:"Participles", infinitive:"Infinitives",
    gerund:"Gerunds & gerundives", parse:"Parsing", translate:"Translation" };
  return map[a] || "Other";
}
function prettyCat(cat){
  const [a,b]=cat.split(":");
  const map={decline:"Noun decl.",conjugate:"Verb conj.",adj:"Adjective",comparison:"Comparison",adverb:"Adverb",pronoun:"Pronoun",parse:"Parsing",participle:"Participle",infinitive:"Infinitive",translate:"Translation"};
  return (map[a]||a)+(b?` · ${b}`:"");
}

    classes.forEach(c=> classSel.appendChild(el("option",{value:c.id},c.name))); classSel.value=asgChoice.classId;
    const modSel = el("select",{class:"parse-select", onchange:(e)=>{ asgChoice.module=e.target.value; renderApp(); }});
    Object.keys(SCOPE).forEach(m=> modSel.appendChild(el("option",{value:m},SCOPE[m].label))); modSel.value=asgChoice.module;
    const count = el("input",{class:"text num", type:"number", value:String(asgChoice.count), min:"5", max:"50", oninput:(e)=>{ asgChoice.count=parseInt(e.target.value,10)||15; }});
    const dueInp = el("input",{class:"text", type:"date", value:asgChoice.due||"", oninput:(e)=>{ asgChoice.due=e.target.value; }});
    ca.appendChild(el("div",{class:"formgrid"},
      labeled("Title", title), labeled("Class", classSel), labeled("Module", modSel), labeled("Questions", count), labeled("Due date", dueInp)));
    ca.appendChild(scopeControls(asgChoice.module, asgChoice.scope, ()=>renderApp()));

    // assign to whole class or specific students
    const roster = (curClass && curClass.enrolled) || [];
    const af = el("div",{});
    if(!roster.length){
      af.appendChild(el("p",{class:"muted small", style:"margin:6px 0 0"}, Cloud.active? "No students enrolled yet — this will be available to everyone who joins." : "Connect accounts to assign to specific students. For now this goes to the whole class."));
      asgChoice.assignedTo = [];
    } else {
      af.appendChild(el("p",{class:"muted small", style:"margin:0 0 12px"}, asgChoice.assignedTo.length? `${asgChoice.assignedTo.length} of ${roster.length} selected` : "Everyone in the class — select names to narrow"));
      const chipwrap = el("div",{class:"assignee-chips"});
      roster.forEach(s=>{
        const on = asgChoice.assignedTo.includes(s.uid);
        chipwrap.appendChild(el("button",{class:"assignee"+(on?" on":""), onclick:()=>{
          if(on) asgChoice.assignedTo = asgChoice.assignedTo.filter(u=>u!==s.uid);
          else asgChoice.assignedTo = [...asgChoice.assignedTo, s.uid];
          renderApp();
        }}, s.displayName||s.uid));
      });
      af.appendChild(chipwrap);
    }
    ca.appendChild(field("Assign to", af));

    const actions = el("div",{class:"form-actions"});
    actions.appendChild(el("button",{class:"primary", onclick:()=>{
      const t = title.value.trim(); if(!t) return;
      const data = { title:t, classId:classSel.value, module:asgChoice.module,
        scope: JSON.parse(JSON.stringify(asgChoice.scope[asgChoice.module]||DEFAULT_SCOPE[asgChoice.module]||{})),
        count: parseInt(count.value,10)||15,
        due: dueInp.value ? new Date(dueInp.value+"T23:59:59").getTime() : null,
        assignedTo: (asgChoice.assignedTo||[]).slice(),
        forAll: (asgChoice.assignedTo||[]).length===0 };
      const arr=DB.assignments();
      if(editing){ const i=arr.findIndex(x=>x.id===asgChoice.editId); if(i>=0) arr[i]=Object.assign({}, arr[i], data); }
      else arr.push(Object.assign({ id:uid4(), createdBy:state.user.uid, created:now() }, data));
      DB.setAssignments(arr);
      asgChoice.editId=null; asgChoice.title=""; asgChoice.due=""; asgChoice.assignedTo=[]; title.value=""; renderApp();
    }}, editing? "Save changes" : "Create assignment"));
    if(editing) actions.appendChild(el("button",{class:"ghost", onclick:()=>{ asgChoice.editId=null; asgChoice.title=""; asgChoice.due=""; asgChoice.assignedTo=[]; renderApp(); }}, "Cancel"));
    ca.appendChild(actions);
  }
  if(assignments.length) ca.appendChild(el("div",{class:"asg-listhead"}, "Active assignments"));
  assignments.forEach(a=>{
    const cls = classes.find(c=>c.id===a.classId);
    const subs = attempts.filter(t=>t.assignmentId===a.id);
    const avg = subs.length? Math.round(subs.reduce((s,t)=>s+t.pct,0)/subs.length):null;
    const overdue = a.due && now() > a.due;
    const targetTxt = (a.assignedTo && a.assignedTo.length) ? ` · ${a.assignedTo.length} student${a.assignedTo.length===1?"":"s"}` : "";
    const main2 = el("div",{class:"asg-main"}, el("b",{},a.title),
      el("span",{class:"asg-scope muted small"}, `${SCOPE[a.module]?SCOPE[a.module].label:a.module} · ${scopeSummary(a.module,a.scope)} · ${a.count} Q · ${cls?cls.name:"—"}${targetTxt}`));
    if(a.due) main2.appendChild(el("span",{class:"asg-due"+(overdue?" overdue":"")}, (overdue?"Was due ":"Due ")+fmtDue(a.due)));
    const det = el("details",{class:"asg"});
    det.appendChild(el("summary",{}, main2,
      el("span",{class:"asg-meta muted small"}, subs.length? `${subs.length} submitted · avg ${avg}%` : "no submissions")));
    det.appendChild(assignmentBreakdown(a, cls, attempts));
    ca.appendChild(det);
  });
  main.appendChild(ca);

  // class-wide misconceptions: which form categories are missed most
  const wc = el("section",{class:"card"});
  wc.appendChild(el("h2",{class:"cardh"},"Class weak spots"));
  const weak = classWeakSpots(attempts);
  if(weak.length){
    wc.appendChild(el("p",{class:"muted small", style:"margin:0 0 14px"}, "Form categories the class misses most, pooled across every submission."));
    weak.slice(0,8).forEach(w=>{
      const pctMiss = Math.round(100*w.miss);
      wc.appendChild(el("div",{class:"bar"},
        el("div",{class:"barlabel"}, catLabel(w.cat)),
        el("div",{class:"bartrack"}, el("div",{class:"barfill miss", style:`width:${Math.max(3,pctMiss)}%`})),
        el("div",{class:"barval"}, `${pctMiss}% missed · ${w.seen-w.correct}/${w.seen}`)));
    });
  } else {
    const rows = assignments.map(a=>{ const subs=attempts.filter(t=>t.assignmentId===a.id); const avg=subs.length?Math.round(subs.reduce((s,t)=>s+t.pct,0)/subs.length):null; return {a,avg,n:subs.length}; })
      .filter(r=>r.avg!=null).sort((x,y)=>x.avg-y.avg);
    if(rows.length){
      wc.appendChild(el("p",{class:"muted small", style:"margin:0 0 14px"}, "Assignments with the lowest class average. Per-form detail appears as students complete newer assignments."));
      rows.slice(0,6).forEach(r=> wc.appendChild(el("div",{class:"bar"},
        el("div",{class:"barlabel"}, r.a.title),
        el("div",{class:"bartrack"}, el("div",{class:"barfill miss", style:`width:${Math.max(3,100-r.avg)}%`})),
        el("div",{class:"barval"}, `${r.avg}% avg · ${r.n}`))));
    } else wc.appendChild(el("p",{class:"muted small"}, "No submissions yet — weak spots appear once students complete assignments."));
  }
  main.appendChild(wc);

  // roster accuracy (overall, across all assignments)
  const rc = el("section",{class:"card"});
  rc.appendChild(el("h2",{class:"cardh"},"Roster — overall accuracy"));
  if(Cloud.active){
    rc.appendChild(el("button",{class:"ghost", style:"margin-bottom:12px", onclick:()=>{ state._teacherSynced=false; Cloud.refreshTeacher().then(()=>renderApp()); }}, "Refresh from cloud"));
  }
  const roster = rosterRows(classes, attempts);
  if(!roster.length) rc.appendChild(el("p",{class:"muted small"}, Cloud.active? "No students enrolled or no attempts yet." : "Local mode shows only your own attempts. Connect Firebase for a full roster."));
  else {
    const titleById={}, asgDue={}; assignments.forEach(a=>{ titleById[a.id]=a.title; asgDue[a.id]=a.due; });
    const t = el("table",{class:"roster"});
    t.appendChild(el("tr",{}, el("th",{},"Student"), el("th",{},"Attempts"), el("th",{},"Avg accuracy")));
    roster.forEach(r=>{
      const detail = el("tr",{class:"roster-detail", style:"display:none"});
      const cell = el("td",{colspan:"3"});
      if(r.list.length){
        const inner = el("div",{class:"histlist"});
        r.list.forEach(at=>{
          const late = at.when && asgDue[at.assignmentId] && at.when>asgDue[at.assignmentId];
          inner.appendChild(el("div",{class:"histrow"},
            el("span",{}, titleById[at.assignmentId]||"Assignment"),
            el("span",{class:"muted small"}, `${at.pct}% · ${fmtWhen(at.when)}${late?" · late":""}`)));
        });
        cell.appendChild(inner);
      } else cell.appendChild(el("span",{class:"muted small"},"No attempts yet."));
      detail.appendChild(cell);
      const row = el("tr",{class:"roster-row"+(r.n?" has-history":""), onclick:()=>{ if(r.n) detail.style.display = (detail.style.display==="none"?"table-row":"none"); }},
        el("td",{}, r.n? r.name+" ▸" : r.name), el("td",{}, String(r.n)), el("td",{}, r.avg==null? "—" : r.avg+"%"));
      t.appendChild(row); t.appendChild(detail);
    });
    rc.appendChild(t);
  }
  main.appendChild(rc);
}
function labeled(l,node){ return el("label",{class:"pcell"}, el("span",{class:"pl small muted"}, l), node); }
function fmtWhen(ts){ if(!ts) return "—"; try{ return new Date(ts).toLocaleDateString(undefined,{month:"short",day:"numeric"}); }catch(e){ return "—"; } }
function fmtDue(ts){ try{ const d=new Date(ts), t=new Date(); const o = d.getFullYear()===t.getFullYear()? {day:"numeric",month:"short"} : {day:"numeric",month:"short",year:"numeric"}; return d.toLocaleDateString(undefined,o); }catch(e){ return "—"; } }
function deleteAssignment(a){
  const ok = (typeof confirm==="function") ? confirm(`Delete “${a.title}”? It will be removed for students. Existing submissions are kept.`) : true;
  if(!ok) return;
  DB.deleteAssignment(a.id);
  renderApp();
}
function latestCell(last, a){
  const wrap = el("span",{}, `${last.pct}% · ${fmtWhen(last.when)}`);
  if(a.due && last.when > a.due) wrap.appendChild(el("span",{class:"late-tag"}, " · late"));
  return wrap;
}
function assignmentBreakdown(a, cls, attempts){
  const subs = attempts.filter(t=>t.assignmentId===a.id);
  const byId = {};
  let enrolled = (cls && cls.enrolled) || [];
  if(a.assignedTo && a.assignedTo.length) enrolled = enrolled.filter(s=> a.assignedTo.includes(s.uid));
  enrolled.forEach(s=>{ byId[s.uid] = { name:s.displayName||s.uid, list:[] }; });
  subs.forEach(t=>{ const id=t.studentUid||t.studentName; (byId[id] = byId[id] || { name:t.studentName||id, list:[] }).list.push(t); });
  const rows = Object.values(byId).map(s=>{
    const list = s.list.slice().sort((x,y)=>(x.when||0)-(y.when||0));
    return { name:s.name, n:list.length,
      best: list.length? Math.max(...list.map(t=>t.pct)) : null,
      last: list.length? list[list.length-1] : null,
      scores: list.map(t=>t.pct) };
  });
  rows.sort((x,y)=>{ if(x.n && !y.n) return -1; if(!x.n && y.n) return 1; if(x.n&&y.n) return y.best-x.best; return x.name.localeCompare(y.name); });

  const body = el("div",{class:"asg-body"});
  if(!rows.length){
    body.appendChild(el("p",{class:"muted small"},
      Cloud.active? "No students assigned yet." : "Per-student data appears once students submit. Connect accounts for a full class roster."));
  } else {
    const t = el("table",{class:"roster breakdown"});
    t.appendChild(el("tr",{}, el("th",{},"Student"), el("th",{},"Attempts"), el("th",{},"Best"), el("th",{},"Latest"), el("th",{},"Each attempt")));
    rows.forEach(r=>{
      const chips = el("div",{class:"scorechips"});
      if(r.scores.length) r.scores.forEach(p=> chips.appendChild(el("span",{class:"scorechip "+(p>=80?"hi":p>=50?"mid":"lo")}, p+"%")));
      else chips.appendChild(el("span",{class:"muted small"},"not submitted"));
      t.appendChild(el("tr",{class:r.n?"":"nosub"},
        el("td",{}, r.name),
        el("td",{}, r.n? String(r.n) : "—"),
        el("td",{}, r.best==null? "—" : el("b",{}, r.best+"%")),
        el("td",{}, r.last? latestCell(r.last, a) : "—"),
        el("td",{}, chips)));
    });
    body.appendChild(t);
  }
  body.appendChild(el("div",{class:"asg-actions"},
    el("button",{class:"ghost small", onclick:()=>editAssignment(a)}, "Edit"),
    el("button",{class:"ghost small", onclick:()=>duplicateAssignment(a)}, "Duplicate"),
    el("button",{class:"danger small", onclick:()=>deleteAssignment(a)}, "Delete assignment")));
  return body;
}
function scopeSummary(module, scope){
  if(!scope) return "all";
  if(module==="translate") return "translation";
  let groupsCfg;
  if(module==="parse"){ const sm=scope.parseModule||"decline"; groupsCfg=(SCOPE[sm]&&SCOPE[sm].groups)||[]; }
  else groupsCfg = (SCOPE[module]&&SCOPE[module].groups)||[];
  const labels = (scope.groups||[]).map(id=>{ const g=groupsCfg.find(x=>x.id===id); return g?g.label:id; });
  if(!labels.length) return "all";
  if(groupsCfg.length && labels.length===groupsCfg.length) return "all";
  // collapse a shared trailing word: "1st declension, 2nd declension" -> "1st, 2nd declension"
  if(labels.length>1){
    const parts = labels.map(l=>l.split(" "));
    const last = parts[0][parts[0].length-1];
    if(parts.every(p=>p.length>=2 && p[p.length-1]===last))
      return parts.map(p=>p.slice(0,-1).join(" ")).join(", ") + " " + last;
  }
  return labels.join(", ");
}
function catLabel(cat){
  const [a,b]=String(cat).split(":");
  const base={decline:"Nouns",conjugate:"Verbs",adj:"Adjectives",comparison:"Comparison",adverb:"Adverbs",pronoun:"Pronouns",participle:"Participles",infinitive:"Infinitives",gerund:"Gerunds & gerundives",parse:"Parsing",translate:"Translation"}[a]||a;
  if(!b) return base;
  const spec={"1":"1st decl.","2":"2nd decl.","3":"3rd decl.","4":"4th decl.","5":"5th decl.","irr":"irregular","3io":"3rd-io conj.","present":"present","perfect":"perfect","future":"future","gerund":"gerund","gerundive":"gerundive","adj1":"1st/2nd decl.","adj3":"3rd decl.","nominal":"nominal","verb":"verbal"}[b]||b;
  return base+" · "+spec;
}
function classWeakSpots(attempts){
  const agg={};
  (attempts||[]).forEach(t=>{ const cats=t.cats||{}; for(const k in cats){ const e=agg[k]||(agg[k]={seen:0,correct:0}); e.seen+=cats[k].seen||0; e.correct+=cats[k].correct||0; } });
  return Object.entries(agg).filter(([,c])=>c.seen>=3)
    .map(([cat,c])=>({cat, seen:c.seen, correct:c.correct, miss:1-(c.correct/c.seen)}))
    .filter(w=>w.miss>0).sort((a,b)=> b.miss-a.miss || b.seen-a.seen);
}
function rosterRows(classes, attempts){
  const byId = {}; // id -> {uid, name, list:[]}
  classes.forEach(c=> (c.enrolled||[]).filter(s=>!(c.removed||[]).includes(s.uid)).forEach(s=>{ byId[s.uid] = byId[s.uid] || { uid:s.uid, name:s.displayName||s.uid, list:[] }; }));
  attempts.forEach(t=>{ const id=t.studentUid||t.studentName; byId[id] = byId[id] || { uid:id, name:t.studentName||id, list:[] }; byId[id].list.push(t); });
  return Object.values(byId).map(s=>({ uid:s.uid, name:s.name, n:s.list.length,
    list: s.list.slice().sort((a,b)=>(b.when||0)-(a.when||0)),
    avg: s.list.length? Math.round(s.list.reduce((a,t)=>a+t.pct,0)/s.list.length) : null }));
}

function renderStudent(main){
  main.appendChild(el("section",{class:"hero compact"},
    el("p",{class:"eyebrow"},"Discipulus"),
    el("h1",{class:"display"},"Your classes")));
  const classes = DB.classes(); const me = state.user;
  const joined = classes.filter(c=> (me.classIds||[]).includes(c.id) && !(c.removed||[]).includes(me.uid));
  const joinedIds = joined.map(c=>c.id);

  const jc = el("section",{class:"card"});
  jc.appendChild(el("h2",{class:"cardh"},"Join a class"));
  const code = el("input",{class:"text", placeholder:"Enter join code"});
  jc.appendChild(el("div",{class:"inputrow"}, code, el("button",{class:"primary", onclick:async ()=>{
    const codeVal = code.value.trim().toUpperCase();
    let c;
    if(Cloud.active){ c = await Cloud.findClassByJoinCode(codeVal); }
    else { c = DB.classes().find(x=>x.joinCode===codeVal); }
    if(!c){ alertInline(jc,"No class with that code."); return; }
    me.classIds = Array.from(new Set([...(me.classIds||[]), c.id])); DB.setProfile(me.uid, me);
    if(Cloud.active){
      await Cloud.hydrate(me); // re-pull classes/assignments now that classIds changed
    } else {
      const arr=DB.classes(); const cc=arr.find(x=>x.id===c.id); if(cc && !cc.students.includes(me.uid)) cc.students.push(me.uid); DB.setClasses(arr);
    }
    renderApp();
  }}, "Join")));
  joined.forEach(c=> jc.appendChild(el("div",{class:"classrow"}, el("b",{},c.name))));
  main.appendChild(jc);

  const ac = el("section",{class:"card"});
  ac.appendChild(el("h2",{class:"cardh"},"Assignments"));
  const mine = DB.assignments()
    .filter(a=> joinedIds.includes(a.classId) && (!a.assignedTo || !a.assignedTo.length || a.assignedTo.includes(me.uid)))
    .sort((x,y)=> (x.due||Infinity) - (y.due||Infinity));
  const attempts = DB.attempts();
  if(!mine.length) ac.appendChild(el("p",{class:"muted small"}, joined.length?"No assignments yet.":"Join a class to see assignments."));
  mine.forEach(a=>{
    const done = attempts.filter(t=>t.assignmentId===a.id && (t.studentUid===me.uid || (t.studentName||me.displayName)===me.displayName));
    const best = done.length? Math.max(...done.map(t=>t.pct)):null;
    const overdue = a.due && now() > a.due && !done.length;
    const info = el("div",{}, el("b",{},a.title),
      el("span",{class:"muted small"}, `  ${SCOPE[a.module]?SCOPE[a.module].label:a.module} · ${scopeSummary(a.module,a.scope)} · ${a.count} Q`));
    if(a.due) info.appendChild(el("div",{class:"asg-due small"+(overdue?" overdue":""), style:"margin-top:4px"}, (overdue?"Overdue · was due ":"Due ")+fmtDue(a.due)));
    ac.appendChild(el("div",{class:"classrow"}, info,
      el("div",{},
        best!=null? el("span",{class:"muted small"}, `best ${best}%  `) : null,
        el("button",{class:"primary small", onclick:()=>startAssignment(a)}, done.length?"Retry":"Start"))));
  });
  main.appendChild(ac);
}
function alertInline(parent,msg){ parent.appendChild(el("div",{class:"vline warn"}, msg)); }

function startAssignment(a){
  state.session = { module:a.module, scope:a.scope, mode:"quiz", n:0, correct:0, target:a.count, done:false, assignmentId:a.id, onDone:(pct)=>{
    const arr=DB.attempts(); arr.push({ id:uid4(), assignmentId:a.id, studentUid:state.user.uid, studentName:state.user.displayName, pct, when:now(), cats:(state.session&&state.session.catHits)||{} }); DB.setAttempts(arr);
  }, current:null };
  // wrap end to record attempt
  nextQuestion(); setView("drill");
}
// hook: when an assignment quiz finishes, record attempt
const _renderSummary = renderSummary;
renderSummary = function(main){
  const s=state.session;
  if(s.assignmentId && s.onDone && !s._recorded){ s._recorded=true; s.onDone(s.n? Math.round(100*s.correct/s.n):0); }
  _renderSummary(main);
};

/* ---------------------------------------------------------------------------
   9. boot
--------------------------------------------------------------------------- */
function boot(){
  const saved = kv.getJSON("lvdvs:settings", null);
  if(saved) state.settings = Object.assign(state.settings, saved);
  document.documentElement.setAttribute("data-theme", state.settings.theme);
  if(FIREBASE_ENABLED){
    renderApp(); // shows "Connecting…" until auth resolves
    Cloud.start((user)=>{ state._teacherSynced=false; renderApp(); })
         .catch(()=>{ Cloud.active=false; ensureLocalUserForced(); renderApp(); });
  } else {
    ensureLocalUser();
    renderApp();
  }
}
function ensureLocalUserForced(){
  let p = DB.profile("local");
  if(!p){ p = { uid:"local", displayName:"Student", role:"student", classIds:[], anon:true }; kv.setJSON("lvdvs:profile:local", p); }
  state.user = p;
}
if(document.readyState==="loading") document.addEventListener("DOMContentLoaded", boot); else boot();

})();

</script>
