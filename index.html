<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Latin Trainer</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2064%2064%22%20role%3D%22img%22%20aria-label%3D%22Latin%20Trainer%22%3E%3Cdefs%3E%3ClinearGradient%20id%3D%22tile%22%20x1%3D%220%22%20y1%3D%220%22%20x2%3D%220%22%20y2%3D%221%22%3E%3Cstop%20offset%3D%220%22%20stop-color%3D%22%231A8268%22%2F%3E%3Cstop%20offset%3D%221%22%20stop-color%3D%22%230B5140%22%2F%3E%3C%2FlinearGradient%3E%3CclipPath%20id%3D%22round%22%3E%3Crect%20x%3D%223%22%20y%3D%223%22%20width%3D%2258%22%20height%3D%2258%22%20rx%3D%2213%22%2F%3E%3C%2FclipPath%3E%3C%2Fdefs%3E%3Cg%20clip-path%3D%22url%28%23round%29%22%3E%3Crect%20x%3D%223%22%20y%3D%223%22%20width%3D%2258%22%20height%3D%2258%22%20fill%3D%22url%28%23tile%29%22%2F%3E%3Crect%20x%3D%223%22%20y%3D%223%22%20width%3D%2258%22%20height%3D%2224%22%20fill%3D%22%23ffffff%22%20opacity%3D%220.06%22%2F%3E%3Ctext%20x%3D%2232%22%20y%3D%2246%22%20text-anchor%3D%22middle%22%20font-family%3D%22Georgia%2C%27Times%20New%20Roman%27%2Cserif%22%20font-weight%3D%22700%22%20font-size%3D%2242%22%20fill%3D%22%23F4F1EA%22%3EL%3C%2Ftext%3E%3Crect%20x%3D%2222%22%20y%3D%2250.5%22%20width%3D%2220%22%20height%3D%221.6%22%20rx%3D%220.8%22%20fill%3D%22%23D6A24E%22%20opacity%3D%220.9%22%2F%3E%3C%2Fg%3E%3Crect%20x%3D%223%22%20y%3D%223%22%20width%3D%2258%22%20height%3D%2258%22%20rx%3D%2213%22%20fill%3D%22none%22%20stroke%3D%22%23000000%22%20stroke-opacity%3D%220.10%22%2F%3E%3C%2Fsvg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cardo:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  /* warm scholar's paper, deep verdigris accent, brass secondary */
  --paper:#F4F1EA; --surface:#FCFAF5; --surface-2:#ECE7DB; --surface-3:#E4DECF;
  --ink:#211F1B; --muted:#7A746A; --faint:#A8A294;
  --line:#E2DCCE; --line-2:#D6CFBD;
  --accent:#13715A; --accent-deep:#0C5341; --accent-soft:#E1EDE7; --accent-ink:#0A4334;
  --brass:#9A6B12; --brass-soft:#F0E6CC;
  --ok:#15803D; --err:#B0432B; --warn:#9A6B12;
  --hi:#E6EFEA;
  --gold:#C8972F; --silver:#9AA0A6; --bronze:#B57A45;
  --c-nom:#13715A; --c-voc:#5C7A14; --c-gen:#A06A10; --c-dat:#C0531C; --c-acc:#B41E45; --c-abl:#1F58C4;
  --serif:"Cardo",Georgia,"Times New Roman",serif;
  --display:"Cinzel",var(--serif); --ui:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  --maxw:900px; --radius:16px; --radius-sm:10px;
  --shadow-sm:0 1px 2px rgba(40,34,22,.05), 0 1px 3px rgba(40,34,22,.04);
  --shadow-md:0 2px 6px rgba(40,34,22,.05), 0 10px 26px rgba(40,34,22,.06);
  --shadow-lg:0 4px 14px rgba(40,34,22,.07), 0 22px 48px rgba(40,34,22,.08);
  --ring:rgba(19,113,90,.30);
}
[data-theme="dark"]{
  --paper:#0E0F10; --surface:#17181A; --surface-2:#202225; --surface-3:#2A2D31;
  --ink:#EFEEEA; --muted:#9A968D; --faint:#6E6A62;
  --line:#2A2C2F; --line-2:#373A3E;
  --accent:#34D6BE; --accent-deep:#16B8A0; --accent-soft:#15302A; --accent-ink:#9FF0E2;
  --brass:#D6A24E; --brass-soft:#2A2415;
  --ok:#4ADE80; --err:#F08A6E; --warn:#D6A24E;
  --hi:#16302A;
  --gold:#E0B84A; --silver:#B9BFC6; --bronze:#CD965C;
  --c-nom:#34D6BE; --c-voc:#A8CC52; --c-gen:#E0B756; --c-dat:#F0926A; --c-acc:#F0728E; --c-abl:#7FA2F2;
  --shadow-sm:0 1px 2px rgba(0,0,0,.4);
  --shadow-md:0 2px 8px rgba(0,0,0,.45), 0 12px 30px rgba(0,0,0,.4);
  --shadow-lg:0 6px 18px rgba(0,0,0,.5), 0 24px 50px rgba(0,0,0,.45);
  --ring:rgba(52,214,190,.32);
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--paper); color:var(--ink); font-family:var(--ui); font-size:16px; line-height:1.55;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  background-image:radial-gradient(1200px 600px at 100% -10%, color-mix(in srgb,var(--accent) 5%, transparent), transparent 60%);}
.lat{font-family:var(--serif); font-feature-settings:"liga" 1; letter-spacing:.1px;}
button{font-family:inherit; cursor:pointer}
code{font-family:ui-monospace,Menlo,Consolas,monospace}
a{color:var(--accent)}

/* ---- top bar ---- */
.topbar{display:flex; align-items:center; gap:20px; padding:15px 26px; position:sticky; top:0; z-index:5; flex-wrap:wrap;
  background:color-mix(in srgb,var(--surface) 88%, transparent); backdrop-filter:saturate(140%) blur(10px);
  border-bottom:1px solid var(--line);}
.topbar::after{content:""; position:absolute; left:0; right:0; bottom:-1px; height:2px;
  background:linear-gradient(90deg,var(--c-nom),var(--c-voc),var(--c-gen),var(--c-dat),var(--c-acc),var(--c-abl)); opacity:.85;}
.brand{display:flex; align-items:center; gap:11px; margin-right:auto; line-height:1;}
.brand::before{content:""; width:11px; height:22px; border-radius:2px;
  background:linear-gradient(180deg,var(--accent),var(--accent-deep)); box-shadow:inset 0 0 0 1px rgba(255,255,255,.15);}
.wordmark{font-family:var(--display); font-weight:600; font-size:21px; letter-spacing:.10em; color:var(--ink);}
.tagline{font-size:11px; color:var(--muted); letter-spacing:.16em; text-transform:uppercase; margin-top:3px}
.nav{display:flex; gap:3px}
.navbtn{background:none; border:1px solid transparent; color:var(--muted); padding:8px 15px; border-radius:9px;
  font-size:13px; font-weight:500; letter-spacing:.02em; transition:color .15s, background .15s, border-color .15s;}
.navbtn:hover{color:var(--ink); background:color-mix(in srgb,var(--surface-2) 70%, transparent)}
.navbtn.active{color:var(--accent-ink); background:var(--accent-soft); border-color:color-mix(in srgb,var(--accent) 30%, var(--line))}
.acct{display:flex; align-items:center; gap:12px}
.who{font-size:12px; color:var(--muted)}
.linklike{background:none; border:none; color:var(--accent); font-size:12px; text-decoration:underline; text-underline-offset:2px; padding:2px}
.iconbtn{background:var(--surface-2); border:1px solid var(--line); border-radius:9px; width:36px; height:32px; color:var(--ink); font-size:14px; transition:border-color .15s, transform .1s}
.iconbtn:hover{border-color:var(--accent)} .iconbtn:active{transform:translateY(1px)}

/* ---- layout ---- */
.main{max-width:var(--maxw); margin:0 auto; padding:34px 24px 90px}
.eyebrow{font-family:var(--display); font-size:11px; letter-spacing:.28em; text-transform:uppercase; color:var(--accent); margin:0 0 12px}
.display{font-family:var(--serif); font-weight:700; line-height:1.12; margin:0; letter-spacing:-.01em}
h1.display{font-size:clamp(26px,3.6vw,38px)}
.hero{margin-bottom:32px}
.hero.compact{margin-bottom:22px}
.herostats{display:flex; gap:14px; flex-wrap:wrap; margin-top:24px; padding-top:0; border-top:none}
.stat{display:flex; flex-direction:column; flex:1; min-width:120px; background:var(--surface); border:1px solid var(--line);
  border-radius:var(--radius-sm); padding:15px 16px; box-shadow:var(--shadow-sm); position:relative; overflow:hidden}
.stat::before{content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--accent); opacity:.85}
.statn{font-family:var(--serif); font-size:30px; font-weight:700; line-height:1; color:var(--ink); letter-spacing:-.01em}
.statl{font-size:10.5px; letter-spacing:.13em; text-transform:uppercase; color:var(--muted); margin-top:7px}

.card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:26px; margin-bottom:24px; box-shadow:var(--shadow-sm)}
.cardh{font-family:var(--display); font-weight:600; font-size:16px; margin:0 0 20px; letter-spacing:.05em; text-transform:uppercase; color:var(--ink);
  display:flex; align-items:center; gap:12px}
.cardh::after{content:""; flex:1; height:1px; background:var(--line)}

/* ---- setup ---- */
.fieldrow{display:grid; grid-template-columns:130px 1fr; gap:18px; align-items:start; padding:16px 0; border-top:1px solid var(--line)}
.fieldrow:first-of-type{border-top:none; padding-top:2px}
.fieldlabel{font-size:11.5px; letter-spacing:.11em; text-transform:uppercase; color:var(--muted); padding-top:8px; font-weight:500}
.chooser{display:flex; flex-wrap:wrap; gap:8px}
.choice{background:var(--surface-2); border:1px solid var(--line); color:var(--ink); padding:9px 15px; border-radius:9px; font-size:13px; transition:all .15s; box-shadow:var(--shadow-sm)}
.choice.small{padding:6px 12px; font-size:12px}
.choice:hover{border-color:var(--accent); color:var(--accent-ink); transform:translateY(-1px)}
.choice.sel{background:linear-gradient(180deg,var(--accent),var(--accent-deep)); border-color:var(--accent-deep); color:#fff; box-shadow:0 2px 8px var(--ring)}
[data-theme="dark"] .choice.sel{color:#0A1714}
.scope{display:flex; flex-direction:column; gap:11px}
.subhead{font-size:10.5px; letter-spacing:.13em; text-transform:uppercase; color:var(--faint); margin-top:8px; font-weight:600}
.checkrow{display:flex; flex-wrap:wrap; gap:8px}
.chk{display:inline-flex; align-items:center; gap:8px; background:var(--surface-2); border:1px solid var(--line); padding:8px 12px; border-radius:9px; font-size:13px; transition:all .15s}
.chk:hover{border-color:var(--line-2)}
.chk.on{border-color:var(--accent); background:var(--accent-soft); color:var(--accent-ink)}
.chk input{accent-color:var(--accent); width:15px; height:15px}
.toggle{display:inline-flex; align-items:center; gap:9px; font-size:14px}
.toggle input{width:16px;height:16px;accent-color:var(--accent)}

.text{background:var(--surface); border:1px solid var(--line-2); border-radius:9px; padding:11px 13px; font-size:14px; color:var(--ink); font-family:var(--ui); transition:border-color .15s, box-shadow .15s}
.text:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--ring)}
.text.num{width:96px}
.inputrow{display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-top:8px}
.inputrow .text{flex:1; min-width:200px}
.primary{background:linear-gradient(180deg,var(--accent),var(--accent-deep)); color:#fff; border:1px solid var(--accent-deep); padding:12px 24px; border-radius:11px; font-size:14px; font-weight:600; letter-spacing:.02em; box-shadow:0 2px 8px var(--ring); transition:transform .1s, box-shadow .15s, filter .15s}
[data-theme="dark"] .primary{color:#08110F}
.primary:hover{filter:brightness(1.06); box-shadow:0 4px 14px var(--ring); transform:translateY(-1px)}
.primary:active{transform:translateY(0)}
.primary.big{margin-top:20px; padding:14px 32px; font-size:15px; border-radius:12px}
.primary.small{padding:8px 15px; font-size:13px; border-radius:9px}
.ghost{background:var(--surface); border:1px solid var(--line-2); color:var(--ink); padding:12px 21px; border-radius:11px; font-size:14px; transition:all .15s; box-shadow:var(--shadow-sm)}
.ghost:hover{border-color:var(--accent); color:var(--accent-ink); transform:translateY(-1px)}

/* ---- drill ---- */
.drillhead{display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:16px}
.drillhead .eyebrow{margin:0}
.progressbar{display:flex; align-items:center; gap:14px; font-size:12px; color:var(--muted)}

/* the inscription tablet — signature surface */
.tablet{position:relative; background:linear-gradient(180deg,var(--surface),color-mix(in srgb,var(--surface) 92%, var(--surface-2)));
  border:1px solid var(--line-2); border-radius:var(--radius); padding:38px 34px; box-shadow:var(--shadow-md);}
.tablet::before{content:""; position:absolute; left:18px; right:18px; top:0; height:3px; border-radius:0 0 3px 3px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent); opacity:.55;}
.tablet-eyebrow{display:flex; align-items:center; justify-content:center; gap:14px; font-family:var(--display); font-size:10px; letter-spacing:.34em; text-transform:uppercase; color:var(--faint); margin-bottom:22px}
.tablet-eyebrow::before,.tablet-eyebrow::after{content:""; height:1px; width:46px; background:linear-gradient(90deg,transparent,var(--line-2))}
.tablet-eyebrow::after{transform:scaleX(-1)}
.prompt{font-size:21px; text-align:center; line-height:1.5; max-width:580px; margin:0 auto; color:var(--ink)}
.prompt .lat{font-size:24px; color:var(--accent-ink)}
.prompt b{font-weight:700; color:var(--ink)}
.muted{color:var(--muted)}
.small{font-size:12px}

.answerArea{margin-top:30px; display:flex; flex-direction:column; align-items:center; gap:12px}
.macrons{display:flex; gap:6px; align-items:center; flex-wrap:wrap; justify-content:center}
.mac{font-family:var(--serif); font-size:17px; width:38px; height:34px; background:var(--surface); border:1px solid var(--line); border-radius:7px; color:var(--ink)}
.mac:hover{border-color:var(--accent); color:var(--accent)}
.machint{margin-left:6px}
.answer-input{font-size:23px; text-align:center; padding:12px 18px; min-width:300px; background:transparent;
  border:none; border-bottom:2px solid var(--line-2); color:var(--ink); border-radius:5px 5px 0 0; outline:none; font-family:var(--serif); transition:border-color .15s, background .15s}
.answer-input:focus{border-bottom-color:var(--accent); background:color-mix(in srgb,var(--accent) 5%, transparent)}
.answer-input.good{border-bottom-color:var(--ok); color:var(--ok)}
.answer-input.bad{border-bottom-color:var(--err); color:var(--err)}
.answer-area{width:100%; max-width:520px; font-size:17px; padding:13px 15px; background:var(--surface); border:1px solid var(--line-2); border-radius:10px; color:var(--ink); resize:vertical; font-family:var(--serif)}
.answer-area:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--ring)}
.bigform{font-size:40px; text-align:center; margin:4px 0 8px; letter-spacing:.3px; color:var(--accent-ink)}

.feedback{margin-top:22px; display:flex; flex-direction:column; align-items:center; gap:12px}
.vline{font-size:16px; text-align:center}
.vline.ok{color:var(--ok)} .vline.err{color:var(--err)} .vline.warn{color:var(--warn)}
.vline .lat{font-size:19px}
.note{max-width:520px; text-align:center; color:var(--muted)}
.analyses{text-align:center; max-width:580px}
.model{text-align:center; background:var(--accent-soft); border:1px solid color-mix(in srgb,var(--accent) 22%, var(--line)); border-radius:11px; padding:14px 18px; max-width:560px}
.model div{font-family:var(--serif); font-size:19px; margin-top:4px; color:var(--accent-ink)}
.selfmark{display:flex; gap:12px}
.ok-btn{background:var(--ok); color:#fff; border:none; padding:10px 19px; border-radius:10px; font-weight:600; font-size:13px; box-shadow:var(--shadow-sm); transition:transform .1s, filter .15s}
.err-btn{background:var(--err); color:#fff; border:none; padding:10px 19px; border-radius:10px; font-weight:600; font-size:13px; box-shadow:var(--shadow-sm); transition:transform .1s, filter .15s}
.ok-btn:hover,.err-btn:hover{filter:brightness(1.06)} .ok-btn:active,.err-btn:active{transform:translateY(1px)}

/* parse selectors */
.parsegrid{display:flex; flex-wrap:wrap; gap:12px; justify-content:center}
.pcell{display:flex; flex-direction:column; gap:5px}
.pl{letter-spacing:.08em; text-transform:uppercase}
.parse-select{background:var(--surface); border:1px solid var(--line-2); border-radius:9px; padding:10px 12px; font-size:14px; color:var(--ink); font-family:var(--ui); transition:border-color .15s, box-shadow .15s}
.parse-select:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--ring)}

/* mcq */
.mcq{display:flex; flex-direction:column; gap:9px; width:100%; max-width:520px}
.mcqbtn{display:flex; align-items:center; gap:12px; text-align:left; background:var(--surface); border:1px solid var(--line-2); color:var(--ink); padding:13px 16px; border-radius:11px; font-size:15px; font-family:var(--serif); transition:all .15s; box-shadow:var(--shadow-sm)}
.mcqbtn:hover{border-color:var(--accent); transform:translateY(-1px)}
.mcqnum{font-family:var(--ui); font-size:11px; width:23px; height:23px; flex:none; display:grid; place-items:center; border-radius:50%; background:var(--surface-2); border:1px solid var(--line); color:var(--muted)}
.mcqbtn.right{border-color:var(--ok); background:color-mix(in srgb,var(--ok) 12%, var(--surface))}
.mcqbtn.wrongpick{border-color:var(--err); background:color-mix(in srgb,var(--err) 12%, var(--surface))}

/* paradigm reference */
.reference{margin-top:20px; background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:6px 20px; box-shadow:var(--shadow-sm)}
.reference summary{cursor:pointer; padding:13px 0; font-size:13px; font-weight:600; letter-spacing:.04em; color:var(--accent); list-style:none}
.reference summary::-webkit-details-marker{display:none}
.reference summary::before{content:"\25B8"; display:inline-block; margin-right:8px; transition:transform .15s; color:var(--faint)}
.reference[open] summary::before{transform:rotate(90deg)}
.para-title{font-family:var(--serif); font-style:italic; font-size:15px; color:var(--muted); margin:8px 0 14px}
table.paradigm{border-collapse:collapse; width:100%; max-width:470px; margin-bottom:16px}
table.paradigm th{font-family:var(--ui); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); font-weight:600; text-align:left; padding:7px 12px}
table.paradigm td{padding:7px 12px; border-top:1px solid var(--line); font-size:15px}
.case-label{font-family:var(--ui); font-size:11px; letter-spacing:.06em; text-transform:uppercase; font-weight:600}
.case-label[data-case=nom]{color:var(--c-nom)} .case-label[data-case=voc]{color:var(--c-voc)}
.case-label[data-case=gen]{color:var(--c-gen)} .case-label[data-case=dat]{color:var(--c-dat)}
.case-label[data-case=acc]{color:var(--c-acc)} .case-label[data-case=abl]{color:var(--c-abl)}
.paradigm .form{font-family:var(--serif)}
.paradigm .form.hi{background:var(--hi); font-weight:700; border-radius:4px; box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--accent) 25%, transparent)}
.cmp{display:flex; gap:10px; flex-wrap:wrap}
.degchip{display:flex; flex-direction:column; gap:3px; background:var(--surface-2); border:1px solid var(--line); border-radius:10px; padding:10px 15px}
.deg{font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted)}
.degchip .lat{font-size:18px; color:var(--accent-ink)}

/* case key legend */
.casekey{display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-top:24px; padding-top:18px; border-top:1px solid var(--line)}
.casekey-label{margin-right:4px; letter-spacing:.1em; text-transform:uppercase}
.keychip{font-size:11px; letter-spacing:.04em; text-transform:uppercase; padding:3px 10px; border:1px solid; border-radius:20px; font-weight:600}
.keychip[data-case=nom]{color:var(--c-nom)} .keychip[data-case=voc]{color:var(--c-voc)}
.keychip[data-case=gen]{color:var(--c-gen)} .keychip[data-case=dat]{color:var(--c-dat)}
.keychip[data-case=acc]{color:var(--c-acc)} .keychip[data-case=abl]{color:var(--c-abl)}

/* progress */
.bar{display:grid; grid-template-columns:155px 1fr 92px; gap:14px; align-items:center; padding:9px 0}
.barlabel{font-size:13px}
.bartrack{height:9px; background:var(--surface-2); border:1px solid var(--line); border-radius:20px; overflow:hidden}
.barfill{height:100%; background:linear-gradient(90deg,var(--accent),var(--accent-deep)); border-radius:20px}
.barval{font-size:12px; color:var(--muted); text-align:right}
.mistakes{display:flex; flex-wrap:wrap; gap:7px; margin-top:6px}
.misitem{font-family:var(--serif); font-size:13px; background:var(--surface-2); border:1px solid var(--line); border-radius:8px; padding:5px 11px}
.misacc{color:var(--err); font-family:var(--ui); font-size:11px}

<script>
/* ===========================================================================
   LATIN MORPHOLOGY ENGINE  (rule-based generation)
   Covers the VCE grammar set. Forms carry macrons.
   Exposes: declineNoun, declineAdjective, makeAdverb, declinePronoun,
            conjugateVerb, and the seed LEXICON.
   =========================================================================== */

const CASES = ["nom", "voc", "acc", "gen", "dat", "abl"];
const NUMS = ["sg", "pl"];
const CASE_LABEL = { nom:"nominative", voc:"vocative", gen:"genitive", dat:"dative", acc:"accusative", abl:"ablative" };
const PERSONS = ["1", "2", "3"];

/* ---------- helpers ---------- */
function chop(word, suffix){ return word.slice(0, word.length - suffix.length); }
function zip6(stem, ends){ return ends.map(e => stem + e); }

/* =====================================================================
   NOUNS
   entry: { lemma, gen, gender:"m"|"f"|"n", decl:1..5, istem:bool, irregular:{} }
   gen = genitive singular (used to derive 3rd-decl stem; informative otherwise)
   ===================================================================== */
function nounStem(entry){
  const { lemma, gen, decl } = entry;
  switch(decl){
    case 1: return chop(lemma, "a");
    case 2:
      if(lemma.endsWith("um")) return chop(lemma, "um");
      if(lemma.endsWith("us")) return chop(lemma, "us");
      // -er / -ir nouns: stem from genitive (puerī -> puer, agrī -> agr)
      return chop(gen, "ī");
    case 3: return chop(gen, "is");
    case 4: return chop(gen, "us");
    case 5: return chop(lemma, "ēs");
  }
}

function declineNoun(entry){
  if(entry.irregular) return entry.irregular;
  const g = entry.gender, n = (g === "n");
  const stem = nounStem(entry);
  let sg = {}, pl = {};

  if(entry.decl === 1){
    sg = { nom:stem+"a", voc:stem+"a", gen:stem+"ae", dat:stem+"ae", acc:stem+"am", abl:stem+"ā" };
    pl = { nom:stem+"ae", voc:stem+"ae", gen:stem+"ārum", dat:stem+"īs", acc:stem+"ās", abl:stem+"īs" };
  }
  else if(entry.decl === 2){
    if(n){
      sg = { nom:stem+"um", voc:stem+"um", gen:stem+"ī", dat:stem+"ō", acc:stem+"um", abl:stem+"ō" };
      pl = { nom:stem+"a", voc:stem+"a", gen:stem+"ōrum", dat:stem+"īs", acc:stem+"a", abl:stem+"īs" };
    } else {
      const isIus = entry.lemma.endsWith("ius");
      const isEr  = !entry.lemma.endsWith("us");
      const nomSg = entry.lemma;
      const vocSg = isIus ? chop(entry.lemma,"ius")+"ī" : (isEr ? entry.lemma : stem+"e");
      sg = { nom:nomSg, voc:vocSg, gen:stem+"ī", dat:stem+"ō", acc:stem+"um", abl:stem+"ō" };
      pl = { nom:stem+"ī", voc:stem+"ī", gen:stem+"ōrum", dat:stem+"īs", acc:stem+"ōs", abl:stem+"īs" };
    }
  }
  else if(entry.decl === 3){
    if(n){
      const ablSg = entry.istem ? stem+"ī" : stem+"e";
      const nomPl = entry.istem ? stem+"ia" : stem+"a";
      const genPl = entry.istem ? stem+"ium" : stem+"um";
      sg = { nom:entry.lemma, voc:entry.lemma, gen:stem+"is", dat:stem+"ī", acc:entry.lemma, abl:ablSg };
      pl = { nom:nomPl, voc:nomPl, gen:genPl, dat:stem+"ibus", acc:nomPl, abl:stem+"ibus" };
    } else {
      const genPl = entry.istem ? stem+"ium" : stem+"um";
      sg = { nom:entry.lemma, voc:entry.lemma, gen:stem+"is", dat:stem+"ī", acc:stem+"em", abl:stem+"e" };
      pl = { nom:stem+"ēs", voc:stem+"ēs", gen:genPl, dat:stem+"ibus", acc:stem+"ēs", abl:stem+"ibus" };
    }
  }
  else if(entry.decl === 4){
    if(n){
      sg = { nom:stem+"ū", voc:stem+"ū", gen:stem+"ūs", dat:stem+"ū", acc:stem+"ū", abl:stem+"ū" };
      pl = { nom:stem+"ua", voc:stem+"ua", gen:stem+"uum", dat:stem+"ibus", acc:stem+"ua", abl:stem+"ibus" };
    } else {
      sg = { nom:stem+"us", voc:stem+"us", gen:stem+"ūs", dat:stem+"uī", acc:stem+"um", abl:stem+"ū" };
      pl = { nom:stem+"ūs", voc:stem+"ūs", gen:stem+"uum", dat:stem+"ibus", acc:stem+"ūs", abl:stem+"ibus" };
    }
  }
  else if(entry.decl === 5){
    const lastStemChar = stem.slice(-1);
    const vowels = "aeiouāēīōū";
    const ei = vowels.includes(lastStemChar) ? "ēī" : "eī";
    sg = { nom:stem+"ēs", voc:stem+"ēs", gen:stem+ei, dat:stem+ei, acc:stem+"em", abl:stem+"ē" };
    pl = { nom:stem+"ēs", voc:stem+"ēs", gen:stem+"ērum", dat:stem+"ēbus", acc:stem+"ēs", abl:stem+"ēbus" };
  }
  return { sg, pl };
}

/* =====================================================================
   ADJECTIVES
   class1 entry: { type:"adj1", m, f, n }            e.g. bonus, bona, bonum
   class3 entry: { type:"adj3", nom:{m,f,n}, stem }  stem from genitive
   comparison handled separately
   ===================================================================== */
function declineAdj1(m, f, n){
  // m like 2nd masc (-us or -er), f like 1st, n like 2nd neuter
  const isEr = !m.endsWith("us");
  const stem = isEr ? chop(f, "a") : chop(m, "us");
  const masc = {
    sg:{ nom:m, voc:(isEr?m:stem+"e"), gen:stem+"ī", dat:stem+"ō", acc:stem+"um", abl:stem+"ō" },
    pl:{ nom:stem+"ī", voc:stem+"ī", gen:stem+"ōrum", dat:stem+"īs", acc:stem+"ōs", abl:stem+"īs" }
  };
  const fem = {
    sg:{ nom:stem+"a", voc:stem+"a", gen:stem+"ae", dat:stem+"ae", acc:stem+"am", abl:stem+"ā" },
    pl:{ nom:stem+"ae", voc:stem+"ae", gen:stem+"ārum", dat:stem+"īs", acc:stem+"ās", abl:stem+"īs" }
  };
  const neut = {
    sg:{ nom:stem+"um", voc:stem+"um", gen:stem+"ī", dat:stem+"ō", acc:stem+"um", abl:stem+"ō" },
    pl:{ nom:stem+"a", voc:stem+"a", gen:stem+"ōrum", dat:stem+"īs", acc:stem+"a", abl:stem+"īs" }
  };
  return { m:masc, f:fem, n:neut };
}

function declineAdj3(nomforms, stem){
  // i-stem: abl sg -ī, neut nom/acc pl -ia, gen pl -ium
  const mfNom = nomforms.m, fNom = nomforms.f || nomforms.m, nNom = nomforms.n;
  const masc = {
    sg:{ nom:mfNom, voc:mfNom, gen:stem+"is", dat:stem+"ī", acc:stem+"em", abl:stem+"ī" },
    pl:{ nom:stem+"ēs", voc:stem+"ēs", gen:stem+"ium", dat:stem+"ibus", acc:stem+"ēs", abl:stem+"ibus" }
  };
  const fem = {
    sg:{ nom:fNom, voc:fNom, gen:stem+"is", dat:stem+"ī", acc:stem+"em", abl:stem+"ī" },
    pl:{ nom:stem+"ēs", voc:stem+"ēs", gen:stem+"ium", dat:stem+"ibus", acc:stem+"ēs", abl:stem+"ibus" }
  };
  const neut = {
    sg:{ nom:nNom, voc:nNom, gen:stem+"is", dat:stem+"ī", acc:nNom, abl:stem+"ī" },
    pl:{ nom:stem+"ia", voc:stem+"ia", gen:stem+"ium", dat:stem+"ibus", acc:stem+"ia", abl:stem+"ibus" }
  };
  return { m:masc, f:fem, n:neut };
}

// comparative declines as 3rd-decl CONSONANT stem (abl -e, gen pl -um, neut pl -a)
function declineComparative(stemIor){ // stemIor e.g. "altior"
  const base = chop(stemIor, "ior"); // "alt"
  const m = base+"ior", nn = base+"ius", st = base+"iōr";
  const masc = {
    sg:{ nom:m, voc:m, gen:st+"is", dat:st+"ī", acc:st+"em", abl:st+"e" },
    pl:{ nom:st+"ēs", voc:st+"ēs", gen:st+"um", dat:st+"ibus", acc:st+"ēs", abl:st+"ibus" }
  };
  const fem = JSON.parse(JSON.stringify(masc));
  const neut = {
    sg:{ nom:nn, voc:nn, gen:st+"is", dat:st+"ī", acc:nn, abl:st+"e" },
    pl:{ nom:st+"a", voc:st+"a", gen:st+"um", dat:st+"ibus", acc:st+"a", abl:st+"ibus" }
  };
  return { m:masc, f:fem, n:neut };
}

const IRREG_COMPARISON = {
  bonus:   { comp:"melior",  sup:"optimus" },
  malus:   { comp:"peior",   sup:"pessimus" },
  magnus:  { comp:"maior",   sup:"maximus" },
  parvus:  { comp:"minor",   sup:"minimus" },
  multus:  { comp:"plūs",    sup:"plūrimus" },
  facilis: { comp:"facilior", sup:"facillimus" },
  difficilis:{ comp:"difficilior", sup:"difficillimus" },
  similis: { comp:"similior", sup:"simillimus" },
  gracilis:{ comp:"gracilior", sup:"gracillimus" },
  humilis: { comp:"humilior", sup:"humillimus" }
};

function comparisonOf(entry){
  const lookup = entry.key || entry.lemma || entry.m;
  const positive = (entry.type === "adj1") ? entry.m : (entry.nom ? entry.nom.m : entry.lemma);
  if(IRREG_COMPARISON[lookup]){
    return { positive, comparative:IRREG_COMPARISON[lookup].comp, superlative:IRREG_COMPARISON[lookup].sup, irregular:true };
  }
  let stem, comp, sup;
  if(entry.type === "adj1"){
    stem = entry.m.endsWith("us") ? chop(entry.m,"us") : chop(entry.f,"a");
    comp = stem + "ior";
    sup = entry.m.endsWith("us") ? stem + "issimus" : entry.m + "rimus"; // -er -> -errimus
  } else { // adj3
    stem = entry.stem;
    comp = stem + "ior";
    sup = entry.nom.m.endsWith("er") ? entry.nom.m + "rimus" : stem + "issimus"; // ācer -> ācerrimus
  }
  return { positive, comparative:comp, superlative:sup, irregular:false };
}

/* =====================================================================
   ADVERBS
   ===================================================================== */
const IRREG_ADVERB = {
  bonus:   { pos:"bene", comp:"melius", sup:"optimē" },
  malus:   { pos:"male", comp:"peius", sup:"pessimē" },
  magnus:  { pos:"magnopere", comp:"magis", sup:"maximē" },
  parvus:  { pos:"parum", comp:"minus", sup:"minimē" },
  multus:  { pos:"multum", comp:"plūs", sup:"plūrimum" },
  facilis: { pos:"facile", comp:"facilius", sup:"facillimē" }
};
function makeAdverb(entry){
  const lookup = entry.key || entry.lemma || entry.m;
  if(IRREG_ADVERB[lookup]) return { ...IRREG_ADVERB[lookup], irregular:true };
  const cmp = comparisonOf(entry);
  const supAdv = chop(cmp.superlative, "us") + "ē"; // pulcherrimus->pulcherrimē, facillimus->facillimē
  let pos, stem;
  if(entry.type === "adj1"){
    stem = entry.m.endsWith("us") ? chop(entry.m,"us") : chop(entry.f,"a");
    pos = stem + "ē";
  } else {
    stem = entry.stem;
    pos = stem.endsWith("nt") ? stem + "er" : stem + "iter"; // prūdēns->prūdenter, fortis->fortiter
  }
  return { pos, comp:stem+"ius", sup:supAdv, irregular:false };
}

const IMPF_SUBJ_ACT_END = ["em","ēs","et","ēmus","ētis","ent"];      // attach to (inf - final e)
const IMPF_SUBJ_PASS_END = ["er","ēris","ētur","ēmur","ēminī","entur"];
const PERF_IND_ACT_END = ["ī","istī","it","imus","istis","ērunt"];
const PLUP_IND_ACT_END = ["eram","erās","erat","erāmus","erātis","erant"];
const FUTP_IND_ACT_END = ["erō","eris","erit","erimus","eritis","erint"];
const PERF_SUBJ_ACT_END = ["erim","erīs","erit","erīmus","erītis","erint"];
const PLUP_SUBJ_ACT_END = ["issem","issēs","isset","issēmus","issētis","issent"];
const SUM_PRES = ["sum","es","est","sumus","estis","sunt"];
const SUM_IMPF = ["eram","erās","erat","erāmus","erātis","erant"];
const SUM_FUT  = ["erō","eris","erit","erimus","eritis","erunt"];
const SUM_PRES_SUBJ = ["sim","sīs","sit","sīmus","sītis","sint"];
const SUM_IMPF_SUBJ = ["essem","essēs","esset","essēmus","essētis","essent"];

function verbRoot(inf, conj, dep){
  if(dep){
    if(conj === 1) return chop(inf, "ārī");
    if(conj === 2) return chop(inf, "ērī");
    if(conj === 4) return chop(inf, "īrī");
    return chop(inf, "ī"); // 3 and 3io deponent infinitives end in -ī
  }
  if(conj === 1) return chop(inf, "āre");
  if(conj === 2) return chop(inf, "ēre");
  if(conj === 4) return chop(inf, "īre");
  return chop(inf, "ere"); // 3 and 3io
}
// analytic perfect-system forms: participle agrees in NUMBER (sg for 1-3, pl for 4-6)
function analytic(supStem, auxArr){
  const sg = supStem + "us", pl = supStem + "ī";
  return auxArr.map((a, i) => (i < 3 ? sg : pl) + " " + a);
}

function conjugateVerb(entry){
  if(entry.irregular) return entry.irregular; // full hardcoded object
  const [p1, inf, perf1, supine] = entry.pp;
  const conj = entry.conj;
  const root = verbRoot(inf, conj, entry.deponent);
  const perfStem = perf1 ? chop(perf1, "ī") : null;
  const supStem = supine ? chop(supine, "um") : null;      // amāt
  const ppp = supStem ? supStem + "us" : null;             // amātus
  const dep = !!entry.deponent;

  const out = { indicative:{}, subjunctive:{}, imperative:{}, infinitive:{}, participle:{}, gerund:{}, supine:{}, meta:{ conj, deponent:dep } };

  // ---- present-stem synthetic forms ----
  const synth = (tableKey) => zip6(root, VERB_ENDINGS[tableKey][conj]);
  const infMinusE = chop(inf, "e"); // amār, monēr, reger, caper, audīr

  // indicative active / passive
  if(dep){
    out.indicative.present  = synth("presIndPass");
    out.indicative.imperfect= synth("impfIndPass");
    out.indicative.future   = synth("futIndPass");
  } else {
    out.indicative.present  = synth("presIndAct");
    out.indicative.imperfect= synth("impfIndAct");
    out.indicative.future   = synth("futIndAct");
    out.indicative.presentPassive  = synth("presIndPass");
    out.indicative.imperfectPassive= synth("impfIndPass");
    out.indicative.futurePassive   = synth("futIndPass");
  }

  // subjunctive present / imperfect
  if(dep){
    out.subjunctive.present  = synth("presSubjPass");
    out.subjunctive.imperfect= IMPF_SUBJ_PASS_END.map(e => infMinusE + e);
  } else {
    out.subjunctive.present  = synth("presSubjAct");
    out.subjunctive.imperfect= IMPF_SUBJ_ACT_END.map(e => infMinusE + e);
    out.subjunctive.presentPassive  = synth("presSubjPass");
    out.subjunctive.imperfectPassive= IMPF_SUBJ_PASS_END.map(e => infMinusE + e);
  }

  // perfect system
  const aux = (auxArr) => SUBJ => auxArr; // placeholder not used
  if(dep){
    // analytic with PPP (active meaning), participle agrees in number
    out.indicative.perfect      = analytic(supStem, SUM_PRES);
    out.indicative.pluperfect   = analytic(supStem, SUM_IMPF);
    out.indicative.futurePerfect= analytic(supStem, SUM_FUT);
    out.subjunctive.perfect     = analytic(supStem, SUM_PRES_SUBJ);
    out.subjunctive.pluperfect  = analytic(supStem, SUM_IMPF_SUBJ);
  } else {
    out.indicative.perfect      = zip6(perfStem, PERF_IND_ACT_END);
    out.indicative.pluperfect   = zip6(perfStem, PLUP_IND_ACT_END);
    out.indicative.futurePerfect= zip6(perfStem, FUTP_IND_ACT_END);
    out.subjunctive.perfect     = zip6(perfStem, PERF_SUBJ_ACT_END);
    out.subjunctive.pluperfect  = zip6(perfStem, PLUP_SUBJ_ACT_END);
    if(ppp){
      out.indicative.perfectPassive      = analytic(supStem, SUM_PRES);
      out.indicative.pluperfectPassive   = analytic(supStem, SUM_IMPF);
      out.indicative.futurePerfectPassive= analytic(supStem, SUM_FUT);
      out.subjunctive.perfectPassive     = analytic(supStem, SUM_PRES_SUBJ);
      out.subjunctive.pluperfectPassive  = analytic(supStem, SUM_IMPF_SUBJ);
    }
  }

  // imperatives
  const sg2 = { 1:root+"ā", 2:root+"ē", 3:root+"e", "3io":root+"e", 4:root+"ī" }[conj];
  const pl2 = { 1:root+"āte", 2:root+"ēte", 3:root+"ite", "3io":root+"ite", 4:root+"īte" }[conj];
  if(dep){
    out.imperative.presentSg = inf.replace(/ī$|ī$/,"") ; // overwritten below
    out.imperative.presentSg = { 1:root+"āre", 2:root+"ēre", 3:root+"ere", "3io":root+"ere", 4:root+"īre" }[conj];
    out.imperative.presentPl = { 1:root+"āminī", 2:root+"ēminī", 3:root+"iminī", "3io":root+"iminī", 4:root+"īminī" }[conj];
  } else {
    out.imperative.presentSg = sg2;
    out.imperative.presentPl = pl2;
  }

  // infinitives
  if(dep){
    out.infinitive.present = { 1:root+"ārī", 2:root+"ērī", 3:root+"ī", "3io":root+"ī", 4:root+"īrī" }[conj];
    out.infinitive.perfect = ppp ? ppp + " esse" : null;
    out.infinitive.future  = supStem ? supStem + "ūrus esse" : null;
  } else {
    out.infinitive.present = inf;
    out.infinitive.presentPassive = { 1:root+"ārī", 2:root+"ērī", 3:root+"ī", "3io":root+"ī", 4:root+"īrī" }[conj];
    out.infinitive.perfect = perfStem + "isse";
    out.infinitive.perfectPassive = ppp ? ppp + " esse" : null;
    out.infinitive.future = supStem ? supStem + "ūrus esse" : null;
    out.infinitive.futurePassive = supine ? supine + " īrī" : null;
  }

  // participles
  const presPplNom = { 1:root+"āns", 2:root+"ēns", 3:root+"ēns", "3io":root+"iēns", 4:root+"iēns" }[conj];
  const presPplStem= { 1:root+"ant", 2:root+"ent", 3:root+"ent", "3io":root+"ient", 4:root+"ient" }[conj];
  out.participle.presentActive = { nom:presPplNom, gen:presPplStem+"is" };
  if(ppp) out.participle.perfectPassive = ppp;            // active sense if deponent
  if(supStem) out.participle.futureActive = supStem + "ūrus";
  const gerStem = { 1:root+"and", 2:root+"end", 3:root+"end", "3io":root+"iend", 4:root+"iend" }[conj];
  out.participle.gerundive = gerStem + "us";

  // gerund (gen/dat/acc/abl)
  out.gerund = { gen:gerStem+"ī", dat:gerStem+"ō", acc:gerStem+"um", abl:gerStem+"ō" };

  // supine
  if(supine){ out.supine = { acc:supine, abl:supStem+"ū" }; }

  return out;
}

  async loadOrCreateProfile(user){

  async hydrate(profile){
    const { db, api } = this.fb;

function deepStripMac(o){
  if(o==null) return o;
  if(typeof o==="string") return stripMacrons(o);
  if(Array.isArray(o)) return o.map(deepStripMac);
  if(typeof o==="object"){ const r={}; for(const k in o) r[k]=deepStripMac(o[k]); return r; }

const BOX_INTERVAL = [0, 1, 3, 7, 16, 35]; // days by box level
function dayKey(d){ return (d||new Date()).toISOString().slice(0,10); } // YYYY-MM-DD
function recordResult(itemKey, category, correct){
  const prog = DB.progress(state.user.uid);
  const it = prog.items[itemKey] || { box:0, due:0, seen:0, correct:0 };
  it.seen++; if(correct) it.correct++;
  it.box = correct ? Math.min(it.box+1, 5) : 0;
  it.due = now() + BOX_INTERVAL[it.box]*DAY;
  prog.items[itemKey] = it;
  const c = prog.stats[category] || { seen:0, correct:0 };
  c.seen++; if(correct) c.correct++; prog.stats[category] = c;
  prog.totalSeen++; if(correct) prog.totalCorrect++;
  if(!prog.history) prog.history = {};
  const dk = dayKey();
  const h = prog.history[dk] || { seen:0, correct:0 };
  h.seen++; if(correct) h.correct++;
  prog.history[dk] = h;
  const today = new Date().toDateString();
  if(prog.lastDay !== today){ prog.streak = (prog.lastDay && (Date.parse(today)-Date.parse(prog.lastDay))<=DAY*1.5)? prog.streak+1 : 1; prog.lastDay = today; }
  DB.setProgress(state.user.uid, prog);
  pushScores(prog);
  if(state.session && category){ const ch=state.session.catHits||(state.session.catHits={}); const e=ch[category]||(ch[category]={seen:0,correct:0}); e.seen++; if(correct) e.correct++; }
}
/* denormalised, peer-readable doc for the class leaderboard (daily correct counts) */
function pushScores(prog){
  if(!FIREBASE_ENABLED || !state.user) return;
  const daily = {}; for(const k in (prog.history||{})) daily[k] = prog.history[k].correct||0;
  const speed = {}; for(const k in (prog.speed||{})) speed[k] = prog.speed[k].ms;
  Cloud.push("scores", { uid:state.user.uid, name:state.user.displayName||"Student", classIds:state.user.classIds||[], daily, speed, anon: !!(state.user && state.user.anon) });
}

/* ---- time-period analytics ---- */
const PERIODS = [["day","1 day",1],["week","1 week",7],["month","1 month",30],["year","1 year",365],["all","All time",Infinity]];
function periodDays(id){ const p=PERIODS.find(x=>x[0]===id); return p?p[2]:Infinity; }
function cutoffKey(days){ return days===Infinity ? null : dayKey(new Date(Date.now()-(days-1)*DAY)); }
function historyAggregate(history, days){
  const cut = cutoffKey(days); let seen=0, correct=0;
  for(const k in (history||{})){ if(cut && k<cut) continue; const h=history[k]; seen+=h.seen||0; correct+=h.correct||0; }
  return { seen, correct };
}
function correctInPeriod(daily, days){
  const cut = cutoffKey(days); let p=0;
  for(const k in (daily||{})){ if(cut && k<cut) continue; p += daily[k]||0; }
  return p;
}
function dailyAccuracy(){
  const prog = DB.progress(state.user.uid); const h=(prog.history||{})[dayKey()];
  return h && h.seen ? Math.round(100*h.correct/h.seen) : 0;
}
function periodSelector(current, onPick){
  const row = el("div",{class:"chooser"});
  PERIODS.forEach(([id,label])=> row.appendChild(el("button",{class:"choice small"+(current===id?" sel":""), onclick:()=>onPick(id)}, label)));
  return row;
}
function dailyChart(history, days){
  const cut = cutoffKey(days);
  let keys = Object.keys(history||{}).filter(k=>!cut || k>=cut).sort();
  if(keys.length>60) keys = keys.slice(keys.length-60); // cap bars
  if(!keys.length){ return el("p",{class:"muted small"}, "No activity in this period yet."); }
  const max = Math.max(1, ...keys.map(k=>history[k].correct||0));
  const wrap = el("div",{class:"daychart"});
  keys.forEach(k=>{
    const h = history[k]; const c = h.correct||0; const hgt = Math.round(100*c/max);
    wrap.appendChild(el("div",{class:"daybar", title:`${k}: ${c} correct of ${h.seen} answered`,
      style:`height:${c?Math.max(6,hgt):2}%; background:var(--accent)`}));
  });
  return wrap;
}
function categoryWeight(category){
  const prog = DB.progress(state.user.uid);
  const c = prog.stats[category];
  if(!c || c.seen < 4) return 1.0;
  return 1.0 + (1 - c.correct/c.seen) * 2.5; // weak categories sampled more
}

const lexNounKeys = d => LEX.nouns.filter(n=>n.decl===d).map(n=>n.key);

const lexVerbIrr  = () => LEX.verbs.filter(v=>v.irregular).map(v=>v.key);

const VERB_GROUPS = [

const TENSE_LABEL = { present:"present", imperfect:"imperfect", future:"future", perfect:"perfect", pluperfect:"pluperfect", futurePerfect:"future perfect" };
const NUM_LABEL = { sg:"singular", pl:"plural" };

const noCompare = new Set(["omnis"]); // semantically non-gradable in the seed

/* ---------------------------------------------------------------------------
   5. form helpers built on the engine
--------------------------------------------------------------------------- */
function nounEntry(key){ return LEX.nouns.find(n=>n.key===key); }
function verbEntry(key){ return LEX.verbs.find(v=>v.key===key); }
function adjEntry(key){ return LEX.adjectives.find(a=>a.key===key); }

function verbForm(v, sel){
  const idx = (sel.number==="sg"?0:3) + (parseInt(sel.person,10)-1);
  let key = sel.tense;
  let table = sel.mood === "indicative" ? v.indicative : v.subjunctive;
  if(sel.mood === "subjunctive" && (sel.tense==="future" || sel.tense==="futurePerfect")) return null;
  if(sel.voice === "passive") key = key + "Passive";
  const arr = table && table[key];
  if(!arr) return null;
  const f = arr[idx];
  if(!f || /undefined/.test(f)) return null;
  return f;
}
/* enumerate valid verb slots for scope, filtering missing forms */
function verbSlots(v, tenses, moods, voices, deponent, irregular){
  const out = [];
  const useVoices = (deponent) ? ["deponent"] : voices;
  for(const tense of tenses)
    for(const mood of moods)
      for(const voice of useVoices)
        for(const person of ["1","2","3"])
          for(const number of ["sg","pl"]){
            const sel = { tense, mood, voice, person, number };
            if(verbForm(v, sel)) out.push(sel);
          }
  return out;
}

/* ---------------------------------------------------------------------------
   6. question generators  → {prompt, eyebrow, answer|analysis, kind, itemKey,
                              category, render(panel), lemma, paradigm}
--------------------------------------------------------------------------- */
function pickScopeKeys(module, sel){
  const cfg = SCOPE[module];
  let keys = [];
  cfg.groups.forEach(g => { if(sel.groups.includes(g.id)) keys = keys.concat(g.keys); });
  return keys.length ? keys : cfg.groups.flatMap(g=>g.keys);
}

function genDecline(sel){
  const keys = pickScopeKeys("decline", sel);
  const key = rand(keys); const e = nounEntry(key); const d = N.declineNoun(e);
  const num = e.noPlural ? "sg" : rand(N.NUMS);
  const cas = rand(N.CASES);
  const answer = d[num][cas];
  return {
    kind:"produce", category:"decline:"+e.decl, itemKey:`decline:${key}:${cas}:${num}`,
    eyebrow:`Decline · ${ordinalDecl(e.decl)} declension`,
    prompt:`Give the <b>${N.CASE_LABEL[cas]} ${NUM_LABEL[num]}</b> of <span class="lat">${e.cite}</span> <span class="muted">(${e.gloss})</span>`,
    answer, lemma:e, caseHi:{cas,num}, paradigm:()=>paradigmNoun(e,{cas,num})
  };
}
function genConjugate(sel){
  const keys = pickScopeKeys("conjugate", sel);
  let tenses=[]; (SCOPE.conjugate.tenseGroups).forEach(t=>{ if(sel.tenses.includes(t.id)) tenses=tenses.concat(t.tenses); });
  if(!tenses.length) tenses = ["present","imperfect","future","perfect","pluperfect"];
  let moods = sel.moods.length ? SCOPE.conjugate.moods.filter(m=>sel.moods.includes(m.id)).map(m=>m.mood) : ["indicative"];
  let voices = sel.voices.length ? SCOPE.conjugate.voices.filter(v=>sel.voices.includes(v.id)).map(v=>v.voice) : ["active"];
  // choose a verb that yields at least one slot in scope
  let e, slots=[]; let guard=0;
  do { e = verbEntry(rand(keys)); const v=N.conjugateVerb(e);
       slots = verbSlots(v, tenses, moods, voices, e.deponent, !!e.irregular); guard++; }
  while(slots.length===0 && guard<30);
  const v = N.conjugateVerb(e);
  if(!slots.length){ return genConjugate({groups:["c1"],tenses:["tpres"],moods:["mind"],voices:["vact"]}); }
  const sl = rand(slots);
  const answer = verbForm(v, sl);
  const voiceTxt = sl.voice==="deponent" ? "(deponent)" : sl.voice;
  return {
    kind:"produce", category:"conjugate:"+(e.irregular?"irr":e.conj), itemKey:`conj:${e.key}:${sl.tense}:${sl.mood}:${sl.voice}:${sl.person}:${sl.number}`,
    eyebrow:`Conjugate · ${verbConjLabel(e)}`,
    prompt:`Give the <b>${ORD[sl.person]} ${NUM_LABEL[sl.number]} ${TENSE_LABEL[sl.tense]} ${sl.mood} ${voiceTxt}</b> of <span class="lat">${e.cite}</span> <span class="muted">(${e.gloss})</span>`,
    answer, lemma:e, paradigm:()=>paradigmVerbCell(e, sl)
  };
}
function genAdjAdv(sel){
  const keys = pickScopeKeys("adjadv", sel);
  const tasks = sel.tasks && sel.tasks.length ? sel.tasks : ["tdec","tcomp","tadv"];
  let task = rand(tasks);
  let e = adjEntry(rand(keys));
  if((task==="tcomp"||task==="tadv") && noCompare.has(e.key)){ const ok = keys.filter(k=>!noCompare.has(k)); e = adjEntry(rand(ok.length?ok:keys)); if(noCompare.has(e.key)) task="tdec"; }
  if(task==="tdec"){
    const d = e.type==="adj1" ? N.declineAdj1(e.m,e.f,e.n) : N.declineAdj3(e.nom, e.stem);
    const g = rand(["m","f","n"]); const num = rand(N.NUMS); const cas = rand(N.CASES);
    const answer = d[g][num][cas];
    return { kind:"produce", category:"adj:"+(e.type), itemKey:`adj:${e.key}:${g}:${cas}:${num}`,
      eyebrow:`Adjective · agreement`,
      prompt:`Give the <b>${GEN_LABEL[g]} ${N.CASE_LABEL[cas]} ${NUM_LABEL[num]}</b> of <span class="lat">${adjCitation(e)}</span> <span class="muted">(${e.gloss})</span>`,
      answer, lemma:e, paradigm:()=>paradigmAdj(e,g,{cas,num}) };
  }
  if(task==="tcomp"){
    const c = N.comparisonOf(e); const deg = rand(["comparative","superlative"]);
    const answer = c[deg];
    return { kind:"produce", category:"comparison", itemKey:`comp:${e.key}:${deg}`,
      eyebrow:`Comparison · ${c.irregular?"irregular":"regular"}`,
      prompt:`Give the <b>${deg}</b> (masc. nom. sg.) of <span class="lat">${c.positive}</span> <span class="muted">(${e.gloss})</span>`,
      answer, lemma:e, paradigm:()=>paradigmComparison(e) };
  }
  // adverb
  const a = N.makeAdverb(e); const deg = rand(["pos","comp","sup"]);
  const degLabel = {pos:"positive",comp:"comparative",sup:"superlative"}[deg];
  return { kind:"produce", category:"adverb", itemKey:`adv:${e.key}:${deg}`,
    eyebrow:`Adverb · ${a.irregular?"irregular":"regular"}`,
    prompt:`Give the <b>${degLabel} adverb</b> from <span class="lat">${adjCitation(e)}</span> <span class="muted">(${e.gloss})</span>`,
    answer:a[deg], lemma:e, paradigm:()=>paradigmAdverb(e) };
}
/* ---- participles & infinitives (verb-based) ---- */
function participleForms(v, type){
  const pa = v.participle || {};
  if(type==="present"){
    if(!pa.presentActive) return null;
    const nom = pa.presentActive.nom; const stem = (pa.presentActive.gen||"").replace(/is$/,"");
    const d = N.declineAdj3({m:nom,f:nom,n:nom}, stem);
    return { decl:d, citation:`${nom}, ${pa.presentActive.gen}` };
  }
  const nom = type==="perfect" ? pa.perfectPassive : pa.futureActive;
  if(!nom) return null;
  const f = nom.replace(/us$/,"a"), n = nom.replace(/us$/,"um");
  return { decl:N.declineAdj1(nom,f,n), citation:`${nom}, ${f}, ${n}` };
}
function genParticiple(sel){
  const keys = pickScopeKeys("participles", sel);
  const wantTypes = (sel.types&&sel.types.length ? SCOPE.participles.typeGroups.filter(t=>sel.types.includes(t.id)) : SCOPE.participles.typeGroups).map(t=>t.type);
  let e, v, type=null, pf=null, guard=0;
  do{
    e = verbEntry(rand(keys)); v = N.conjugateVerb(e);
    const avail = wantTypes.filter(t=> participleForms(v,t));
    type = avail.length ? rand(avail) : null;
    pf = type ? participleForms(v,type) : null;
    guard++;
  } while(!pf && guard<40);
  if(!pf){ e = LEX.verbs.find(x=>!x.irregular) || LEX.verbs[0]; v=N.conjugateVerb(e); type="present"; pf=participleForms(v,"present"); }
  const g = rand(["m","f","n"]); const num = rand(N.NUMS); const cas = rand(N.CASES);
  const answer = pf.decl[g][num][cas];
  return { kind:"produce", category:"participle:"+type, itemKey:`ppl:${e.key}:${type}:${g}:${cas}:${num}`,
    eyebrow:`Participle · ${type}`,
    prompt:`Give the <b>${type} participle</b> of <span class="lat">${e.cite}</span> <span class="muted">(${e.gloss})</span> — <b>${GEN_LABEL[g]} ${N.CASE_LABEL[cas]} ${NUM_LABEL[num]}</b>`,
    answer, lemma:e, paradigm:()=>paradigmParticiple(pf, type, g, {cas,num}) };
}
function paradigmParticiple(pf, type, g, hi){
  return wrapPara(`${type} participle: ${pf.citation} — ${GEN_LABEL[g]}`, caseTable(pf.decl[g], hi));
}

function infinitiveForms(v, e){
  const inf = v.infinitive || {}; const out=[];
  if(e.deponent){
    if(inf.present) out.push({label:"Present", value:inf.present});
    if(inf.perfect) out.push({label:"Perfect", value:inf.perfect});
    if(inf.future)  out.push({label:"Future",  value:inf.future});
  } else {
    [["present","active","Present active", inf.present],
     ["present","passive","Present passive", inf.presentPassive],
     ["perfect","active","Perfect active", inf.perfect],
     ["perfect","passive","Perfect passive", inf.perfectPassive],
     ["future","active","Future active", inf.future],
     ["future","passive","Future passive", inf.futurePassive]
    ].forEach(([t,vc,label,val])=>{ if(val) out.push({tense:t,voice:vc,label,value:val}); });
  }
  return out;
}
function genInfinitive(sel){
  const keys = pickScopeKeys("infinitives", sel);
  const wantFG = (sel.forms&&sel.forms.length ? SCOPE.infinitives.formGroups.filter(f=>sel.forms.includes(f.id)) : SCOPE.infinitives.formGroups);
  const wantPairs = wantFG.map(f=>f.tense+":"+f.voice);
  const wantTenses = new Set(wantFG.map(f=>f.tense));
  let e, v, all=[], choices=[], guard=0;
  do{
    e = verbEntry(rand(keys)); v = N.conjugateVerb(e); all = infinitiveForms(v, e);
    choices = e.deponent ? all.filter(o=> wantTenses.has(o.label.toLowerCase()))
                         : all.filter(o=> wantPairs.includes(o.tense+":"+o.voice));
    guard++;
  } while(!choices.length && guard<40);
  if(!choices.length){ choices = all.length?all:[{label:"Present", value:(v.infinitive&&v.infinitive.present)}]; }
  const pick = rand(choices);
  return { kind:"produce", category:"infinitive:"+(e.deponent?"dep":(pick.tense+"-"+(pick.voice||"act"))), itemKey:`inf:${e.key}:${pick.label}`,
    eyebrow:`Infinitive · ${pick.label.toLowerCase()}`,
    prompt:`Give the <b>${pick.label.toLowerCase()} infinitive</b> of <span class="lat">${e.cite}</span> <span class="muted">(${e.gloss})</span>`,
    answer: pick.value, lemma:e, paradigm:()=>paradigmInfinitives(all) };
}
function paradigmInfinitives(all){
  const box = el("div",{class:"cmp", style:"flex-wrap:wrap"});
  all.forEach(o=> box.appendChild(chip(o.label, o.value)));
  return wrapPara("Infinitives", box);
}

/* ---- gerunds & gerundives ---- */
function gerundForms(v){ return (v.gerund && Object.keys(v.gerund).length) ? v.gerund : null; }
function gerundiveDecl(v){
  const nom = v.participle && v.participle.gerundive; if(!nom) return null;
  const f = nom.replace(/us$/,"a"), n = nom.replace(/us$/,"um");
  return { decl:N.declineAdj1(nom,f,n), citation:`${nom}, ${f}, ${n}` };
}
function genGerund(sel){
  const keys = pickScopeKeys("gerunds", sel);
  const wantTypes = (sel.types&&sel.types.length ? SCOPE.gerunds.typeGroups.filter(t=>sel.types.includes(t.id)) : SCOPE.gerunds.typeGroups).map(t=>t.type);
  let e, v, type=null, guard=0;
  do{
    e=verbEntry(rand(keys)); v=N.conjugateVerb(e);
    const avail = wantTypes.filter(t=> t==="gerund" ? gerundForms(v) : gerundiveDecl(v));
    type = avail.length ? rand(avail) : null; guard++;
  } while(!type && guard<40);
  if(!type){ e=LEX.verbs.find(x=>!x.irregular)||LEX.verbs[0]; v=N.conjugateVerb(e); type="gerund"; }
  if(type==="gerund"){
    const g = gerundForms(v) || {}; const cases=["acc","gen","dat","abl"].filter(c=>g[c]); const cas=rand(cases.length?cases:["acc"]);
    return { kind:"produce", category:"gerund:gerund", itemKey:`ger:${e.key}:${cas}`,
      eyebrow:"Gerund",
      prompt:`Give the <b>${N.CASE_LABEL[cas]} gerund</b> of <span class="lat">${e.cite}</span> <span class="muted">(${e.gloss})</span>`,
      answer:g[cas], lemma:e, paradigm:()=>paradigmGerund(v,e) };
  }
  const gd = gerundiveDecl(v); const gg=rand(["m","f","n"]); const num=rand(N.NUMS); const cas=rand(N.CASES);
  return { kind:"produce", category:"gerund:gerundive", itemKey:`gerv:${e.key}:${gg}:${cas}:${num}`,
    eyebrow:"Gerundive",
    prompt:`Give the <b>gerundive</b> of <span class="lat">${e.cite}</span> <span class="muted">(${e.gloss})</span> — <b>${GEN_LABEL[gg]} ${N.CASE_LABEL[cas]} ${NUM_LABEL[num]}</b>`,
    answer:gd.decl[gg][num][cas], lemma:e, paradigm:()=>paradigmGerundive(gd, gg, {cas,num}) };
}
function paradigmGerund(v,e){
  const g=v.gerund||{}; const box=el("div",{class:"cmp"});
  ["acc","gen","dat","abl"].forEach(c=>{ if(g[c]) box.appendChild(chip(N.CASE_LABEL[c], g[c])); });
  return wrapPara(`Gerund of ${e.cite}`, box);
}
function paradigmGerundive(gd, g, hi){
  return wrapPara(`Gerundive: ${gd.citation} — ${GEN_LABEL[g]}`, caseTable(gd.decl[g], hi));
}

/* ---- whole-table drills (fill every cell) ---- */
const GHEAD = { m:"Masc.", f:"Fem.", n:"Neut." };
function capNum(num){ const l=NUM_LABEL[num]||num; return l.charAt(0).toUpperCase()+l.slice(1); }
/* gendered paradigm → one table per number, rows = cases, columns = M/F/N */
function genderedTables(decl, itemKeyFn, cat){
  return N.NUMS.map(num=>({
    caption: capNum(num),
    colHeads: ["m","f","n"].map(g=>GHEAD[g]),
    rows: N.CASES.map(cas=>({
      label:N.CASE_LABEL[cas], caseTag:cas,
      cells:["m","f","n"].map(g=>({ answer: decl[g] && decl[g][num] ? decl[g][num][cas] : undefined, itemKey:itemKeyFn(g,num,cas), category:cat }))
    })).filter(r=> r.cells.some(c=>c.answer))
  })).filter(t=> t.rows.length);
}
function genDeclineTable(sel){
  const e = nounEntry(rand(pickScopeKeys("decline", sel))); const d = N.declineNoun(e);
  const cat = "decline:"+e.decl;
  const nums = e.noPlural ? ["sg"] : ["sg","pl"];
  const rows = N.CASES.map(cas=>({ label:N.CASE_LABEL[cas], caseTag:cas,
    cells: nums.map(nm=>({ answer:d[nm][cas], itemKey:`decline:${e.key}:${cas}:${nm}`, category:cat })) }));
  return { kind:"table", category:cat, eyebrow:`Full table · ${ordinalDecl(e.decl)} declension`,
    prompt:`Decline <span class="lat">${e.cite}</span> <span class="muted">(${e.gloss})</span> — ${e.noPlural?"every case":"every case, both numbers"}`,
    tables:[{ colHeads: nums.map(nm=> nm==="sg"?"singular":"plural"), rows }], lemma:e, paradigm:()=>paradigmNoun(e,{}) };
}
function genAdjTable(sel){
  const e = adjEntry(rand(pickScopeKeys("adjadv", sel)));
  const d = e.type==="adj1"?N.declineAdj1(e.m,e.f,e.n):N.declineAdj3(e.nom,e.stem);
  const cat = "adj:"+e.type;
  return { kind:"table", category:cat, eyebrow:`Full table · adjective`,
    prompt:`Decline <span class="lat">${adjCitation(e)}</span> <span class="muted">(${e.gloss})</span> — all genders`,
    tables: genderedTables(d, (g,num,cas)=>`adj:${e.key}:${g}:${cas}:${num}`, cat),

function genParticipleTable(sel){
  const keys = pickScopeKeys("participles", sel);
  const wantTypes = (sel.types&&sel.types.length ? SCOPE.participles.typeGroups.filter(t=>sel.types.includes(t.id)) : SCOPE.participles.typeGroups).map(t=>t.type);
  let e, v, type=null, pf=null, guard=0;
  do{ e=verbEntry(rand(keys)); v=N.conjugateVerb(e); const avail=wantTypes.filter(t=>participleForms(v,t)); type=avail.length?rand(avail):null; pf=type?participleForms(v,type):null; guard++; } while(!pf&&guard<40);
  if(!pf){ e=LEX.verbs.find(x=>!x.irregular)||LEX.verbs[0]; v=N.conjugateVerb(e); type="present"; pf=participleForms(v,"present"); }
  const cat="participle:"+type;
  return { kind:"table", category:cat, eyebrow:`Full table · ${type} participle`,
    prompt:`Decline the <b>${type} participle</b> of <span class="lat">${e.cite}</span> — all genders`,
    tables: genderedTables(pf.decl, (g,num,cas)=>`ppl:${e.key}:${type}:${g}:${cas}:${num}`, cat),
    lemma:e, paradigm:()=>paradigmParticiple(pf,type,"m",{}) };
}
function genPronounTable(sel){
  const key = rand(pickScopeKeys("pronoun", sel)); const p = N.declinePronoun(key); const cat="pronoun";
  let tables;
  if(p.g){
    tables = genderedTables(p.forms, (g,num,cas)=>`pron:${key}:${g}:${cas}:${num}`, cat);
  } else {
    const nums = N.NUMS.filter(n=>p.forms[n]);
    tables = [{ colHeads:nums.map(n=>NUM_LABEL[n]),
      rows:N.CASES.map(cas=>({ label:N.CASE_LABEL[cas], caseTag:cas,
        cells:nums.map(n=>({ answer:p.forms[n][cas], itemKey:`pron:${key}:-:${cas}:${n}`, category:cat })) }))
        .filter(r=> r.cells.some(c=>c.answer)) }];
  }
  return { kind:"table", category:cat, eyebrow:`Full table · pronoun`,
    prompt:`Decline <span class="lat">${pronCitation(key)}</span> <span class="muted">(${p.gloss})</span> — every form`,
    tables, lemma:{key}, paradigm:()=>paradigmPronoun(key, p.g?"m":null, {}) };
}
function genConjugateTable(sel){
  const keys = pickScopeKeys("conjugate", sel);
  let tenses=[]; SCOPE.conjugate.tenseGroups.forEach(t=>{ if(sel.tenses.includes(t.id)) tenses=tenses.concat(t.tenses); }); if(!tenses.length) tenses=["present","imperfect","future","perfect","pluperfect"];
  let moods = sel.moods.length? SCOPE.conjugate.moods.filter(m=>sel.moods.includes(m.id)).map(m=>m.mood):["indicative"];
  let voices = sel.voices.length? SCOPE.conjugate.voices.filter(v=>sel.voices.includes(v.id)).map(v=>v.voice):["active"];
  let e, v, pick=null, guard=0;
  do{
    e=verbEntry(rand(keys)); v=N.conjugateVerb(e);
    const combos=[];
    for(const t of tenses) for(const mo of moods) for(const vo of (e.deponent?["deponent"]:voices)){
      if(mo==="subjunctive" && (t==="future"||t==="futurePerfect")) continue;
      const six=["1","2","3"].flatMap(pn=>["sg","pl"].map(n=>verbForm(v,{tense:t,mood:mo,voice:vo,person:pn,number:n})));
      if(six.every(f=>f)) combos.push({tense:t,mood:mo,voice:vo});
    }
    if(combos.length) pick=rand(combos); guard++;
  } while(!pick && guard<40);
  if(!pick){ e=verbEntry(rand(keys))||LEX.verbs[0]; v=N.conjugateVerb(e); pick={tense:"present",mood:"indicative",voice:e.deponent?"deponent":"active"}; }
  const {tense,mood,voice}=pick; const cat="conjugate:"+(e.irregular?"irr":e.conj);
  const cell=(pn,n)=>({ answer:verbForm(v,{tense,mood,voice,person:pn,number:n}), itemKey:`conj:${e.key}:${tense}:${mood}:${voice}:${pn}:${n}`, category:cat });
  const rows=["1","2","3"].map(pn=>({ label:ORD[pn], cells:[cell(pn,"sg"), cell(pn,"pl")] }));
  const voiceTxt = voice==="deponent"?"(deponent)":voice;
  return { kind:"table", category:cat, eyebrow:`Full table · ${verbConjLabel(e)}`,
    prompt:`Conjugate <span class="lat">${e.cite}</span> <span class="muted">(${e.gloss})</span> — <b>${TENSE_LABEL[tense]} ${mood} ${voiceTxt}</b>`,
    tables:[{ colHeads:["singular","plural"], rows }], lemma:e,
    paradigm:()=>paradigmVerbCell(e,{tense,mood,voice,person:"1",number:"sg"}) };
}
function genGerundTable(sel){
  const keys = pickScopeKeys("gerunds", sel);
  const wantTypes = (sel.types&&sel.types.length ? SCOPE.gerunds.typeGroups.filter(t=>sel.types.includes(t.id)) : SCOPE.gerunds.typeGroups).map(t=>t.type);
  let e, v, type=null, guard=0;
  do{ e=verbEntry(rand(keys)); v=N.conjugateVerb(e); const avail=wantTypes.filter(t=> t==="gerund"?gerundForms(v):gerundiveDecl(v)); type=avail.length?rand(avail):null; guard++; } while(!type && guard<40);
  if(!type){ e=LEX.verbs.find(x=>!x.irregular)||LEX.verbs[0]; v=N.conjugateVerb(e); type="gerundive"; }
  if(type==="gerundive"){
    const gd=gerundiveDecl(v); const cat="gerund:gerundive";
    return { kind:"table", category:cat, eyebrow:`Full table · gerundive`,
      prompt:`Decline the <b>gerundive</b> of <span class="lat">${e.cite}</span> <span class="muted">(${e.gloss})</span> — all genders`,
      tables: genderedTables(gd.decl, (g,num,cas)=>`gerv:${e.key}:${g}:${cas}:${num}`, cat),
      lemma:e, paradigm:()=>paradigmGerundive(gd,"m",{}) };
  }
  const g=gerundForms(v)||{}; const cat="gerund:gerund";
  const rows = ["acc","gen","dat","abl"].filter(c=>g[c]).map(c=>({ label:N.CASE_LABEL[c], caseTag:c,
    cells:[{ answer:g[c], itemKey:`ger:${e.key}:${c}`, category:cat }] }));
  return { kind:"table", category:cat, eyebrow:`Full table · gerund`,
    prompt:`Give every case of the <b>gerund</b> of <span class="lat">${e.cite}</span> <span class="muted">(${e.gloss})</span>`,
    tables:[{ caption:"Gerund", colHeads:["form"], rows }], lemma:e, paradigm:()=>paradigmGerund(v,e) };
}

function genPronoun(sel){
  const keys = pickScopeKeys("pronoun", sel);
  let p, key, g, num, cas, answer, guard=0;
  do {
    key = rand(keys); p = N.declinePronoun(key); guard++;
    g = p.g ? rand(["m","f","n"]) : null;
    const nums = N.NUMS.filter(nm => p.g ? p.forms[g][nm] : p.forms[nm]);
    num = rand(nums);
    const forms = p.g ? p.forms[g][num] : p.forms[num];
    const avail = N.CASES.filter(c=>forms[c]);
    cas = rand(avail); answer = forms[cas];
  } while(!answer && guard<30);
  return { kind:"produce", category:"pronoun", itemKey:`pron:${key}:${g||"-"}:${cas}:${num}`,
    eyebrow:`Pronoun · ${key}`,
    prompt:`Give the <b>${g?GEN_LABEL[g]+" ":""}${N.CASE_LABEL[cas]} ${NUM_LABEL[num]}</b> of <span class="lat">${pronCitation(key)}</span> <span class="muted">(${p.gloss})</span>`,
    answer, lemma:{key}, paradigm:()=>paradigmPronoun(key,g,{cas,num}) };
}

/* ---- parsing: reverse index per lemma (form → set of analyses) ---- */
function sameAnalysis(x,y){ return x.cas===y.cas && x.num===y.num && x.g===y.g && x.person===y.person && x.tense===y.tense && x.mood===y.mood && x.voice===y.voice; }
function indexForm(idx, raw, a){
  if(raw==null) return;
  String(raw).split("/").forEach(v=>{ v=v.trim(); if(!v) return; const arr=idx[v]||(idx[v]=[]); if(!arr.some(x=>sameAnalysis(x,a))) arr.push(a); });
}
function genParse(sel){
  const base = sel.parseModule || "decline";
  if(base === "conjugate"){
    const keys = pickScopeKeys("conjugate", sel);
    const e = verbEntry(rand(keys)); const v = N.conjugateVerb(e);
    const idx = {};
    const tenses = ["present","imperfect","future","perfect","pluperfect","futurePerfect"];
    const moods = ["indicative","subjunctive"]; const voices=["active","passive"];
    for(const mood of moods) for(const tense of tenses) for(const voice of (e.deponent?["deponent"]:voices))
      for(const person of ["1","2","3"]) for(const number of ["sg","pl"]){
        const f = verbForm(v,{tense,mood,voice,person,number}); if(!f) continue;
        indexForm(idx, f, {person,number,tense,mood,voice});
      }
    const forms = Object.keys(idx); const form = rand(forms);
    return { kind:"parseVerb", category:"parse:verb", itemKey:`parsev:${e.key}:${form}`,
      eyebrow:`Parse · verb`, form, analyses:idx[form], lemma:e,
      prompt:`Parse this form of <span class="lat">${e.cite||(e.pp?e.pp[0]:e.key)}</span> <span class="muted">(${e.gloss})</span>:`,
      paradigm:()=>null };
  }
  // nominal parse: nouns / adjectives / pronouns
  let pool = base; const sub = pool;
  let lemma, gen, hasGender=false, idx={};
  if(sub==="decline"){
    const keys = pickScopeKeys("decline", sel); const e = nounEntry(rand(keys)); lemma=e;
    const d = N.declineNoun(e);
    for(const num of N.NUMS) for(const cas of N.CASES){ indexForm(idx, d[num][cas], {cas,num}); }
  } else if(sub==="adjadv"){
    const keys = pickScopeKeys("adjadv", sel); const e=adjEntry(rand(keys)); lemma=e; hasGender=true;
    const d = e.type==="adj1"?N.declineAdj1(e.m,e.f,e.n):N.declineAdj3(e.nom,e.stem);
    for(const g of ["m","f","n"]) for(const num of N.NUMS) for(const cas of N.CASES){ indexForm(idx, d[g][num][cas], {g,cas,num}); }
  } else { // pronoun
    const keys = pickScopeKeys("pronoun", sel); const key=rand(keys); const p=N.declinePronoun(key); lemma={key, gloss:p.gloss}; hasGender=!!p.g;
    if(p.g){ for(const g of ["m","f","n"]) for(const num of N.NUMS) for(const cas of N.CASES){ indexForm(idx, p.forms[g][num][cas], {g,cas,num}); } }
    else { for(const num of N.NUMS){ if(!p.forms[num]) continue; for(const cas of N.CASES){ indexForm(idx, p.forms[num][cas], {cas,num}); } } }
  }
  const forms = Object.keys(idx); const form = rand(forms);
  return { kind:"parseNominal", category:"parse:nominal", itemKey:`parsen:${lemma.key}:${form}`,
    eyebrow:`Parse · ${sub==="adjadv"?"adjective":sub==="pronoun"?"pronoun":"noun"}`,
    form, analyses:idx[form], hasGender, lemma,
    prompt:`Parse this form of <span class="lat">${lemma.cite||lemma.lemma||pronCitation(lemma.key)}</span> <span class="muted">(${lemma.gloss||""})</span>:`,
    paradigm:()=>null };
}

/* ---- translation (self-marked) ---- */
const TRANSLATE_BANK = [
  { lat:"Arma virumque canō.", model:"I sing of arms and the man." },
  { lat:"Mīlitēs, hortātus ducem, in hostēs ruērunt.", model:"The soldiers, having encouraged the general, rushed against the enemy." },
  { lat:"Sī hoc dīxisset, omnēs eum audīvissent.", model:"If he had said this, everyone would have listened to him." },
  { lat:"Tantus erat clāmor ut nēmō vōcem ducis audīret.", model:"So great was the shouting that no one could hear the general's voice." },
  { lat:"Urbe captā, cīvēs ad templa cōnfūgērunt.", model:"When the city had been captured, the citizens fled to the temples." },
  { lat:"Rēx, quī fortissimus omnium erat, prīmus pugnāvit.", model:"The king, who was the bravest of all, fought first." },
  { lat:"Haec nōbīs facienda sunt antequam nox veniat.", model:"These things must be done by us before night comes." },
  { lat:"Caesar tam celeriter vēnit ut hostēs nōn parātī essent.", model:"Caesar came so quickly that the enemy were not prepared." }
];
function genTranslate(){
  const q = rand(TRANSLATE_BANK);
  return { kind:"selfmark", category:"translate", itemKey:`tr:${q.lat}`,
    eyebrow:"Translate · self-marked",
    prompt:`<span class="lat">${stripMacrons(q.lat)}</span>`, model:stripMacrons(q.model) };
}

function generate(session){
  const m = session.module, sel = session.scope;
  const tbl = sel && sel.format==="table";
  switch(m){
    case "decline": return tbl? genDeclineTable(sel) : genDecline(sel);
    case "conjugate": return tbl? genConjugateTable(sel) : genConjugate(sel);
    case "adjadv": return tbl? genAdjTable(sel) : genAdjAdv(sel);
    case "pronoun": return tbl? genPronounTable(sel) : genPronoun(sel);
    case "participles": return tbl? genParticipleTable(sel) : genParticiple(sel);
    case "infinitives": return genInfinitive(sel);
    case "gerunds": return tbl? genGerundTable(sel) : genGerund(sel);
    case "parse": return genParse(sel);
    case "translate": return genTranslate();
  }
}

   7. paradigm reference renderers (case-colour coded)
--------------------------------------------------------------------------- */
function caseTable(rowsByNum, hi, nums){
  nums = nums || ["sg","pl"];
  const t = el("table",{class:"paradigm"});
  const head = el("tr",{}, el("th",{},""));
  nums.forEach(n=> head.appendChild(el("th",{}, n==="sg"?"singular":"plural")));
  t.appendChild(head);
  for(const cas of N.CASES){
    const tr = el("tr",{});
    tr.appendChild(el("td",{class:"case-label", "data-case":cas}, N.CASE_LABEL[cas]));
    for(const num of nums){
      const v = rowsByNum[num] ? rowsByNum[num][cas] : "";
      const isHi = hi && hi.cas===cas && hi.num===num;
      tr.appendChild(el("td",{class:"form"+(isHi?" hi":""), "data-case":cas}, v||"—"));
    }
    t.appendChild(tr);
  }
  return t;
}
function paradigmNoun(e, hi){
  const d = N.declineNoun(e);
  return wrapPara(`${e.cite} — ${ordinalDecl(e.decl)} declension`, caseTable(d, hi, e.noPlural?["sg"]:["sg","pl"]));
}
function paradigmAdj(e,g,hi){
  const d = e.type==="adj1"?N.declineAdj1(e.m,e.f,e.n):N.declineAdj3(e.nom,e.stem);
  const wrap = el("div",{});
  wrap.appendChild(genderTabs(e, g, hi));
  return wrapPara(`${adjCitation(e)} — ${GEN_LABEL[g]}`, caseTable(d[g], hi));
}
function genderTabs(){ return el("div",{}); }
function paradigmPronoun(key,g,hi){
  const p = N.declinePronoun(key);
  const rows = p.g ? p.forms[g] : p.forms;
  return wrapPara(`${pronCitation(key)}${g?" — "+GEN_LABEL[g]:""}`, caseTable(rows, hi));
}
function paradigmComparison(e){
  const c = N.comparisonOf(e);
  const box = el("div",{class:"cmp"},
    chip("positive", c.positive), chip("comparative", c.comparative), chip("superlative", c.superlative));
  return wrapPara(`Comparison of ${adjCitation(e)}${c.irregular?" (irregular)":""}`, box);
}
function paradigmAdverb(e){
  const a = N.makeAdverb(e);
  const box = el("div",{class:"cmp"}, chip("positive", a.pos), chip("comparative", a.comp), chip("superlative", a.sup));
  return wrapPara(`Adverb of ${adjCitation(e)}${a.irregular?" (irregular)":""}`, box);
}
function paradigmVerbCell(e, sl){
  const v = N.conjugateVerb(e);
  const map = sl.mood==="indicative" ? v.indicative : v.subjunctive;
  let key = sl.tense + (sl.voice==="passive"?"Passive":"");
  const arr = map[key]||[];
  const t = el("table",{class:"paradigm verb"});
  t.appendChild(el("tr",{}, el("th",{},""), el("th",{},"singular"), el("th",{},"plural")));
  for(let p=0;p<3;p++){
    const tr = el("tr",{});
    tr.appendChild(el("td",{class:"case-label"}, ORD[String(p+1)]));
    [0,3].forEach(off=>{
      const i=off+p; const isHi=(parseInt(sl.person,10)-1===p)&&((sl.number==="sg")?off===0:off===3);
      tr.appendChild(el("td",{class:"form"+(isHi?" hi":"")}, arr[i]||"—"));
    });
    t.appendChild(tr);
  }
  const head = `${e.cite||(e.pp?e.pp[0]:e.key)} — ${TENSE_LABEL[sl.tense]} ${sl.mood} ${e.deponent?"(deponent)":sl.voice}`;
  return wrapPara(head, t);
}
function chip(label, val){ return el("div",{class:"degchip"}, el("span",{class:"deg"},label), el("span",{class:"lat"},val)); }
function wrapPara(title, node){ const w=el("div",{}); w.appendChild(el("div",{class:"para-title"}, title)); w.appendChild(node); return w; }

function ordinalDecl(d){ return ["","1st","2nd","3rd","4th","5th"][d]; }
function verbConjLabel(e){ if(e.irregular) return "irregular"; if(e.conj==="3io") return "mixed conj."+(e.deponent?" deponent":""); return e.conj+(e.conj===1?"st":e.conj===2?"nd":e.conj===3?"rd":"th")+" conj."+(e.deponent?" deponent":""); }
function adjCitation(e){ return e.cite || (e.type==="adj1" ? `${e.m}, ${e.f}, ${e.n}` : `${e.nom.m}, ${e.nom.f}, ${e.nom.n}`); }
function pronCitation(key){ const map={ego:"ego",tu:"tu",nos:"nos",vos:"vos",se:"se",is:"is, ea, id",hic:"hic, haec, hoc",ille:"ille, illa, illud",ipse:"ipse, ipsa, ipsum",qui:"qui, quae, quod",quis:"quis, quid"}; return map[key]||key; }

function removeStudent(classId, sid){

}

function scopeControls(module, store, onChange){
  const cfg = SCOPE[module]; const sc = store[module] || (store[module]={});
  const box = el("div",{class:"scope"});
  if(module==="translate"){
    box.appendChild(el("p",{class:"muted small"}, "Read each sentence, translate it, then reveal the model and mark yourself."));
    return field("Scope", box);
  }
  if(module==="parse"){
    const pm = el("div",{class:"chooser"});
    [["decline","Nouns"],["adjadv","Adjectives"],["pronoun","Pronouns"],["conjugate","Verbs"]].forEach(([v,l])=>{
      pm.appendChild(el("button",{class:"choice small"+((sc.parseModule||"decline")===v?" sel":""), onclick:()=>{ sc.parseModule=v; sc.groups=DEFAULT_SCOPE[v==="decline"?"decline":v].groups.slice(); onChange(); }}, l));
    });
    box.appendChild(field("Parse from", pm));
    const srcMod = sc.parseModule||"decline";
    box.appendChild(checkGroup(SCOPE[srcMod].groups, sc, "groups", onChange));
    return field("Scope", box);
  }
  box.appendChild(checkGroup(cfg.groups, sc, "groups", onChange));
  if(module==="conjugate"){
    box.appendChild(subhead("Tenses"));
    box.appendChild(checkGroup(cfg.tenseGroups, sc, "tenses", onChange));
    box.appendChild(subhead("Mood / voice"));
    const mv = el("div",{class:"checkrow"});
    cfg.moods.forEach(o=> mv.appendChild(checkbox(o.label, sc, "moods", o.id, onChange)));
    cfg.voices.forEach(o=> mv.appendChild(checkbox(o.label, sc, "voices", o.id, onChange)));
    box.appendChild(mv);
  }
  if(module==="adjadv"){
    box.appendChild(subhead("Tasks"));
    box.appendChild(checkGroup(cfg.tasks, sc, "tasks", onChange));
  }
  if(module==="participles"){
    box.appendChild(subhead("Participle"));
    box.appendChild(checkGroup(cfg.typeGroups, sc, "types", onChange));
  }
  if(module==="infinitives"){
    box.appendChild(subhead("Infinitive"));
    box.appendChild(checkGroup(cfg.formGroups, sc, "forms", onChange));
  }
  if(module==="gerunds"){
    box.appendChild(subhead("Form"));
    box.appendChild(checkGroup(cfg.typeGroups, sc, "types", onChange));
  }
  if(["decline","adjadv","participles","pronoun","conjugate","gerunds"].includes(module)){
    box.appendChild(subhead("Drill"));
    const fr = el("div",{class:"chooser"});
    [["single","Single forms"],["table",module==="conjugate"?"Full table (6 forms)":"Whole table"]].forEach(([v,l])=>
      fr.appendChild(el("button",{class:"choice small"+(((sc.format||"single")===v)?" sel":""), onclick:()=>{ sc.format=v; onChange(); }}, l)));
    box.appendChild(fr);
    if((sc.format||"single")==="table" && module==="conjugate")
      box.appendChild(el("p",{class:"muted small"}, "Each table is the six person–number forms of one tense, mood and voice from your selection above."));
  }
  return field("Scope", box);
}
function subhead(t){ return el("div",{class:"subhead"}, t); }
function checkGroup(options, sc, fld, onChange){
  const row = el("div",{class:"checkrow"});
  options.forEach(o=> row.appendChild(checkbox(o.label, sc, fld, o.id, onChange)));
  return row;
}
function checkbox(label, sc, fld, id, onChange){
  if(!Array.isArray(sc[fld])) sc[fld] = [];
  const checked = sc[fld].includes(id);
  return el("label",{class:"chk"+(checked?" on":"")},
    el("input",{type:"checkbox", checked:checked?"checked":null, onchange:(e)=>{
      const set = new Set(sc[fld]); if(e.target.checked) set.add(id); else set.delete(id);
      sc[fld] = Array.from(set); onChange();
    }}), el("span",{}, label));
}

function startSession(){
  const m = setupChoice.module;
  const scope = setupChoice.scope[m] || {};
  state.session = { module:m, scope, mode:setupChoice.mode, n:0, correct:0, target: setupChoice.mode==="quiz"?state.settings.quizCount:Infinity, done:false, results:[], current:null };

function nextQuestion(){ const s=state.session; s.current = generate(s); s.answered=false; }

function renderDrill(main){
  const s = state.session;
  if(!s){ setView("home"); return; }
  if(s.done){ return renderSummary(main); }
  const q = s.current;

  const head = el("div",{class:"drillhead"},
    el("p",{class:"eyebrow"}, q.eyebrow),
    el("div",{class:"progressbar"},
      el("span",{}, s.mode==="quiz"? `Question ${s.n+1} / ${s.target}` : `Answered ${s.n}`),
      el("button",{class:"linklike", onclick:endSession}, "end")));

  const panel = el("section",{class:"tablet"});
  panel.appendChild(el("div",{class:"tablet-eyebrow"}, "rogatio"));
  panel.appendChild(el("div",{class:"prompt", html:q.prompt}));

  const answerArea = el("div",{class:"answerArea"});
  const feedback = el("div",{class:"feedback"});

  if(q.kind==="produce"){
    const input = el("input",{class:"answer-input lat", type:"text", autocomplete:"off", autocapitalize:"off", spellcheck:"false", placeholder:"type the form…"});
    const submit = el("button",{class:"primary", onclick:()=>submitProduce(q,input,feedback,submit)}, "Check");
    input.addEventListener("keydown",(e)=>{ if(e.key==="Enter"){ e.preventDefault(); e.stopPropagation(); if(!s.answered) submitProduce(q,input,feedback,submit); } });
    answerArea.appendChild(el("div",{class:"inputrow"}, input, submit));
    setTimeout(()=>input.focus(),30);
  }
  else if(q.kind==="parseNominal" || q.kind==="parseVerb"){
    answerArea.appendChild(el("div",{class:"bigform lat"}, q.form));
    const sel = parseSelectors(q);
    answerArea.appendChild(sel.node);
    const submit = el("button",{class:"primary", onclick:()=>submitParse(q,sel,feedback,submit)}, "Check");
    answerArea.appendChild(submit);
  }
  else if(q.kind==="mcq"){
    const opts = el("div",{class:"mcq"});
    q.options.forEach((o,i)=>{
      opts.appendChild(el("button",{class:"mcqbtn", onclick:()=>submitMCQ(q,o,opts,feedback)}, el("span",{class:"mcqnum"}, String(i+1)), el("span",{}, o)));
    });
    answerArea.appendChild(opts);
    document.onkeydown = (e)=>{ const n=parseInt(e.key,10); if(n>=1&&n<=q.options.length&&!s.answered){ submitMCQ(q,q.options[n-1],opts,feedback); } };
  }
  else if(q.kind==="table"){
    answerArea.appendChild(renderTable(q));
    const submit = el("button",{class:"primary", style:"margin-top:6px", onclick:()=>submitTable(q,feedback,submit)}, "Check");
    q._submitBtn = submit;
    answerArea.appendChild(submit);
  }
  else if(q.kind==="selfmark"){
    const revealBtn = el("button",{class:"primary", onclick:()=>{
      if(state.session.answered) return;
      feedback.innerHTML="";
      feedback.appendChild(el("div",{class:"model"}, el("span",{class:"muted small"},"Model translation"), el("div",{}, q.model)));
      feedback.appendChild(el("div",{class:"selfmark"},
        el("button",{class:"ok-btn", onclick:()=>{ markSelf(q,true,feedback); }}, "I had it"),
        el("button",{class:"err-btn", onclick:()=>{ markSelf(q,false,feedback); }}, "Missed it")));
    }}, "Reveal model");
    answerArea.appendChild(el("textarea",{class:"answer-area lat", rows:"2", placeholder:"type your translation, then reveal…"}));
    answerArea.appendChild(revealBtn);
  }

  panel.appendChild(answerArea);
  panel.appendChild(feedback);

  main.appendChild(head);
  main.appendChild(panel);

  // paradigm reference — revealed only after the question is answered
  if(q.paradigm){
    const para = q.paradigm();
    if(para){
      const det = el("details",{class:"reference", id:"paradigmRef", style: s.answered ? "" : "display:none"});
      if(s.answered) det.open = true;
      det.appendChild(el("summary",{}, "Paradigm reference"));
      det.appendChild(para);
      main.appendChild(det);
    }
  }
  main.appendChild(caseKey());
}

function submitProduce(q,input,feedback,submitBtn){
  const s=state.session; if(s.answered) return;
  const verdict = gradeForm(input.value, q.answer, false);
  const correct = verdict==="correct";
  s.answered=true;
  recordResult(q.itemKey, q.category, correct);
  s.n++; if(correct) s.correct++;
  input.classList.add(correct?"good":"bad"); input.disabled=true;
  submitBtn.textContent="Next"; submitBtn.onclick=advance;
  feedback.innerHTML="";
  feedback.appendChild(verdictLine(verdict, q.answer));
  revealParadigm();
  enableEnterAdvance();
  endOrContinue(s);
}
function verdictLine(verdict, answer){
  if(verdict==="correct") return el("div",{class:"vline ok"}, el("b",{},"Correct."), el("span",{class:"lat"}, " "+answer));
  if(verdict==="macron") return el("div",{class:"vline warn"}, el("b",{},"Macron length off."), el("span",{}," The answer is "), el("span",{class:"lat"}, answer));
  return el("div",{class:"vline err"}, el("b",{},"Not quite."), el("span",{}," The answer is "), el("span",{class:"lat"}, answer));
}
function advance(){ const s=state.session; if(s.done){ renderApp(); return; } nextQuestion(); renderApp(); }
function enableEnterAdvance(){ document.onkeydown = (e)=>{ if(e.key==="Enter"){ e.preventDefault(); advance(); } }; }
